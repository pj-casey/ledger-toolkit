function CVInfoBar({dev,as,port,accts,appJson}){
  const withFunds=appJson ? appJson.accounts.filter(a=>a.balance!=='0').length : (as&&as.accountsWithFunds)?as.accountsWithFunds.length:accts.filter(a=>a.ops>0).length;
  return <div className="cv-infobar">
    <div className="cv-section-title">Device</div>
    {dev&&(dev.modelName||dev.modelId)&&<div style={{marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:8}}>{dev.modelName||dev.modelId}</div>
      {dev.fw&&<div className="cv-info-row"><span style={{color:T.muted}}>Firmware</span><span className="mono" style={{fontSize:11,color:T.primary}}>{dev.fw}</span></div>}
      {dev.lang&&<div className="cv-info-row"><span style={{color:T.muted}}>Language</span><span style={{fontSize:12}}>{dev.lang}</span></div>}
      {dev.appVer&&<div className="cv-info-row"><span style={{color:T.muted}}>Ledger Live</span><span className="mono" style={{fontSize:11}}>{dev.appVer}</span></div>}
      {dev.platform&&<div className="cv-info-row"><span style={{color:T.muted}}>Platform</span><span style={{fontSize:12}}>{dev.platform}</span></div>}
      {dev.os&&<div className="cv-info-row"><span style={{color:T.muted}}>OS</span><span className="mono" style={{fontSize:11}}>{dev.os}{dev.osVer?' '+dev.osVer:''}</span></div>}
    </div>}
    {as&&as.modelIdList&&as.modelIdList.length>1&&<div style={{marginBottom:14}}>
      <div className="cv-section-title" style={{marginTop:6}}>Paired Devices</div>
      {as.modelIdList.map(m=><div key={m} style={{fontSize:11,color:T.muted,padding:'3px 0'}}>{DN[m]||m}</div>)}
    </div>}
    {appJson&&appJson.settings&&appJson.settings.devices&&appJson.settings.devices.length>0&&!(dev&&(dev.modelName||dev.modelId))&&<div style={{marginBottom:14}}>
      <div className="cv-section-title" style={{marginTop:6}}>Devices from app.json</div>
      {appJson.settings.devices.map(m=><div key={m} style={{fontSize:11,color:T.muted,padding:'3px 0'}}>{DN[m]||m}</div>)}
    </div>}
    <div style={{marginTop:6}}>
      <div className="cv-section-title">Session</div>
      <div className="cv-info-row"><span style={{color:T.muted}}>Accounts</span><span style={{fontWeight:600}}>{accts.length}</span></div>
      <div className="cv-info-row"><span style={{color:T.muted}}>With funds</span><span style={{fontWeight:600,color:T.success}}>{withFunds}</span></div>
      {port&&port.totalOperations!=null&&<div className="cv-info-row"><span style={{color:T.muted}}>Total ops</span><span style={{fontWeight:600}}>{port.totalOperations}</span></div>}
      {port&&port.totalCurrencies!=null&&<div className="cv-info-row"><span style={{color:T.muted}}>Currencies</span><span style={{fontWeight:600}}>{port.totalCurrencies}</span></div>}
      {port&&port.ledgerSyncActivated!=null&&<div className="cv-info-row"><span style={{color:T.muted}}>Ledger Sync</span><span style={{fontWeight:600,color:port.ledgerSyncActivated?T.success:T.muted}}>{port.ledgerSyncActivated?'On':'Off'}</span></div>}
    </div>
  </div>;
}

function CVSidebar({accts,namedAccts,selected,onSelect,errs,as,appJson}){
  const sorted=[...namedAccts].sort((a,b)=>{
    const aFunded=a.bal>0||a.ops>0||(a.enriched&&a.ajBalance&&a.ajBalance!=='0');
    const bFunded=b.bal>0||b.ops>0||(b.enriched&&b.ajBalance&&b.ajBalance!=='0');
    return aFunded===bFunded?0:aFunded?-1:1;
  });
  return <div className="cv-sidebar">
    <div className="cv-sidebar-header">
      <div style={{fontSize:11,fontWeight:600,color:T.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Accounts</div>
      <div style={{fontSize:11,color:T.muted}}>{accts.length} total · {appJson ? appJson.accounts.filter(a=>a.balance!=='0').length : (as&&as.accountsWithFunds&&as.accountsWithFunds.length)||accts.filter(a=>a.ops>0).length} with funds</div>
    </div>
    <div className={`cv-acct-row${selected===null?' cv-active':''}`} style={{borderLeft:selected===null?`3px solid ${T.primary}`:'3px solid transparent',paddingLeft:selected===null?11:14}} onClick={()=>onSelect(null)}>
      <span style={{fontSize:14,flexShrink:0}}>◈</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:T.text}}>Portfolio</div>
        <div style={{fontSize:10,color:T.muted}}>All accounts</div>
      </div>
    </div>
    <div className="cv-sidebar-scroll">
      {sorted.map((a,i)=>{
        const ch=a.ch;
        const originalIdx=namedAccts.indexOf(a);
        const hasErr=errs.some(e=>(e.det||e.msg||'').includes(a.addr||'____NOMATCH'));
        const enriched=a.enriched&&a.ajBalance!=null;
        const bal=enriched?fmtBal(a.ajBalance,a.cid,ch.ticker):null;
        const ops=enriched?a.ajOps:a.ops;
        const funded=enriched?(a.ajBalance!=='0'):a.ops>0;
        const isActive=selected===originalIdx;
        return <div key={i} className={`cv-acct-row${isActive?' cv-active':''}`}
          style={{borderLeft:isActive?`3px solid ${T.primary}`:'3px solid transparent',paddingLeft:isActive?11:14}}
          onClick={()=>onSelect(originalIdx)}>
          <span className="cv-chain-dot" style={{background:ch.color||T.muted}}/>
          <div style={{flex:1,minWidth:0,overflow:'hidden'}}>
            <div style={{fontSize:12,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.displayName}{a.ajStarred?' ★':''}</div>
            <div style={{fontSize:10,color:T.muted,display:'flex',gap:4,flexWrap:'wrap'}}>
              <span>{ch.ticker}</span>
              {bal&&<span style={{color:T.success,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}}>· {bal}</span>}
              {!bal&&funded&&<span style={{color:T.success}}>· {ops} ops</span>}
              {!bal&&!funded&&<span style={{opacity:0.5}}>· empty</span>}
            </div>
          </div>
          {hasErr&&a.addr&&<span title="Has related errors" style={{color:T.error,fontSize:10,flexShrink:0}}>⚠</span>}
        </div>;
      })}
    </div>
  </div>;
}

function CVPortfolioView({accts,namedAccts,port,as,appJson,onSelectAcct}){
  const acctCount=appJson?appJson.accounts.length:accts.length;
  const fundedCount=appJson
    ?appJson.accounts.filter(a=>a.balance&&a.balance!=='0').length
    :(as&&as.accountsWithFunds&&as.accountsWithFunds.length)||accts.filter(a=>a.ops>0).length;
  return <div>
    <div style={{display:'flex',gap:12,marginBottom:20,flexWrap:'wrap'}}>
      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 16px',minWidth:90}}>
        <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Accounts</div>
        <div style={{fontSize:22,fontWeight:700}}>{acctCount}</div>
      </div>
      <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 16px',minWidth:90}}>
        <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>With Funds</div>
        <div style={{fontSize:22,fontWeight:700,color:T.success}}>{fundedCount}</div>
      </div>
      {port&&port.totalOperations!=null&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 16px',minWidth:90}}>
        <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Operations</div>
        <div style={{fontSize:22,fontWeight:700}}>{port.totalOperations}</div>
      </div>}
      {port&&port.totalCurrencies!=null&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,padding:'10px 16px',minWidth:90}}>
        <div style={{fontSize:10,color:T.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:3}}>Currencies</div>
        <div style={{fontSize:22,fontWeight:700}}>{port.totalCurrencies}</div>
      </div>}
    </div>
    <div className="cv-portfolio-grid">
      {namedAccts.map((a,i)=>{
        const ch=a.ch;
        const enriched=a.enriched&&a.ajBalance!=null;
        const bal=enriched?fmtBal(a.ajBalance,a.cid,ch.ticker):null;
        const ops=enriched?a.ajOps:a.ops;
        const funded=enriched?(a.ajBalance!=='0'):a.ops>0;
        const tokCount=enriched?(a.ajSubAccounts||[]).length:(a.toks||[]).length;
        const isFunded=a.bal>0||a.ops>0||(namedAccts[i]&&namedAccts[i].ajBalance&&namedAccts[i].ajBalance!=='0')||(a.enriched&&a.ajBalance&&a.ajBalance!=='0');
        return <div key={i} className="cv-portfolio-card cv-card-lift" onClick={()=>onSelectAcct(i)}
          style={{border:isFunded?`1px solid ${T.border}`:`1px solid rgba(60,60,60,0.4)`,opacity:isFunded?1:0.6,borderLeft:isFunded?`3px solid ${T.success}`:`3px solid ${T.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <span className="cv-chain-dot" style={{background:ch.color||T.muted,width:10,height:10}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.displayName}{a.ajStarred?' ★':''}</div>
              <div style={{fontSize:10,color:T.muted}}>{ch.name} · {ch.ticker}</div>
            </div>
          </div>
          {bal&&<div style={{fontSize:13,fontWeight:700,color:T.success,marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{bal}</div>}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
            <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:700,background:funded?T.success+'22':T.border+'88',color:funded?T.success:T.muted}}>{funded?`${ops} ops`:'empty'}</span>
            {tokCount>0&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:4,fontWeight:700,background:T.primary+'22',color:T.primary}}>{tokCount} token{tokCount!==1?'s':''}</span>}
          </div>
          <div className="mono" style={{fontSize:10,color:T.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.addr?trunc(a.addr,18):'—'}</div>
        </div>;
      })}
    </div>
    {(()=>{
      const recentlyUsed=appJson?.raw?.discover?.recentlyUsed;
      if(!Array.isArray(recentlyUsed)||recentlyUsed.length===0)return null;
      const hist=appJson.raw.discover.currentAccountHist||{};
      const fmtDAppName=id=>id.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
      const shown=recentlyUsed.slice(0,8);
      const overflow=recentlyUsed.length-shown.length;
      return(
        <div className="cv-detail-card" style={{marginTop:20}}>
          <div className="cv-section-title">Recent dApp Activity</div>
          {shown.map((entry,i)=>{
            const histKey=Object.keys(hist).find(k=>k.includes(entry.id));
            const acctId=histKey?hist[histKey]:null;
            const addr=acctId?acctId.split(':')[3]:null;
            const linked=addr?namedAccts.find(a=>a.addr&&a.addr.toLowerCase()===addr.toLowerCase()):null;
            return(
              <div key={i} className="cv-info-row">
                <span style={{fontWeight:600,fontSize:12}}>{fmtDAppName(entry.id)}</span>
                <span style={{display:'flex',alignItems:'center',gap:10}}>
                  {linked&&<span style={{fontSize:11,color:T.primary}}>{linked.displayName}</span>}
                  <span style={{fontSize:11,color:T.muted}}>{fmtDate(entry.usedAt)}</span>
                </span>
              </div>
            );
          })}
          {overflow>0&&<div style={{fontSize:11,color:T.muted,marginTop:6}}>and {overflow} more</div>}
        </div>
      );
    })()}
  </div>;
}

function CVCopyText({text,full,mono}){
  const[copied,setCopied]=useState(false);
  const copyVal=full||text;
  if(!text)return <span style={{color:T.muted}}>—</span>;
  return <span onClick={()=>{copyText(copyVal);setCopied(true);setTimeout(()=>setCopied(false),1500);}}
    style={{cursor:'pointer',fontFamily:mono?MF:'inherit',wordBreak:'break-all',position:'relative',padding:'2px 4px',margin:'-2px -4px',borderRadius:3}}
    title={copyVal}>
    {text}
    {copied&&<span style={{position:'absolute',top:-18,left:0,fontSize:9,color:T.success,fontWeight:700,fontFamily:'Inter,sans-serif'}}>Copied!</span>}
  </span>;
}

function CVAccountDetail({acct,errs,onBack}){
  const ch=acct.ch;
  const acctErrs=errs.filter(e=>acct.addr&&acct.addr.length>4&&(e.det||e.msg||'').includes(acct.addr));
  let eUrl=null;try{eUrl=ch.url?.(acct.addr);}catch{}
  const enriched=acct.enriched;
  const ajOps=acct.ajOperations||[];
  const displayOps=ajOps.slice(0,50);
  const txTypeStyle=type=>{
    if(type==='IN')return{background:T.success+'22',color:T.success};
    if(type==='OUT')return{background:T.error+'22',color:T.error};
    if(type==='FEES')return{background:T.warning+'22',color:T.warning};
    return{background:T.primary+'22',color:T.primary};
  };
  const ajSubs=acct.ajSubAccounts||[];
  const logToks=(acct.toks||[]).filter(Boolean);
  return <div>
    <button onClick={onBack} style={{background:'none',border:'none',color:T.muted,cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:12,marginBottom:16,padding:0}}>
      ← Back to Portfolio
    </button>
    <div className="cv-detail-card">
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <span className="cv-chain-dot" style={{background:ch.color||T.muted,width:12,height:12}}/>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:600}}>{acct.displayName}{acct.ajStarred?' ★':''}</div>
          <div style={{fontSize:12,color:T.muted}}>{ch.name} · {ch.ticker}</div>
        </div>
        {eUrl&&<a href={eUrl} target="_blank" rel="noopener noreferrer" style={{padding:'5px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:(ch.color||T.primary)+'22',color:ch.color||T.primary,border:`1px solid ${ch.color||T.primary}33`,textDecoration:'none',display:'flex',alignItems:'center',gap:4}}><Ico.Link/> Explorer</a>}
      </div>
      {enriched&&acct.ajBalance!=null&&<div style={{marginBottom:20}}>
        <div className="cv-section-title">Balance</div>
        <div className="cv-bal-card" style={{marginBottom:4}}>
          <span style={{color:T.muted,fontSize:12}}>Balance</span>
          <span style={{fontWeight:600,color:T.success,fontSize:13}}>{fmtBal(acct.ajBalance,acct.cid,ch.ticker)||'—'}</span>
        </div>
        {acct.ajSpendable!=null&&acct.ajSpendable!==acct.ajBalance&&<div className="cv-bal-card" style={{marginBottom:4}}>
          <span style={{color:T.muted,fontSize:12}}>Spendable</span>
          <span style={{fontWeight:600,fontSize:12}}>{fmtBal(acct.ajSpendable,acct.cid,ch.ticker)||'—'}</span>
        </div>}
        {acct.ajBlockHeight!=null&&<div className="cv-bal-card">
          <span style={{color:T.muted,fontSize:12}}>Block height</span>
          <span className="mono" style={{fontSize:11}}>{Number(acct.ajBlockHeight).toLocaleString()}</span>
        </div>}
      </div>}
      <div style={{height:1,background:T.border,margin:'16px 0',opacity:0.5}}/>
      <div style={{marginBottom:20}}>
        <div className="cv-section-title">Address</div>
        <div className="mono" style={{fontSize:11,color:T.text,wordBreak:'break-all',padding:'8px 12px',background:T.bg,borderRadius:6,border:`1px solid ${T.border}`}}><CVCopyText text={acct.addr} mono={true}/></div>
      </div>
      <div style={{height:1,background:T.border,margin:'16px 0',opacity:0.5}}/>
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 14px',textAlign:'center',minWidth:80}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:2}}>Operations</div>
          <div style={{fontSize:18,fontWeight:700}}>{enriched?acct.ajOps:acct.ops}</div>
        </div>
        {acct.dm&&<div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 14px',textAlign:'center'}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:2}}>Derivation</div>
          <div className="mono" style={{fontSize:11,fontWeight:600}}>{acct.dm}</div>
        </div>}
        {acct.fp&&<div style={{background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,padding:'8px 14px',textAlign:'center'}}>
          <div style={{fontSize:10,color:T.muted,marginBottom:2}}>Path</div>
          <div className="mono" style={{fontSize:11,fontWeight:600}}>{acct.fp}</div>
        </div>}
        {acct.isXpub&&<div style={{background:T.primary+'22',border:`1px solid ${T.primary}33`,borderRadius:6,padding:'8px 14px',textAlign:'center'}}>
          <div style={{fontSize:10,color:T.primary,marginBottom:2}}>Type</div>
          <div className="mono" style={{fontSize:11,fontWeight:600,color:T.primary}}>xpub</div>
        </div>}
      </div>
    </div>
    {enriched&&ajSubs.length>0&&<div className="cv-detail-card">
      <div className="cv-section-title">Token Holdings ({ajSubs.length})</div>
      <div style={{display:'flex',flexDirection:'column',gap:4}}>
        {ajSubs.map((s,si)=>{
          const rawName=(s.tokenId||'').split('/').pop()||s.tokenId||'?';
          const name=rawName.replace(/__/g,' ').replace(/_/g,' ');
          const bal=fmtBal(s.balance,'tezos',null);// tezos=6dec; ERC-20 default per spec
          return <div key={si} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',borderBottom:si<ajSubs.length-1?`1px solid ${T.border}40`:'none'}}>
            <span style={{flex:1,fontSize:12,fontWeight:600,textTransform:'capitalize',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{name}</span>
            {bal&&<span style={{fontSize:11,color:T.success,fontFamily:MF}}>{bal}</span>}
            <span style={{fontSize:10,color:T.muted}}>{s.operationsCount} ops</span>
          </div>;
        })}
      </div>
    </div>}
    {!enriched&&logToks.length>0&&<div className="cv-detail-card">
      <div className="cv-section-title">Token Holdings ({logToks.length})</div>
      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
        {logToks.map((tk,ti)=>{
          const lb=tk.ticker||tk.name||tk.id||'?';
          return <span key={ti} style={{display:'inline-block',padding:'4px 10px',borderRadius:4,fontSize:12,fontWeight:700,background:T.primary+'22',color:T.primary,fontFamily:MF}}>{lb}<span style={{opacity:0.6,marginLeft:4}}>{tk.operationsLength||0} ops</span></span>;
        })}
      </div>
    </div>}
    {enriched&&displayOps.length>0&&<div className="cv-detail-card">
      <div className="cv-section-title">Transactions ({acct.ajOps})</div>
      {ajOps.length>50&&<div style={{fontSize:10,color:T.muted,marginBottom:8}}>Showing 50 of {ajOps.length}</div>}
      <div>
        {displayOps.map((op,oi)=>{
          const opType=(op.type||'').toUpperCase();
          const ts=txTypeStyle(opType);
          const amtColor=opType==='IN'?T.success:opType==='OUT'?T.error:T.text;
          const counterparty=opType==='IN'?(op.senders||[])[0]:(op.recipients||[])[0];
          const txUrl=op.hash&&TX_EXPLORERS[acct.cid]?TX_EXPLORERS[acct.cid](op.hash):null;
          const isFailed=op.hasFailed||op.extra?.failed||(opType.includes('FAILED'));
          const rowBg=isFailed?'rgba(245,115,117,0.07)':oi%2===0?'transparent':'rgba(0,0,0,0.12)';
          const rowStyle=isFailed?{background:rowBg,borderLeft:`2px solid ${T.error}`,paddingLeft:6}:{background:rowBg};
          return <div key={oi} className="cv-tx-row" style={rowStyle}>
            <div style={{minWidth:68,flexShrink:0}}>
              <div style={{fontSize:10,color:T.text}}>{fmtDate(op.date)}</div>
              <div style={{fontSize:9,color:T.muted}}>{fmtTime(op.date)}</div>
            </div>
            <span className="cv-tx-type" style={ts}>{opType||'?'}</span>
            {op.hasFailed&&<span style={{fontSize:9,padding:'1px 5px',borderRadius:3,background:T.error+'22',color:T.error,fontWeight:700}}>FAILED</span>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,color:amtColor,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fmtBal(op.value,acct.cid,ch.ticker)||'—'}</div>
              {op.fee&&fmtBal(op.fee,acct.cid,null)&&<div style={{fontSize:9,color:T.muted}}>Fee: {fmtBal(op.fee,acct.cid,null)}</div>}
            </div>
            {counterparty&&<div style={{minWidth:0,maxWidth:110,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:10,color:T.muted,fontFamily:MF,position:'relative'}}><CVCopyText text={trunc(counterparty,16)} full={counterparty} mono={true}/></div>}
            {op.hash&&<div style={{flexShrink:0}}>
              {txUrl
                ?<a href={txUrl} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:T.primary,fontFamily:MF,textDecoration:'none'}}>{trunc(op.hash,12)}</a>
                :<span style={{fontSize:10,color:T.muted,fontFamily:MF,position:'relative'}}><CVCopyText text={trunc(op.hash,12)} full={op.hash} mono={true}/></span>
              }
            </div>}
          </div>;
        })}
      </div>
    </div>}
    {acctErrs.length>0&&<div className="cv-detail-card" style={{borderColor:'rgba(245,115,117,0.3)'}}>
      <div className="cv-section-title" style={{color:T.error}}>Related Issues ({acctErrs.length})</div>
      {acctErrs.map((err,i)=><div key={i} style={{fontSize:12,color:T.error,padding:'4px 0',borderBottom:i<acctErrs.length-1?'1px solid rgba(245,115,117,0.15)':'none'}}>{err.dg?.t||err.msg||'Unknown error'}</div>)}
    </div>}
  </div>;
}

function CustomerView({logData,appJson,onAppJson}){
  const[selectedAcct,setSelectedAcct]=useState(null);
  const[ajDragOver,setAjDragOver]=useState(false);
  const[summCopied,setSummCopied]=useState(false);
  const[bannerExpanded,setBannerExpanded]=useState(true);
  const[ajError,setAjError]=React.useState('');
  const[ajKey,setAjKey]=React.useState(0);
  useEffect(()=>{
    if(appJson&&!appJson.encrypted){
      setBannerExpanded(true);
      const t=setTimeout(()=>setBannerExpanded(false),3000);

    }
  },[appJson]);
  const appJsonRef=useRef();
  const analytics=logData.analytics||{};

  const port=analytics.portfolio||{};

    const counts={};
    logData.accts.forEach(a=>{counts[a.ch.name]=(counts[a.ch.name]||0)+1;});

    return logData.accts.map(a=>{
      const base=a.ch.name;
      running[base]=(running[base]||0)+1;
      return{...a,displayName:counts[base]>1?`${base} ${running[base]}`:base};

  const appJsonMismatch=React.useMemo(()=>{

      const running={};
      return appJson.accounts.map(a=>{

        const displayName=a.name||(counts[ch.name]>1?`${ch.name} ${running[ch.name]}`:ch.name);

  },[namedAccts,appJson]);
  const copyCustomerSummary=useCallback(()=>{

    const port=logData.analytics?.portfolio||{};

      'DEVICE',
      `  Model:     ${dev.modelName||DN[as.modelId]||as.modelId||'Unknown'}`,
      `  Firmware:  ${(()=>{const fw=dev.fw||as.deviceVersion||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===(dev.fw||as.deviceVersion)?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,

  const handleAppJsonDrop=useCallback(e=>{

          try{const cleaned=Array.from(ev.target.result).filter(ch=>{const c=ch.charCodeAt(0);return c>=0x20||c===0x0a||c===0x09;}).join('');const raw=JSON.parse(cleaned);const keys=Object.keys(raw).join(', ');const dataKeys=raw.data?Object.keys(raw.data).join(', '):'no .data key';console.error('parseAppJson diagnostic — top keys:',keys,'data keys:',dataKeys);setAjError('This app.json doesn\'t contain account data. It may be from a different version of Ledger Wallet or an incomplete export. Ask the customer to re-export.');}catch(err){console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');}
        }else{
          setAjError('');
          onAppJson(parsed);
          setAjKey(k=>k+1);
        }
      }catch(err){
        console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');
      }
    };
    reader.onerror=()=>setAjError('The file couldn\'t be opened. Try downloading it again from the customer\'s ticket.');
    reader.readAsText(file);
  },[onAppJson]);
  const handleAppJsonPick=useCallback(ev=>{
    const file=ev.target.files?.[0];
    if(!file)return;
    ev.target.value='';
    setAjError('');
    const reader=new FileReader();
    reader.onload=e=>{
      setAjError('');
      try{
        const parsed=parseAppJson(e.target.result);
        if(!parsed||(parsed.accounts.length===0&&!parsed.encrypted)){
          try{const cleaned=Array.from(e.target.result).filter(ch=>{const c=ch.charCodeAt(0);return c>=0x20||c===0x0a||c===0x09;}).join('');const raw=JSON.parse(cleaned);const keys=Object.keys(raw).join(', ');const dataKeys=raw.data?Object.keys(raw.data).join(', '):'no .data key';console.error('parseAppJson diagnostic — top keys:',keys,'data keys:',dataKeys);setAjError('This app.json doesn\'t contain account data. It may be from a different version of Ledger Wallet or an incomplete export. Ask the customer to re-export.');}catch(err){console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');}
        }else{
          setAjError('');
          onAppJson(parsed);
          setAjKey(k=>k+1);
        }
      }catch(err){
        console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');
      }
    };
    reader.onerror=()=>setAjError('The file couldn\'t be opened. Try downloading it again from the customer\'s ticket.');
    reader.readAsText(file);
  },[onAppJson]);
  const selData=selectedAcct!==null?enrichedAccts[selectedAcct]:null;
  return <div className="cv-layout">
    <CVSidebar accts={enrichedAccts} namedAccts={enrichedAccts} selected={selectedAcct} onSelect={setSelectedAcct} errs={logData.errs} as={logData.analytics&&logData.analytics.appStarts} appJson={appJson}/>
    <div className="cv-main">
      <input key={ajKey} type="file" accept=".json" style={{display:'none'}} ref={appJsonRef} onChange={handleAppJsonPick}/>
      {appJson
        ?appJson.encrypted
          ?<div className="cv-sim-banner">
              <span>⚠ This customer has Ledger Sync enabled, which encrypts their account data. Balances and transactions can't be read from this file — only device info and token preferences. For full data, the customer would need to disable Ledger Sync and re-export.</span>
              <button onClick={()=>onAppJson(null)} style={{marginLeft:'auto',background:'none',border:'none',color:T.warning,cursor:'pointer',fontSize:11,fontWeight:600,padding:'0 4px',opacity:0.7}}>✕ Remove</button>
            </div>
          :bannerExpanded
            ?<div className="cv-enriched-banner">
                <span>{logData.accts.length===0
                  ?`✓ Showing ${appJson.accounts.length} accounts from app.json (log file contained no account data)`
                  :`✓ Enriched with app.json — showing real balances and ${appJson.accounts.length} accounts`}
                </span>
                <button onClick={()=>onAppJson(null)} style={{marginLeft:'auto',background:'none',border:'none',color:T.success,cursor:'pointer',fontSize:11,fontWeight:600,padding:'0 4px',opacity:0.7}}>✕ Remove</button>
              </div>
            :<div className="cv-enriched-banner" style={{padding:'4px 12px',fontSize:11,display:'flex',alignItems:'center',gap:6}}>
                <span style={{color:'#7AC26C'}}>✓ app.json loaded</span>
                <span onClick={()=>setBannerExpanded(true)} style={{color:'#949494',cursor:'pointer',fontSize:10}}>details ▸</span>
                <button onClick={()=>onAppJson(null)} style={{marginLeft:'auto',background:'none',border:'none',color:'#949494',cursor:'pointer',fontSize:11,padding:'0 4px'}}>✕</button>

            onDrop={handleAppJsonDrop}

            }}

            <div style={{width:32,height:32,borderRadius:8,background:'rgba(255,189,66,0.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ico.Upload/></div>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:2}}>Load customer's app.json</div>
              <div style={{fontSize:11,color:T.muted}}>Drop here or click to browse — adds real balances, transaction history, and account names</div>
            </div>
            <button onClick={e=>{e.stopPropagation();if(appJsonRef.current){appJsonRef.current.value='';appJsonRef.current.click();}}} style={{padding:'8px 16px',borderRadius:6,border:`1px solid ${T.warning}40`,background:T.warning+'12',color:T.warning,fontSize:11,fontWeight:600,cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>Browse</button>

      {ajError&&<div style={{background:'rgba(245,115,117,0.08)',border:'1px solid rgba(245,115,117,0.25)',borderRadius:6,padding:'8px 14px',marginBottom:12,fontSize:12,color:T.error}}>{ajError}</div>}

    </div>
    <CVInfoBar dev={logData.dev} as={as} port={port} accts={enrichedAccts} appJson={appJson}/>
  </div>;
}

const TABS=['Overview','Timeline','Accounts','Errors','Network'];

function JTNode({keyName,value,path,depth,expanded,onToggle,searchTerm,onCopyPath}){
  const type=value===null?'null':Array.isArray(value)?'array':typeof value;
  const isExpandable=type==='object'||type==='array';
  const isExpanded=isExpandable&&expanded.has(path);
  const entries=isExpandable?(type==='array'?value.map((v,i)=>[String(i),v]):Object.entries(value)):[];
  const matchesSearch=searchTerm&&(
    (keyName&&String(keyName).toLowerCase().includes(searchTerm))||
    (!isExpandable&&String(value).toLowerCase().includes(searchTerm))
  );
  const renderValue=()=>{
    if(value===null)return<span style={{color:T.muted,fontStyle:'italic'}}>null</span>;
    if(type==='boolean')return<span style={{color:T.error}}>{String(value)}</span>;
    if(type==='number')return<span style={{color:T.warning}}>{String(value)}</span>;
    if(type==='string'){const display=value.length>120?value.slice(0,120)+'…':value;return<span style={{color:T.success}}>"{display}"</span>;}
    return null;
  };
  const badge=isExpandable&&!isExpanded?<span style={{color:T.muted,fontSize:11,marginLeft:4}}>{type==='array'?`[${value.length} items]`:`{${Object.keys(value).length} keys}`}</span>:null;
  const openBracket=isExpandable&&isExpanded?<span style={{color:T.muted}}>{type==='array'?'[':'{'}</span>:null;
  const closeBracket=isExpandable&&isExpanded?<div style={{paddingLeft:depth>0?20:0}}><span style={{color:T.muted}}>{type==='array'?']':'}'}</span></div>:null;
  const[hovered,setHovered]=useState(false);
  return<div>
    <div className="jt-row" style={{paddingLeft:depth*20,background:matchesSearch?'rgba(187,176,255,0.1)':'transparent'}} onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      {isExpandable
        ?<span className="jt-arrow" onClick={()=>onToggle(path)} style={{cursor:'pointer',userSelect:'none',color:T.muted,display:'inline-block',width:16,textAlign:'center',transition:'transform 0.15s',transform:isExpanded?'rotate(90deg)':'none'}}>▶</span>
        :<span style={{display:'inline-block',width:16}}/>
      }
      {keyName!==null&&(()=>{const isIndex=/^\d+$/.test(keyName);return<><span style={{color:isIndex?T.muted:T.primary}}>{isIndex?keyName:`"${keyName}"`}</span><span style={{color:T.muted}}>: </span></>;})()}
      {isExpandable?(isExpanded?openBracket:badge):renderValue()}
      {hovered&&path&&<span className="jt-copy-path" onClick={e=>{e.stopPropagation();onCopyPath(path);}} title={`Copy path: ${path}`}>📋</span>}
    </div>
    {isExpanded&&(()=>{
      const capped=entries.length>500;
      const display=capped?entries.slice(0,500):entries;
      return<>
        {display.map(([k,v],i)=>(
          <JTNode key={k+i} keyName={k} value={v}
            path={type==='array'?`${path}[${k}]`:`${path}.${k}`}
            depth={depth+1} expanded={expanded} onToggle={onToggle}
            searchTerm={searchTerm} onCopyPath={onCopyPath}/>
        ))}
        {capped&&<div style={{paddingLeft:(depth+1)*20+16,color:T.muted,fontSize:11,fontStyle:'italic',padding:'4px 12px 4px '+(((depth+1)*20)+16)+'px'}}>… and {entries.length-500} more items</div>}
      </>;
    })()}
    {closeBracket}
  </div>;
}

function JTTree({data}){
  const[expanded,setExpanded]=useState(()=>new Set());
  const[search,setSearch]=useState('');
  const[copiedPath,setCopiedPath]=useState('');
  const searchLower=search.toLowerCase();
  const toggle=useCallback(path=>{
    setExpanded(prev=>{const next=new Set(prev);if(next.has(path))next.delete(path);else next.add(path);return next;});
  },[]);
  const expandToLevel=useCallback((maxDepth)=>{
    const paths=new Set();
    const walk=(val,path,depth)=>{
      if(depth>=maxDepth)return;
      if(val===null||typeof val!=='object')return;
      paths.add(path);
      if(Array.isArray(val)){val.forEach((v,i)=>walk(v,`${path}[${i}]`,depth+1));}
      else{Object.entries(val).forEach(([k,v])=>walk(v,`${path}.${k}`,depth+1));}
    };
    walk(data,'$',0);
    setExpanded(paths);
  },[data]);
  const collapseAll=useCallback(()=>setExpanded(new Set()),[]);
  const expandAll=useCallback(()=>expandToLevel(20),[expandToLevel]);
  const handleCopyPath=useCallback(path=>{
    const clean=path.replace(/^\$\.?/,'').replace(/^\$/,'');
    copyText(clean||'$');
    setCopiedPath(path);
    setTimeout(()=>setCopiedPath(''),1500);
  },[]);
  const matchCount=useMemo(()=>{
    if(!searchLower)return 0;
    let count=0;
    const walk=(val,key)=>{
      if(key&&String(key).toLowerCase().includes(searchLower))count++;
      if(val===null||typeof val!=='object'){if(String(val).toLowerCase().includes(searchLower))count++;return;}
      if(Array.isArray(val))val.forEach((v,i)=>walk(v,String(i)));
      else Object.entries(val).forEach(([k,v])=>walk(v,k));
    };
    walk(data,null);
    return count;
  },[data,searchLower]);
  return<div>
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{position:'relative',flex:'1 1 200px',maxWidth:320}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search keys and values..." className="mono"
          style={{width:'100%',padding:'8px 12px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,boxSizing:'border-box'}}/>
        {search&&<span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:matchCount>0?T.success:T.muted}}>{matchCount} match{matchCount!==1?'es':''}</span>}
      </div>
      <div style={{display:'flex',gap:4}}>
        <button onClick={collapseAll} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Collapse</button>
        <button onClick={()=>expandToLevel(1)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 1</button>
        <button onClick={()=>expandToLevel(2)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 2</button>
        <button onClick={()=>expandToLevel(3)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 3</button>
        <button onClick={expandAll} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>All</button>
      </div>
      {copiedPath&&<span style={{fontSize:10,color:T.success,fontWeight:600}}>Path copied!</span>}
    </div>
    <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
      <div style={{maxHeight:'75vh',overflowY:'auto',overflowX:'auto',padding:'12px 0'}}>
        <div className="mono" style={{fontSize:12,lineHeight:1.7}}>
          <JTNode keyName={null} value={data} path="$" depth={0} expanded={expanded} onToggle={toggle} searchTerm={searchLower} onCopyPath={handleCopyPath}/>
        </div>
      </div>
    </div>
  </div>;
}

function buildDeviceAppsLines(logData, isFull) {
  const req = logData?.requiredApps;
  if (!req || !req.length) return [];
  const da = logData.deviceApps;
  const lines = [];
  if (da?.source === 'manager-result') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const inst = da.installed.find(i => i.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      if (!inst) {
        lines.push(`  ${pad}  —         ✕ not installed`);
      } else if (inst.updated) {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ✓ up to date`);
      } else {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ⚠ outdated (${inst.availableVersion} available)`);
      }
    }
    if (isFull) {
      const rn = new Set(req.map(r => r.appName.toLowerCase()));
      const others = da.installed.filter(i => !rn.has(i.name.toLowerCase()));
      if (others.length > 0) lines.push(`  Other on device: ${others.map(a => `${a.name} ${a.version}`).join(', ')}`);
    }
    if(da.installed.length>0)lines.push(`  ${da.installed.length} apps installed`);
  } else if (da?.source === 'apdu-only') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const found = da.openedApps.find(a => a.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      lines.push(found
        ? `  ${pad}  ${(found.version||'').padEnd(10)}  (detected)`
        : `  ${pad}  —         not detected`);
    }
    lines.push('  Note: Only apps open during session were detected. Full data requires My Ledger.');
  } else {
    lines.push(`DEVICE APPS (${req.length} required — none detected, device not connected)`);
    lines.push(`  ${req.map(r => r.appName).join(', ')}`);
  }
  lines.push('');
  return lines;
}

function DiagSidebar({ logData, section, setSection }) {

  const accounts = logData ? logData.accts : [];

      `  Ledger Live: ${d.appVer || 'Unknown'}`,

      ...(accts.length > 10 ? [`  ... and ${accts.length - 10} more`] : []),

      `ERRORS (${errs.length})`,

      ...(errs.length > 8 ? [`  ... and ${errs.length - 8} more`] : []),
      '',
      `APDU exchanges: ${logData.apdu?.length || 0}`,
      `Log quality: ${logData.quality?.score || 0}/100 (${logData.quality?.label || '?'})`,
      '',
      'SESSION ACTIVITY',
      ...(()=>{const act=logData.activity||{};const flags=[];if(act.managerOpened)flags.push('  Manager opened');if(act.swapBrowsed)flags.push(`  Swap browsed${act.swapExecuted?'':' (not completed)'}`);if(act.deviceScan)flags.push('  Device scan active');return flags.length?flags:['  (none detected)'];})(),

  const buildFullText = () => {

        />

        {/* Advanced */}
        <SectionHeader
          icon={<span>⚙</span>} label="Advanced" subtitle="Network · Raw data"
          active={['network', 'raw'].includes(section)} expandable expanded={advOpen}
          onClick={() => setAdvOpen(o => !o)}
        />
        {advOpen && (
          <div>
            {advItems.map(item => (
              <div key={item.sec} onClick={() => setSection(item.sec)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 6, padding: '6px 16px 6px 28px', cursor: 'pointer', fontSize: 12,
                  color: section === item.sec ? '#BBB0FF' : '#CCCCCC',
                  background: section === item.sec ? 'rgba(187,176,255,0.08)' : 'transparent',
                  borderLeft: section === item.sec ? '3px solid #BBB0FF' : '3px solid transparent',
                }}
                onMouseEnter={e => { if (section !== item.sec) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = section === item.sec ? 'rgba(187,176,255,0.08)' : 'transparent'; }}>
                <span style={{ fontSize: 12 }}>{item.icon}</span>
                <span style={{ flex: 1 }}>{item.label}</span>
                {item.count != null && <span style={{ fontSize: 11, color: '#949494' }}>{item.count}</span>}
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

              <span className="card-bracket-b"/>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                <div className="card-header" style={{display:'flex',alignItems:'center',gap:8}}><Ico.Chip/> Device Apps</div>
                <button onClick={()=>setAppsListOpen(o=>!o)} style={{background:'transparent',border:'none',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:4}}>
                  {appsListOpen?'Collapse':'Expand'} {appsListOpen?<Ico.ChevD/>:<Ico.ChevR/>}
                </button>
              </div>
              <div style={{fontSize:12,color:T.muted,marginBottom:appsListOpen?12:0}}>{summary}</div>
              {appsListOpen&&<div>
                {rows.map(r=>(
                  <div key={r.n} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:`1px solid ${T.border}`,lineHeight:1.6}}>
                    <span style={{display:'flex',alignItems:'center',gap:6}}>
                      <span style={{fontWeight:700,fontSize:12,color:statusColor(r.status),width:12,textAlign:'center'}}>{statusIcon(r.status)}</span>
                      <span style={{fontSize:13}}>{r.n}</span>
                    </span>
                    <span className="mono" style={{fontSize:12,color:r.status==='missing'||r.status==='undetected'?T.muted:T.text}}>
                      {r.status==='ok'?r.ver:r.status==='outdated'?`${r.ver} → ${r.avail} available`:r.status==='detected'?`${r.ver} (detected)`:r.status==='missing'?'not installed':'not detected'}
                    </span>
                  </div>
                ))}
                {da?.source==='manager-result'&&da.installed.length>0&&<div style={{marginTop:8,fontSize:12,color:T.muted}}>{da.installed.length} apps installed</div>}
                {guidance&&<div style={{marginTop:6,fontSize:12,color:T.muted,fontStyle:'italic'}}>{guidance}</div>}
                {others.length>0&&<div style={{marginTop:10}}>
                  <button onClick={()=>setOtherAppsOpen(o=>!o)} style={{background:'transparent',border:'none',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',padding:0,display:'flex',alignItems:'center',gap:4}}>
                    Other installed apps ({others.length}) {otherAppsOpen?<Ico.ChevD/>:<Ico.ChevR/>}
                  </button>
                  {otherAppsOpen&&<div style={{marginTop:6}}>
                    {others.map(a=>(
                      <div key={a.name} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:`1px solid ${T.border}`,fontSize:12,color:T.muted}}>
                        <span>{a.name}</span><span className="mono">{a.version}</span>
                      </div>
                    ))}
                  </div>}
                </div>}
              </div>}
              {!appsListOpen&&guidance&&<div style={{marginTop:6,fontSize:12,color:T.muted,fontStyle:'italic'}}>{guidance}</div>}
            </div>}
            {/* APDU Exchanges section */}
            <div className="card-bracketed" style={{...crd,borderRadius:4,marginBottom:16}}>
              <span className="card-bracket-b"/>
              <div className="card-header" style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>APDU Exchanges</div>
              {logData.apdu.length===0
                ?<div style={{textAlign:'center',padding:'32px 24px',color:'#949494'}}>
                  <div style={{fontSize:28,marginBottom:12}}>📡</div>
                  <div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No device communication data found</div>
                  <div style={{fontSize:13,color:'#949494',maxWidth:320,margin:'0 auto',lineHeight:1.5}}>The customer's device was not connected during this session — this is expected if they exported logs without their device plugged in.</div>
                </div>
                :<div>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                    <span style={{fontSize:12,color:T.muted}}>{logData.apdu.length} APDU exchanges</span>
                    <button aria-label="Copy APDU exchanges to clipboard" onClick={()=>{copyText(logData.apdu.map(a=>[a.dir.toUpperCase(),fmtTime(a.ts),a.hex||''].join('\t')).join('\n'));setApduExportCopied(true);setTimeout(()=>setApduExportCopied(false),2000);}} style={{padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:600,background:T.success+'1A',color:T.success,border:`1px solid ${T.success}4D`,cursor:'pointer'}}>
                      {apduExportCopied?'Copied!':'Export APDUs'}
                    </button>
                  </div>
                  {rejections.length>0&&(()=>{
                    const counts={};rejections.forEach(a=>{const sw=a.hex.replace(/\s/g,'').slice(-4).toLowerCase();counts[sw]=(counts[sw]||0)+1;});
                    const [topCode,topCount]=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
                    const codeNames={'6985':'Conditions not satisfied','6982':'Security status not satisfied','6700':'Incorrect length','6e00':'INS not supported','5515':'Device locked','6a82':'File not found','6d00':'Invalid instruction','6f00':'Technical error'};
                    const codeName=codeNames[topCode]||'Unknown condition';
                    return<div style={{background:'rgba(255,189,66,0.10)',borderLeft:'3px solid #FFBD42',padding:'8px 12px',borderRadius:4,marginBottom:12,fontSize:13,color:'#FFBD42'}}>{rejections.length} device rejection{rejections.length>1?'s':''}. Most common: {topCode} — {codeName}.</div>;
                  })()}
                  <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
                    {logData.apdu.slice(0,500).map((a,i)=>{
                      const status=decodeApduStatus(a.hex,a.dir);
                      const claLabel=a.dir==='in'&&a.hex?`CLA:${a.hex.replace(/\s/g,'').slice(0,2).toUpperCase()}`:null;
                      return <div key={i} className="mono" style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:`1px solid ${T.border}`}}>
                        <span style={bdg(a.dir==='in'?'#8A9EF5':T.success)}>{a.dir==='in'?'→ IN':'← OUT'}</span>
                        <span style={{color:T.muted,fontSize:10,flexShrink:0}}>{fmtTime(a.ts)}</span>
                        <span style={{width:100,flexShrink:0,fontWeight:600,fontSize:11,color:status?status.color:T.muted}}>{status?status.label:claLabel||'—'}</span>
                        <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:T.text}}>{a.hex||'—'}</span>
                        {a.hex&&<CopyBtn text={a.hex}/>}
                      </div>;
                    })}
                    {logData.apdu.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {logData.apdu.length}</div>}
                  </div>
                </div>}
            </div>
            </div>{/* end scrollable */}
          </div>;
        })()}

        {/* Errors */}
        {section==='errors'&&(()=>{
          const allErrs=logData.errs;
          // O(N) pass: diagnose each error individually, then count repeating titles separately
          const baseDg=allErrs.map(e=>({...e,dg:diagnose(e.raw)}));
          const titleCounts={};for(const e of baseDg){const t=e.dg.t;titleCounts[t]=(titleCounts[t]||0)+1;}
          const enrichedErrs=baseDg.map(e=>{const c=titleCounts[e.dg.t];return c>1?{...e,dg:{...e.dg,repeatCount:c-1}}:e;});
          const errAcctMap=new Map();
          for(const e of enrichedErrs){
            const haystack=[e.dg?.r||'',e.raw?.message||'',e.raw?.error||'',JSON.stringify(e.raw?.data||'')].join(' ').toLowerCase();
            for(const a of logData.accts){if(a.addr&&a.addr.length>8&&haystack.includes(a.addr.toLowerCase())){errAcctMap.set(e.li,a);break;}}
          }
          const highCount=enrichedErrs.filter(e=>e.dg.s==='high').length;
          const medCount=enrichedErrs.filter(e=>e.dg.s==='medium').length;
          const lowCount=enrichedErrs.filter(e=>e.dg.s==='low').length;
          const topHigh=enrichedErrs.find(e=>e.dg.s==='high');
          const topMed=enrichedErrs.find(e=>e.dg.s==='medium');
          const repeating=enrichedErrs.filter(e=>e.dg.repeatCount>0);
          // Deduplicate repeating by title
          const seenTitles=new Set();
          const repeatingUniq=repeating.filter(e=>{if(seenTitles.has(e.dg.t))return false;seenTitles.add(e.dg.t);return true;});

          let summaryText='No issues detected — log appears healthy.';
          if(enrichedErrs.length>0){
            if(highCount>0){
              summaryText=`Log contains ${highCount} critical issue${highCount>1?'s':''} — ${topHigh.dg.t}. Immediate attention may be needed.`;
            } else if(medCount>0){
              summaryText=`Log shows ${medCount} warning${medCount>1?'s':''} including ${topMed.dg.t}. Review recommended.`;
            } else {
              summaryText='Log shows minor informational events only. No action required.';
            }
          }

          return <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
            {/* Severity summary bar */}
            {enrichedErrs.length>0&&<div style={{display:'flex',gap:16,marginBottom:16,padding:'12px 16px',background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,flexWrap:'wrap'}}>
              {[{label:'Critical',count:highCount,color:T.error},{label:'Warning',count:medCount,color:T.warning},{label:'Info',count:lowCount,color:'#8A9EF5'}].map(item=>(
                <div key={item.label} style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:item.color,display:'inline-block',flexShrink:0}}></span>
                  <span className="mono" style={{fontWeight:700,color:item.color}}>{item.count}</span>
                  <span style={{color:T.muted}}>{item.label}</span>
                </div>
              ))}
            </div>}

            {/* Error distribution bar */}
            {enrichedErrs.length>0&&(()=>{
              const cats=[{k:'hardware',c:T.error},{k:'software',c:T.warning},{k:'server',c:T.primary},{k:'unknown',c:T.muted}];
              const counts=cats.map(({k,c})=>({k,c,n:enrichedErrs.filter(e=>e.dg.c===k).length})).filter(x=>x.n>0);
              const total=counts.reduce((s,x)=>s+x.n,0);
              if(!total)return null;
              return <div style={{marginBottom:16}}>
                <div style={{display:'flex',height:8,borderRadius:4,overflow:'hidden',background:T.border}}>
                  {counts.map(x=><div key={x.k} style={{width:`${(x.n/total)*100}%`,background:x.c}}/>)}
                </div>
                <div style={{fontSize:11,color:T.muted,marginTop:5}}>{counts.map(x=>`${x.n} ${x.k}`).join(' · ')}</div>
              </div>;
            })()}
            {/* Diagnostic summary card */}
            <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'flex-start',gap:10}}>
              <span style={{fontSize:16,flexShrink:0}}>📋</span>
              <div style={{fontSize:13,color:T.text,lineHeight:1.6}}>{summaryText}</div>
            </div>

            {/* Repeating patterns */}
            {repeatingUniq.length>0&&<div style={{background:'rgba(255,189,66,0.06)',border:'1px solid rgba(255,189,66,0.25)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
              <div className="card-header" style={{color:T.warning,marginBottom:10}}>&#x27F3; Repeating Patterns</div>
              {repeatingUniq.map(e=>(
                <div key={e.li} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(255,189,66,0.1)',fontSize:13}}>
                  <span style={{color:T.text}}>{e.dg.t}</span>
                  <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,background:'rgba(255,189,66,0.15)',color:T.warning}}>{e.dg.repeatCount+1}× repeated</span>
                </div>
              ))}
            </div>}
            </div>{/* end fixed header */}
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
            {/* No errors state */}
            {enrichedErrs.length===0&&<div style={{textAlign:'center',padding:'48px 24px',color:'#949494'}}>
              <div style={{fontSize:32,marginBottom:12}}>✓</div>
              <div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No errors detected</div>
              <div style={{fontSize:13,color:'#949494',maxWidth:320,margin:'0 auto',lineHeight:1.5}}>If the customer reports an issue, ask them to reproduce it and export new logs immediately after.</div>
            </div>}

            {/* Category groups */}
            {['hardware','software','server','unknown'].map(cat=>{
              const g=enrichedErrs.filter(e=>e.dg.c===cat);if(!g.length)return null;
              const cm=CAT[cat]||CAT.unknown;
              return <div key={cat} style={{marginBottom:24}}>
                <div className="card-header" style={{color:T.muted,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>{cm.i}</span> {cm.l} ({g.length})</div>
                {g.map(e=><ErrCard key={e.li} err={e} onJump={jumpTo} linkedAcct={errAcctMap.get(e.li)||null} onGoAcct={goToAcct}/>)}
              </div>;
            })}
            </div>{/* end scrollable */}
          </div>;
        })()}

        {/* Network */}
        {section==='network'&&<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
          <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
          <div style={{fontSize:12,color:T.muted,marginBottom:12}}>{netEntries.length} requests</div>
          {netEntries.length>0&&(()=>{
            const errRequests=netEntries.filter(e=>{
              const status=e.status||e.statusCode||e.code||(e.data&&(e.data.status||e.data.statusCode||e.data.code));
              return status&&((Number(status)>=400&&Number(status)<600)||String(status).match(/^[45]/));
            });
            const serverErr=errRequests.filter(e=>{const s=Number(e.status||e.statusCode||e.code||(e.data&&(e.data.status||e.data.statusCode||e.data.code)));return s>=500||String(s).startsWith('5');}).length;
            const clientErr=errRequests.filter(e=>{const s=Number(e.status||e.statusCode||e.code||(e.data&&(e.data.status||e.data.statusCode||e.data.code)));return(s>=400&&s<500)||String(s).startsWith('4');}).length;
            return errRequests.length>0?(
              <div style={{background:'rgba(255,189,66,0.10)',borderLeft:'3px solid #FFBD42',padding:'8px 12px',borderRadius:4,marginBottom:0,fontSize:13,color:'#FFBD42'}}>
                {errRequests.length} request{errRequests.length>1?'s':''} returned errors ({serverErr} server, {clientErr} client).
              </div>
            ):null;
          })()}
          </div>{/* end fixed header */}
          <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
          {netEntries.length===0&&<div style={{textAlign:'center',padding:'48px 24px',color:'#949494'}}>
            <div style={{fontSize:32,marginBottom:12}}>🌐</div>
            <div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No network requests captured in this session. This is normal for short sessions or logs exported before a sync completed.</div>
          </div>}
          {netEntries.length>0&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
            {netEntries.slice(0,500).map(e=>{
              // Support both new format (data.method + message=url) and old format ("get https://..." in message)
              let method=sGet(e,'data.method','');
              let url=e.message||'';
              if(!method){
                const m=url.match(/^(get|post|put|patch|delete|head)\s+(https?:\/\/\S+)/i);
                if(m){method=m[1].toUpperCase();url=m[2];}
                else method='GET';
              }
              const body=sGet(e,'data.body','');
              let parsed=null;if(body){try{parsed=JSON.parse(body);}catch{}}
              const isUrl=url.startsWith('https://');
              return <div key={e.logIndex} style={{padding:'10px 14px',borderBottom:`1px solid ${T.border}`,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={bdg('#8A9EF5')}>{method}</span>
                    {isUrl?<a href={url} target="_blank" rel="noopener noreferrer" className="mono" style={{color:T.primary,textDecoration:'none'}}>{url}</a>:<span className="mono">{url}</span>}
                  </div>
                  <span className="mono" style={{color:T.muted,fontSize:10}}>{fmtTime(e.timestamp)}</span>
                </div>
                {parsed&&<div className="mono" style={{fontSize:10,color:T.muted,marginTop:4}}>→ {parsed.method}({parsed.params?.[0]?trunc(typeof parsed.params[0]==='string'?parsed.params[0]:JSON.stringify(parsed.params[0]),60):''})</div>}
              </div>;
            })}
            {netEntries.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {netEntries.length}</div>}
          </div>}
          </div>{/* end scrollable */}
        </div>}

        {/* APDU */}
        {section==='apdu'&&(()=>{
          function decodeApduStatus(hex,dir){
            if(!hex||dir==='in')return null;
            const sw=hex.replace(/\s/g,'').slice(-4).toLowerCase();
            const swMap={
              '9000':{label:'OK',color:T.success},
              '6985':{label:'Rejected',color:T.error},
              '6982':{label:'Locked',color:T.warning},
              '6a82':{label:'App not open',color:T.warning},
              '6700':{label:'Bad length',color:T.warning},
              '6d00':{label:'Bad INS',color:T.warning},
              '6e00':{label:'Wrong app',color:T.warning},
              '6f00':{label:'Tech error',color:T.error},
              '5515':{label:'Locked',color:T.warning},
            };
            return swMap[sw]||{label:`0x${sw.toUpperCase()}`,color:T.muted};
          }
          if(logData.apdu.length===0)return<div style={{textAlign:'center',padding:'48px 24px',color:'#949494'}}>
            <div style={{fontSize:32,marginBottom:12}}>📡</div>
            <div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No device communication data found</div>
            <div style={{fontSize:13,color:'#949494',maxWidth:320,margin:'0 auto',lineHeight:1.5}}>The customer's device was not connected during this session — this is expected if they exported logs without their device plugged in.</div>
          </div>;
          const rejections=logData.apdu.filter(a=>{
            if(!a.hex||a.dir==='in')return false;
            const sw=a.hex.replace(/\s/g,'').slice(-4).toLowerCase();
            return sw&&sw!=='9000';
          });
          return <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontSize:12,color:T.muted}}>{logData.apdu.length} APDU exchanges</span>
              <button aria-label="Copy APDU exchanges to clipboard" onClick={()=>{
                copyText(logData.apdu.map(a=>[a.dir.toUpperCase(),fmtTime(a.ts),a.hex||''].join('\t')).join('\n'));
                setApduExportCopied(true);
                setTimeout(()=>setApduExportCopied(false),2000);
              }} style={{padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:600,background:T.success+'1A',color:T.success,border:`1px solid ${T.success}4D`,cursor:'pointer'}}>
                {apduExportCopied?'Copied!':'Export APDUs'}
              </button>
            </div>
            {(()=>{
              if(rejections.length===0)return null;
              const counts={};
              rejections.forEach(a=>{const sw=a.hex.replace(/\s/g,'').slice(-4).toLowerCase();counts[sw]=(counts[sw]||0)+1;});
              const [topCode,topCount]=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
              const codeNames={'6985':'Conditions not satisfied','6982':'Security status not satisfied','6700':'Incorrect length','6e00':'INS not supported','5515':'Device locked','6a82':'File not found','6d00':'Invalid instruction','6f00':'Technical error'};
              const codeName=codeNames[topCode]||'Unknown condition';
              return(
                <div style={{background:'rgba(255,189,66,0.10)',borderLeft:'3px solid #FFBD42',padding:'8px 12px',borderRadius:4,marginBottom:12,fontSize:13,color:'#FFBD42'}}>
                  {rejections.length} device rejection{rejections.length>1?'s':''}. Most common: {topCode} — {codeName}.
                </div>
              );
            })()}
            <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden',maxHeight:'70vh',overflowY:'auto'}}>
              {logData.apdu.slice(0,500).map((a,i)=>{
                const status=decodeApduStatus(a.hex,a.dir);
                const claLabel=a.dir==='in'&&a.hex?`CLA:${a.hex.replace(/\s/g,'').slice(0,2).toUpperCase()}`:null;
                return <div key={i} className="mono" style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:`1px solid ${T.border}`}}>
                  <span style={bdg(a.dir==='in'?'#8A9EF5':T.success)}>{a.dir==='in'?'→ IN':'← OUT'}</span>
                  <span style={{color:T.muted,fontSize:10,flexShrink:0}}>{fmtTime(a.ts)}</span>
                  <span style={{width:100,flexShrink:0,fontWeight:600,fontSize:11,color:status?status.color:T.muted}}>
                    {status?status.label:claLabel||'—'}
                  </span>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:T.text}}>{a.hex||'—'}</span>
                  {a.hex&&<CopyBtn text={a.hex}/>}
                </div>;
              })}
              {logData.apdu.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {logData.apdu.length}</div>}
            </div>
          </div>;
        })()}
        {section==='raw'&&(()=>{
          let treeData=null;
          if(logData.rawText){
            try{treeData=JSON.parse(logData.rawText);}catch{}
            if(!treeData)treeData=logData.entries;
          }
          if(!treeData)return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}><div style={{flexShrink:0,padding:'20px 24px 12px'}}></div><div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px',textAlign:'center',color:T.muted}}>No file data available</div></div>;
          return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:T.muted}}>
                {Array.isArray(treeData)?`${treeData.length.toLocaleString()} entries`:'Object'}
              </div>
              <button onClick={()=>{copyText(logData.rawText);}} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                <Ico.Copy/> Copy raw text
              </button>
            </div>
            </div>{/* end fixed header */}
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
            <JTTree data={treeData}/>
            </div>{/* end scrollable */}
          </div>;
        })()}
      </div>
      </div>}
    </div>
  {logData&&viewMode==='customer'&&<CustomerView logData={logData} appJson={appJson} onAppJson={setAppJson}/>}
  </div>

}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  render(){
    if(this.state.hasError)return<div style={{minHeight:'100vh',background:'#131214',color:'#FFFFFF',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'sans-serif',textAlign:'center'}}><div><div style={{fontSize:24,marginBottom:12}}>⚠️</div><div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Something went wrong</div><div style={{fontSize:13,color:'#949494',marginBottom:16}}>Reload the page to try again.</div><button onClick={()=>window.location.reload()} style={{padding:'8px 20px',borderRadius:6,border:'none',background:'#BBB0FF',color:'#000',fontWeight:600,fontSize:13,cursor:'pointer'}}>Reload</button></div></div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
