function parseStatusData(data,logData){
  const components=(data?.summary?.components||data?.components);
  if(!components)return null;
  const degraded=[];
  for(const c of components){
    if(c.status&&c.status!=='operational'&&c.status!==''){
      const chainKey=Object.keys(STATUS_CHAIN_MAP).find(k=>c.name&&c.name.includes(k));
      if(chainKey){
        const chainId=STATUS_CHAIN_MAP[chainKey];
        // Only surface if relevant to loaded log
        const relevant=!logData||(chainId==='desktop'||chainId==='mobile'||logData.accts.some(a=>a.ch&&(a.ch.id===chainId||a.ch.ticker===chainKey)));
        if(relevant)degraded.push({name:c.name,status:c.status,chainId});
      }
    }
  }
  return degraded.length>0?degraded:null;
}

function diagnose(e,allErrors){
  const parts=[(e.message||''),sGet(e,'error.message',''),sGet(e,'payload.error',''),sGet(e,'payload.status','')].filter(Boolean);
  const h=parts.join(' | ')+' '+sGet(e,'queryArg.endpointName','');
  const SEV_RANK={high:3,medium:2,low:1};
  const matches=ERR_DB.filter(r=>{if(r.w){const re=new RegExp('(?:^|[\\s|/=:;,\'\".\\[\\(])'+r.m.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:$|[\\s|/=:;,\'\".\\]\\)])');return re.test(h);}return h.includes(r.m);});
  let result;
  if(matches.length>0){
    const best=matches.reduce((a,b)=>{
      const da=SEV_RANK[a.s]||0,db=SEV_RANK[b.s]||0;
      if(db!==da)return db>da?b:a;
      return b.m.length>a.m.length?b:a;
    });
    result={c:best.c,s:best.s,t:best.t,a:best.a,r:parts.join(' | ')};
    if(best.causes)result.causes=best.causes;
  }
  if(!result)result={c:'unknown',s:'low',t:'Unexpected error',a:'Review raw entry.',r:parts.join(' | ')};
  // Subcode extraction: if the best match is the generic TransportStatusError, try to find a more specific APDU subcode match
  if(result.t==='Device communication failed'){
    const subcodeMatch=h.match(/(0x[0-9a-fA-F]{4}|\b\d{4,5}\b)/);
    if(subcodeMatch){
      const code=subcodeMatch[1];
      const subMatches=ERR_DB.filter(r=>r.m===code);
      if(subMatches.length>0){
        const subBest=subMatches.reduce((a,b)=>{const da=SEV_RANK[a.s]||0,db=SEV_RANK[b.s]||0;if(db!==da)return db>da?b:a;return b.m.length>a.m.length?b:a;});
        result={c:subBest.c,s:subBest.s,t:subBest.t,a:subBest.a,r:parts.join(' | ')};
        if(subBest.causes)result.causes=subBest.causes;
      }
      result.subcode=code;
    }
  }
  if(allErrors){
    const sameTitle=allErrors.filter(other=>{const raw=other.raw||other;return raw!==e&&diagnose(raw).t===result.t;});
    if(sameTitle.length>0)result.repeatCount=sameTitle.length;
  }
  return result;
}

/* Parsing */
function parseLogs(text){
  // Strip UTF-8 BOM if present
  let raw=text;
  if(raw.charCodeAt(0)===0xFEFF)raw=raw.slice(1);
  const t=raw.trim();
  if(t[0]==='['||t[0]==='{'){
    try{
      const p=JSON.parse(t);
      const arr=Array.isArray(p)?p:[p];
      // Filter out non-objects, add logIndex if missing, normalise mobile fields
      return arr.filter(e=>e!==null&&typeof e==='object'&&!Array.isArray(e)).map((e,i)=>{
        const out=Object.assign({},e);
        if(out.logIndex==null)out.logIndex=i;
        // Mobile: logLevel -> level, tag -> type, date -> timestamp
        if(out.level==null&&out.logLevel!=null){out.level=String(out.logLevel).toLowerCase();delete out.logLevel;}
        if(out.type==null&&out.tag!=null){out.type=out.tag;delete out.tag;}
        if(out.timestamp==null&&out.date!=null){out.timestamp=out.date;}
        return out;
      });
    }catch{}
    // Pretty-printed JSON recovery: reconstruct objects by tracking brace depth
    try{
      const objects=[];
      let depth=0,start=-1,inString=false,escape=false;
      for(let i=0;i<raw.length;i++){
        const ch=raw[i];
        if(escape){escape=false;continue;}
        if(ch==='\\'&&inString){escape=true;continue;}
        if(ch==='"'){
          if(inString){
            // Validate: a real closing " is followed by a JSON structural char
            // (after optional whitespace): , : } ] or end of input
            let j=i+1;
            while(j<raw.length&&(raw[j]===' '||raw[j]==='\t'||raw[j]==='\n'||raw[j]==='\r'))j++;
            const nx=raw[j];
            if(nx===':'||nx===','||nx==='}'||nx===']'||j>=raw.length){
              inString=false;
            }
            // else: garbage " inside string — ignore it, don't toggle
          } else {
            // Entering a string — validate: preceded by a JSON structural char
            // (after optional whitespace): , : [ { or start of object
            let j=i-1;
            while(j>=0&&(raw[j]===' '||raw[j]==='\t'||raw[j]==='\n'||raw[j]==='\r'))j--;
            const px=raw[j];
            if(px===':'||px===','||px==='['||px==='{'||j<0){
              inString=true;
            }
            // else: garbage " outside expected context — ignore it
          }
          continue;
        }
        if(inString)continue;
        if(ch==='{'){if(depth===0)start=i;depth++;}
        else if(ch==='}'){
          depth--;
          if(depth===0&&start>=0){
            try{
              const obj=JSON.parse(raw.slice(start,i+1).replace(/[\x00-\x08\x0b\x0c\x0e-\x1f]/g,''));
              if(obj!==null&&typeof obj==='object'&&!Array.isArray(obj))objects.push(obj);
            }catch{}
            start=-1;
          }
        }
      }
      if(objects.length>0){
        return objects.map((e,i)=>{
          const out=Object.assign({},e);
          if(out.logIndex==null)out.logIndex=i;
          if(out.level==null&&out.logLevel!=null){out.level=String(out.logLevel).toLowerCase();delete out.logLevel;}
          if(out.type==null&&out.tag!=null){out.type=out.tag;delete out.tag;}
          if(out.timestamp==null&&out.date!=null){out.timestamp=out.date;}
          return out;
        });
      }
    }catch{}
  }
  // Line-by-line fallback (handles mixed JSON+text)
  return raw.split('\n').map((l,i)=>{
    const lt=l.trim();if(!lt)return null;
    try{
      const p=JSON.parse(lt);
      if(p===null||typeof p!=='object'||Array.isArray(p))return{logIndex:i,timestamp:'',type:'raw',level:'info',message:lt};
      const out=Object.assign({},p);
      if(out.logIndex==null)out.logIndex=i;
      if(out.level==null&&out.logLevel!=null){out.level=String(out.logLevel).toLowerCase();delete out.logLevel;}
      if(out.type==null&&out.tag!=null){out.type=out.tag;delete out.tag;}
      if(out.timestamp==null&&out.date!=null){out.timestamp=out.date;}
      return out;
    }catch{return{logIndex:i,timestamp:'',type:'raw',level:'info',message:lt};}
  }).filter(Boolean);
}

function synthesizeMobileMeta(entries, fileName) {
  // Detect mobile: entries have `date` field but no exportLogsMeta (desktop marker)
  const hasMeta = entries.some(e => e.message === 'exportLogsMeta');
  const hasMobileDate = entries.length > 0 && entries.some(e => e.date != null);
  if (hasMeta || !hasMobileDate) return entries;

  // Mobile logs are newest-first — reverse to chronological
  const sorted = entries.slice().reverse();
  sorted.forEach((e, i) => { e.logIndex = i; });

  // Extract account IDs from bridge schedule message
  const bridgeSchedule = sorted.find(e =>
    e.type === 'bridge' && typeof e.message === 'string' && e.message.startsWith('schedule ')
  );
  const ids = bridgeSchedule
    ? bridgeSchedule.message.slice(9).split(', ').map(s => s.trim()).filter(Boolean)
    : [];

  // Parse app version and platform from filename
  let appVersion = null, platform = null;
  const fnMatch = (fileName || '').match(/ledgerwallet-mob-([\d_.]+)-[_(](\d+)[_)]-/i);
  if (fnMatch) {
    appVersion = fnMatch[1].replace(/_/g, '.');
    const osCode = fnMatch[2];
    platform = osCode === '2' ? 'ios' : osCode === '1' ? 'android' : 'mobile';
  }

  // Inject synthetic exportLogsMeta so extractAccounts and extractDevice work
  const metaEntry = {
    logIndex: -1,
    timestamp: sorted[0]?.timestamp || '',
    type: 'synthetic',
    message: 'exportLogsMeta',
    accountsIds: ids,
    platform: platform || 'mobile',
    appVersion: appVersion,
    _isMobile: true
  };
  sorted.unshift(metaEntry);
  sorted.forEach((e, i) => { e.logIndex = i; });

  return sorted;
}

function llLabel(dev,isMobile){if(isMobile)return'LW Mobile';return dev?.appBrand==='wallet'?'Ledger Wallet':'Ledger Live';}
function llText(text,dev){if(!text||!dev)return text;if(dev.appBrand==='wallet')return text.replace(/Ledger Live/g,'Ledger Wallet');return text;}
function extractDevice(entries){
  const info={};
  const nes=v=>typeof v==='string'&&v.length>0; // non-empty string helper
  for(const e of entries){
    const d=e.data;
    if(d){
      if(nes(d.modelId)&&!info.modelId){info.modelId=d.modelId;info.modelName=DN[d.modelId]||d.modelId;}
      if(nes(d.deviceVersion)&&!info.fw)info.fw=d.deviceVersion;
      if(nes(d.firmwareVersion)&&!info.fw)info.fw=d.firmwareVersion;
      if(nes(d.firmware)&&!info.fw)info.fw=d.firmware;
      if(nes(d.seVersion)&&!info.fw)info.fw=d.seVersion;
      if(nes(d.deviceLanguage)&&!info.lang)info.lang=d.deviceLanguage;
      if(d.modelIdList!=null&&!info.devices)info.devices=d.modelIdList;
      if(nes(d.appVersion||d.version)&&!info.appVer)info.appVer=d.appVersion||d.version;
      if(nes(d.osType)&&!info.os)info.os=d.osType;
      if(nes(d.osVersion)&&!info.osVer)info.osVer=d.osVersion;
      if(nes(d.platform)&&!info.platform)info.platform=d.platform;
      // Guard: only set totalAccts when value is a positive number; never overwrite existing value with 0
      if(d.totalAccounts&&!info.totalAccts)info.totalAccts=d.totalAccounts;
      if(d.totalOperations&&!info.totalOps)info.totalOps=d.totalOperations;
      if(d.accountsWithFunds&&!info.fundedAccts)info.fundedAccts=d.accountsWithFunds;
      if(d.tokenWithFunds&&!info.fundedTokens)info.fundedTokens=d.tokenWithFunds;
      if(d.ledgerSyncActivated!==undefined&&info.ledgerSync===undefined)info.ledgerSync=d.ledgerSyncActivated;
      if(d.MEVProtectionActivated&&!info.mev)info.mev=d.MEVProtectionActivated;
    }
  }
  // D-4: extract device model/firmware from Manager API URL path params if not yet found from data fields
  if(!info.modelId||!info.fw){
    for(const e of entries){
      const msg=e.message||'';
      if(!msg.includes('manager.api.live.ledger.com'))continue;
      // URL pattern: /api/v2/apps/by-target?livecommonversion=...&target_id=...&firmware_version_name=...&device_type=nanoX
      if(!info.fw){const m=msg.match(/[?&]firmware_version_name=([^&\s]+)/i);if(m)info.fw=decodeURIComponent(m[1]);}
      if(!info.modelId){const m=msg.match(/[?&]device_type=([^&\s]+)/i);if(m){info.modelId=m[1];info.modelName=DN[m[1]]||m[1];}}
      if(info.modelId&&info.fw)break;
    }
  }
  // D-7: target_id masking — same algorithm as @ledgerhq/devices identifyTargetId
  // Scans data.targetId (numeric), target_id URL params, and API response data
  if(!info.modelId){
    for(const e of entries){
      let tid=null;
      // data.targetId (hw install events, manager entries)
      if(e.data?.targetId)tid=e.data.targetId;
      // data.data.target_id (get_device_version API response)
      else if(e.data?.data?.target_id)tid=e.data.data.target_id;
      // target_id in Manager API URL params
      else{const msg=e.message||'';if(msg.includes('target_id=')){const m=msg.match(/[?&]target_id=(\d+)/);if(m)tid=m[1];}}
      if(tid){
        const mid=identifyTargetId(tid);
        if(mid){info.modelId=mid;info.modelName=DN[mid]||mid;info.targetId=typeof tid==='string'?parseInt(tid,10):tid;break;}
      }
    }
  }
  // Store full target_id for Manager API calls (even if model was identified via other paths)
  if(!info.targetId){
    for(const e of entries){
      if(e.data?.targetId){info.targetId=typeof e.data.targetId==='string'?parseInt(e.data.targetId,10):e.data.targetId;break;}
      if(e.data?.data?.target_id){info.targetId=typeof e.data.data.target_id==='string'?parseInt(e.data.data.target_id,10):e.data.data.target_id;break;}
      const msg=e.message||'';if(msg.includes('target_id=')){const m=msg.match(/[?&]target_id=(\d+)/);if(m){info.targetId=parseInt(m[1],10);break;}}
    }
  }
  // D-5: Manager API get_device_version response — LLv4+
  // Response contains { data: { data: { name: "Nano S Plus", display_name: "Nano S Plus" } } }
  if(!info.modelId){
    for(const e of entries){
      if(e.type!=='network-success')continue;
      const msg=e.message||'';
      if(msg.indexOf('get_device_version')<0)continue;
      const nm=(e.data?.data?.name||e.data?.data?.display_name||'').trim().toLowerCase();
      if(!nm)continue;
      if(nm.includes('nano s plus')){info.modelId='nanoSP';info.modelName=DN.nanoSP;}
      else if(nm.includes('nano x')){info.modelId='nanoX';info.modelName=DN.nanoX;}
      else if(nm==='nano s'){info.modelId='nanoS';info.modelName=DN.nanoS;}
      else if(nm.includes('stax')){info.modelId='stax';info.modelName=DN.stax;}
      else if(nm.includes('flex')){info.modelId='europa';info.modelName=DN.europa;}
      else if(nm.includes('nano gen5')||nm.includes('gen 5')){info.modelId='apex';info.modelName=DN.apex;}
      if(info.modelId)break;
    }
  }
  // D-6: firmware path prefix from Manager install entries — LLv4+ DMK sessions
  // Path format: "nanos+/1.5.1/appname/app_version" — prefix = device, second segment = firmware
  if(!info.modelId||!info.fw){
    for(const e of entries){
      const fwPath=e.data?.firmware||e.data?.deleteKey||e.data?.firmwareKey||'';
      if(typeof fwPath!=='string'||!fwPath)continue;
      const m=fwPath.match(/^(nanos\+|nanox|nanos|stax|flex|apex_p|apex)\/([\d.]+)\//i);
      if(!m)continue;
      if(!info.modelId){
        const pfx=m[1].toLowerCase();
        const mid=pfx==='nanos+'?'nanoSP':pfx==='nanox'?'nanoX':pfx==='nanos'?'nanoS':pfx==='stax'?'stax':pfx==='flex'?'europa':(pfx==='apex_p'||pfx==='apex')?'apex':null;
        if(mid){info.modelId=mid;info.modelName=DN[mid]||mid;}
      }
      if(!info.fw)info.fw=m[2];
      if(info.modelId&&info.fw)break;
    }
  }
  // exportLogsMeta: check e.env / e.data?.env
  const meta=entries.find(e=>e.message==='exportLogsMeta');
  if(meta){
    const metaEnv=meta.env||(meta.data&&meta.data.env)||{};
    info.envBlock=metaEnv;
    if(meta.release)info.appVer=meta.release;
    if(meta.git_commit)info.commit=meta.git_commit;
    // userId: prefer explicit userId/anonymousId, fall back to userAnonymousId
    if(meta.userId&&!info.userId)info.userId=meta.userId;
    if(meta.anonymousId&&!info.userId)info.userId=meta.anonymousId;
    if(meta.userAnonymousId&&!info.userId)info.userId=meta.userAnonymousId;
    if(meta.accountsIds)info.accountIds=meta.accountsIds;
    if(meta.userAgent)info.userAgent=meta.userAgent;
    // Pull extra fields from envBlock
    if(nes(metaEnv.appVersion)&&!info.appVer)info.appVer=metaEnv.appVersion;
    if(nes(metaEnv.version)&&!info.appVer)info.appVer=metaEnv.version;
    if(nes(metaEnv.deviceVersion)&&!info.fw)info.fw=metaEnv.deviceVersion;
    if(nes(metaEnv.firmwareVersion)&&!info.fw)info.fw=metaEnv.firmwareVersion;
    if(nes(metaEnv.seVersion)&&!info.fw)info.fw=metaEnv.seVersion;
    if(nes(metaEnv.osType)&&!info.os)info.os=metaEnv.osType;
    if(nes(metaEnv.osVersion)&&!info.osVer)info.osVer=metaEnv.osVersion;
    if(nes(metaEnv.platform)&&!info.platform)info.platform=metaEnv.platform;
    // Mobile exports may put env fields directly on the meta entry (not nested)
    if(nes(meta.appVersion)&&!info.appVer)info.appVer=meta.appVersion;
    if(nes(meta.osType)&&!info.os)info.os=meta.osType;
    if(nes(meta.osVersion)&&!info.osVer)info.osVer=meta.osVersion;
    if(nes(meta.platform)&&!info.platform)info.platform=meta.platform;
  }
  // Derive app brand: 'wallet' or 'live'
  // Primary: parse userAgent for LedgerWallet vs LedgerLive
  if(info.userAgent){
    if(info.userAgent.includes('LedgerWallet'))info.appBrand='wallet';
    else if(info.userAgent.includes('LedgerLive'))info.appBrand='live';
  }
  // Fallback: version-based (4.x+ is Wallet; 2.132+ is transitional-era Wallet)
  if(!info.appBrand&&info.appVer){
    const v=parseFloat(info.appVer);
    info.appBrand=v>=2.132?'wallet':'live';
  }
  // Default
  if(!info.appBrand)info.appBrand='live';
  return info;
}

function extractAccounts(entries){
  const syncs=[];
  for(const e of entries){
    if(e.type!=='analytics'||!e.message?.includes('SyncSuccess')||e.message.includes('AllAccounts'))continue;
    const d=e.data;if(!d?.currencyName)continue;
    syncs.push({
      cn:d.currencyName,dm:d.derivationMode||'',fp:d.freshAddressPath||'',
      ops:d.operationsLength||0,dur:d.duration,toks:d.tokens||[],
      bal:d.balance??null,spendBal:d.spendableBalance??null,
      used:false
    });
  }
  const meta=entries.find(e=>e.message==='exportLogsMeta');
  const ids=meta?.accountsIds||[];
  const out=[];
  for(const id of ids){
    const p=id.split(':');if(p.length<4)continue;
    const cid=p[2];
    let addr,deriv;
    const last=p[p.length-1];
    // Derivation modes are short words (≤13 chars seen in practice); addresses are always ≥25 chars
    if(last.length<20){deriv=last;addr=p.slice(3,p.length-1).join(':');}
    else{deriv='';addr=p.slice(3).join(':');}
    const ch=getChain(cid);
    let sync=null;
    for(const sv of syncs){
      if(sv.used)continue;
      const cn=sv.cn.toLowerCase().replace(/[\s\-]/g,'_');
      if(cn===cid||cid.startsWith(cn)||cn.startsWith(cid.split('/')[0])){sync=sv;sv.used=true;break;}
    }
    const isXpub=['xpub','ypub','zpub','Ltub','Mtub','dgub'].some(pre=>addr.startsWith(pre));
    out.push({
      id,cid,ch,addr,dm:deriv,fp:sync?.fp||'',ops:sync?.ops||0,
      dur:sync?.dur??null,toks:sync?.toks||[],isXpub,
      bal:sync?.bal??null,spendBal:sync?.spendBal??null
    });
  }
  // LLv4+: bridge sync detection fallback
  // When no SyncSuccess analytics events exist, check for bridge SyncSession entries
  if(out.length>0&&!out.some(a=>a.dur!=null)){
    const bs=entries.find(e=>e.type==='bridge'&&e.message?.includes('SyncSession finished'));
    if(bs){
      const dm=bs.message.match(/duration=([\d.]+)s/);
      const totalDur=dm?parseFloat(dm[1]):0.001;
      for(const a of out)a.dur=totalDur;
    }
  }
  out.sort((a,b)=>b.ops-a.ops);
  return out;
}

function extractErrors(entries){
  const out=[];
  for(const e of entries){
    let isE=false,msg='';
    if(e.error){isE=true;msg=e.error.message||JSON.stringify(e.error);}
    const ps=sGet(e,'payload.status','');
    if(ps?.includes('ERROR')){isE=true;msg+=(msg?' | ':'')+(sGet(e,'payload.error','')||ps);}
    if(e.level==='error'||e.type==='error'){isE=true;if(!msg)msg=e.message||'';}
    if(e.message&&e.type!=='analytics'){
      const ml=e.message.toLowerCase();
      if(ml.includes('rejected')||ml.includes('failed')||ml.includes('error')){isE=true;if(!msg)msg=e.message;}
    }
    if(e.data?.error&&typeof e.data.error==='object'&&Object.keys(e.data.error).length===0&&e.message?.includes('failed')){isE=true;msg=e.message;}
    if(isE)out.push({li:e.logIndex,ts:e.timestamp,tp:e.type,msg:e.message,det:msg,dg:diagnose(e),raw:e});
  }
  return out;
}

function extractSync(entries){
  const e=entries.find(e=>e.type==='bridge'&&e.message?.includes('SyncSession finished'));
  if(!e)return null;
  const m=e.message.match(/duration=([\d.]+)s/);
  return m?m[1]:'?';
}

function extractApdu(entries){
  const out=[];
  for(const e of entries){
    const msg=(e.message||'').toLowerCase();
    const typ=(e.type||'').toLowerCase();
    let dir=null,hex=null;
    // Direct apdu-in / apdu-out messages
    if(e.message==='apdu-in'||msg==='apdu-in')dir='in';
    else if(e.message==='apdu-out'||msg==='apdu-out')dir='out';
    // Type contains 'apdu'
    else if(typ.includes('apdu')){dir=msg.includes('out')?'out':'in';}
    // live-dmk-logger entries with apdu data
    else if(e.type==='live-dmk-logger'&&(e.data?.apdu!=null||(e.data?.direction!=null))){
      const edir=(e.data?.direction||'').toLowerCase();
      dir=edir==='out'?'out':'in';
    }
    if(dir===null)continue;
    // Extract hex payload: e.data.apdu, e.apdu, or e.data.hex
    hex=e.data?.apdu||e.apdu||e.data?.hex||e.data?.raw||null;
    if(hex!=null)hex=String(hex);
    out.push({ts:e.timestamp,dir,hex,li:e.logIndex});
  }
  return out;
}

function logQualityScore(entries,dev,accts,errs,deviceApps){
  const details=[];
  let score=0;
  // Device model found: 10pts
  const hasModel=!!(dev.modelId||dev.modelName);
  details.push({field:'Device model',found:hasModel,note:hasModel?'Present':'Not found in logs'});
  if(hasModel)score+=10;
  // Firmware version found: 10pts
  const hasFw=!!dev.fw;
  details.push({field:'Firmware version',found:hasFw,note:hasFw?'Present':'Not found'});
  if(hasFw)score+=10;
  // App version found: 10pts
  const hasApp=!!dev.appVer;
  details.push({field:'App version',found:hasApp,note:hasApp?'Present':'Not found'});
  if(hasApp)score+=10;
  // At least 1 account with ops>0: 20pts
  const hasActiveAcct=accts.some(a=>a.ops>0);
  details.push({field:'Active account (ops>0)',found:hasActiveAcct,note:hasActiveAcct?`${accts.filter(a=>a.ops>0).length} active`:'No accounts with operations'});
  if(hasActiveAcct)score+=20;
  // OS info present: 5pts
  const hasOs=!!(dev.os||dev.osVer);
  details.push({field:'OS info',found:hasOs,note:hasOs?`${dev.os||''} ${dev.osVer||''}`.trim():'Not found'});
  if(hasOs)score+=5;
  // User ID present: 5pts
  const hasUser=!!dev.userId;
  details.push({field:'User ID',found:hasUser,note:hasUser?'Present':'Not found'});
  if(hasUser)score+=5;
  // Sync duration found: 10pts
  const hasSyncDur=accts.some(a=>a.dur!=null)||!!entries.find(e=>e.type==='bridge'&&e.message?.includes('SyncSession finished'));
  details.push({field:'Sync duration',found:hasSyncDur,note:hasSyncDur?'Present':'Not found'});
  if(hasSyncDur)score+=10;
  // No critical errors: 10pts (reduce by 5 per critical error, min 0)
  const criticalErrs=errs.filter(e=>e.dg&&e.dg.s==='high');
  const errPts=Math.max(0,10-criticalErrs.length*5);
  details.push({field:'No critical errors',found:criticalErrs.length===0,note:criticalErrs.length===0?'Clean':`${criticalErrs.length} critical error(s) (-${10-errPts}pts)`});
  score+=errPts;
  // Device app info present: 10pts
  const hasDeviceApp=deviceApps?.source==='manager-result'||deviceApps?.source==='apdu-only'||deviceApps?.source==='catalog-only';
  const deviceAppNote=(()=>{
    if(!deviceApps)return'No device app data (device may not have been connected)';
    if(deviceApps.source==='manager-result'){const n=deviceApps.installed?.length||0;return`${n} app${n!==1?'s':''} detected via Manager`;}
    if(deviceApps.source==='apdu-only'){const n=deviceApps.openedApps?.length||0;return`${n} app${n!==1?'s':''} detected via APDU`;}
    return'No device app data';
  })();
  details.push({field:'Device app info',found:hasDeviceApp,note:deviceAppNote});
  if(hasDeviceApp)score+=10;
  // Total entries > 100: 10pts
  const hasEnough=entries.length>100;
  details.push({field:'Log volume (>100 entries)',found:hasEnough,note:`${entries.length} entries`});
  if(hasEnough)score+=10;
  // Clamp to 0-100
  score=Math.max(0,Math.min(100,score));
  let label,color;
  if(score>=85){label='Excellent';color=T.success;}
  else if(score>=65){label='Good';color=T.primary;}
  else if(score>=40){label='Fair';color=T.warning;}
  else{label='Poor';color=T.error;}
  return{score,label,color,details};
}

function extractActivity(entries){
  let managerOpened=false,swapBrowsed=false,swapExecuted=false,deviceScan=false;
  for(const e of entries){
    const mlo=(e.message||'').toLowerCase();
    if(mlo.includes('manager.api.live.ledger.com/api'))managerOpened=true;
    if(mlo.includes('swap.ledger.com')){
      swapBrowsed=true;
      if((mlo.startsWith('post ')||mlo.includes('/v5/swap')||mlo.includes('/v5/exchange'))&&mlo.includes('swap.ledger.com'))swapExecuted=true;
    }
    if(e.type==='live-dmk-logger'&&(mlo.includes('available')||mlo.includes('transport')))deviceScan=true;
  }
  return{managerOpened,swapBrowsed,swapExecuted,deviceScan};
}

function extractAnalytics(entries){
  const res={appStarts:null,portfolio:null,syncAccts:[]};
  for(const e of entries){
    if(e.type!=='analytics')continue;
    const msg=e.message||'';
    const d=e.data||{};
    if(!res.appStarts&&msg.includes('App Start')){
      res.appStarts={
        accountsWithFunds:d.accountsWithFunds,tokenWithFunds:d.tokenWithFunds,
        modelId:d.modelId,modelIdList:d.modelIdList,deviceVersion:d.deviceVersion,
        deviceLanguage:d.deviceLanguage,appVersion:d.appVersion,osType:d.osType,
        osVersion:d.osVersion,platform:d.platform,userId:d.userId
      };
    }
    if(!res.portfolio&&msg.includes('Portfolio')){
      res.portfolio={
        totalAccounts:d.totalAccounts,totalCurrencies:d.totalCurrencies,
        totalOperations:d.totalOperations,ledgerSyncActivated:d.ledgerSyncActivated,
        MEVProtectionActivated:d.MEVProtectionActivated,stakeableAssets:d.stakeableAssets
      };
    }
    if(msg.includes('SyncSuccess')&&d.currencyName){
      res.syncAccts.push({
        currencyName:d.currencyName,derivationMode:d.derivationMode,
        freshAddressPath:d.freshAddressPath,operationsLength:d.operationsLength,
        tokens:d.tokens,tokensLength:d.tokensLength
      });
    }
  }
  return res;
}

function extractDeviceApps(entries){
  // Primary: actions-manager-event with a full installed app list
  for(const e of entries){
    if(e.type==='actions-manager-event'&&e.message==='result'&&Array.isArray(e.data?.result?.installed)&&e.data.result.installed.length>0){
      const fw=e.data.result.firmware;
      return{
        installed:e.data.result.installed,
        deviceModelId:e.data.result.deviceModelId||null,
        deviceInfo:e.data.result.deviceInfo||null,
        firmware:fw?{id:fw.id,name:fw.name,version:fw.version}:null,
        source:'manager-result'
      };
    }
  }
  // Secondary: live-dmk-logger APDU exchange responses (GetAppAndVersion format)
  const seen={};
  for(const e of entries){
    if(e.type!=='live-dmk-logger')continue;
    const msg=e.message||'';
    if(!msg.includes('[exchange] <='))continue;
    const raw=msg.split('[exchange] <=')[1]?.trim();
    if(!raw)continue;
    const hex=raw.replace(/\s+/g,'').toLowerCase();
    if(!hex.startsWith('01')||!hex.endsWith('9000'))continue;
    // TLV: [01][name_len][name_bytes][02][ver_len][ver_bytes][9000]
    const payload=hex.slice(0,-4); // strip trailing 9000
    let i=2; // skip tag 01
    if(i>=payload.length)continue;
    const nameLen=parseInt(payload.substr(i,2),16);i+=2;
    if(isNaN(nameLen)||i+nameLen*2>payload.length)continue;
    const name=payload.substr(i,nameLen*2).replace(/../g,h=>String.fromCharCode(parseInt(h,16)));
    i+=nameLen*2;
    if(!name||name==='BOLOS')continue;
    if(payload.substr(i,2)==='02')i+=2; // skip optional version tag
    if(i>=payload.length)continue;
    const verLen=parseInt(payload.substr(i,2),16);i+=2;
    if(isNaN(verLen)||i+verLen*2>payload.length)continue;
    const version=payload.substr(i,verLen*2).replace(/../g,h=>String.fromCharCode(parseInt(h,16)));
    const ts=e.timestamp||null;
    if(!seen[name]||ts>seen[name].timestamp)seen[name]={name,version,timestamp:ts,source:'apdu'};
  }
  const openedApps=Object.values(seen);
  if(openedApps.length>0)return{installed:null,openedApps,deviceModelId:null,deviceInfo:null,source:'apdu-only'};
  // Tertiary: LLv4+ — hw install events + apps-by-target catalog
  const sessionInstalls=[];
  const appCatalog={};
  for(const e of entries){
    if(e.type==='hw'&&e.message==='Install app'&&e.data?.appName){
      if(!sessionInstalls.find(a=>a.name===e.data.appName)){
        sessionInstalls.push({name:e.data.appName,version:e.data.appVersion||'?'});
      }
    }
    if(e.type==='network-success'&&(e.message||'').includes('apps/by-target')){
      const apps=e.data?.data;
      if(Array.isArray(apps)){
        for(const app of apps){
          if(app.versionName&&app.version){
            const key=app.versionName.toLowerCase();
            if(!appCatalog[key]||app.versionId>appCatalog[key].vid){
              appCatalog[key]={name:app.versionName,version:app.version,cid:app.currencyId||null,vid:app.versionId||0};
            }
          }
        }
      }
    }
  }
  if(sessionInstalls.length>0||Object.keys(appCatalog).length>0){
    return{installed:null,openedApps:null,sessionInstalls,appCatalog,deviceModelId:null,deviceInfo:null,firmware:null,source:'catalog-only'};
  }
  return null;
}

function inferRequiredApps(accounts){
  const byApp={};
  for(const acct of accounts){
    const appName=CURRENCY_TO_APP[acct.cid];
    if(!appName)continue;
    if(!byApp[appName])byApp[appName]={appName,currencyIds:[],chains:[]};
    if(!byApp[appName].currencyIds.includes(acct.cid)){
      byApp[appName].currencyIds.push(acct.cid);
      byApp[appName].chains.push(acct.ch);
    }
  }
  return Object.values(byApp);
}

function parseAppJson(text){
  try{
    text=Array.from(text).filter(ch=>{const c=ch.charCodeAt(0);return c>=0x20||c===0x0a||c===0x09;}).join('');
    const raw=JSON.parse(text);
    const data=raw.data||raw;
    const rawAccounts=data.accounts;
    const encrypted=rawAccounts&&!Array.isArray(rawAccounts);
    const accounts=Array.isArray(rawAccounts)?rawAccounts.map(a=>{
      const d=a.data||a;
      return{
        id:d.id,name:d.name||'',currencyId:d.currencyId,
        balance:d.balance,spendableBalance:d.spendableBalance,
        operationsCount:d.operationsCount||0,
        operations:(d.operations||[]).map(op=>({
          type:op.type,value:op.value,fee:op.fee,date:op.date,hash:op.hash,
          senders:op.senders||[],recipients:op.recipients||[],
          hasFailed:op.hasFailed||false,blockHeight:op.blockHeight
        })),
        subAccounts:(d.subAccounts||[]).map(s=>({
          tokenId:s.tokenId,type:s.type,balance:s.balance,
          spendableBalance:s.spendableBalance,operationsCount:s.operationsCount||0,
          operations:(s.operations||[]).slice(0,50).map(op=>({
            type:op.type,value:op.value,fee:op.fee,date:op.date,hash:op.hash,
            senders:op.senders||[],recipients:op.recipients||[],hasFailed:op.hasFailed||false
          }))
        })),
        freshAddress:d.freshAddress,derivationMode:d.derivationMode,
        blockHeight:d.blockHeight,starred:d.starred
      };
    }):[];
    const byId={};
    accounts.forEach(a=>{if(a.id)byId[a.id]=a;});
    // Extract readable data from encrypted app.json
    const settings=data.settings||{};
    const devices=settings.devicesModelList||settings.modelIdList||[];
    const lastDevice=settings.lastSeenDevice||null;
    const discover=data.discover||{};
    const cryptoTokens=(data.cryptoAssets&&data.cryptoAssets.tokens)||[];
    const discoverAcctIds=Object.values(discover.currentAccountHist||{}).filter(v=>typeof v==='string'&&v.startsWith('js:2:'));
    return{accounts,byId,raw:data,encrypted,
      settings:{devices,lastDevice,counterValue:settings.counterValue,language:settings.language,locale:settings.locale},
      cryptoTokens,discoverAcctIds};
  }catch(e){console.error('parseAppJson error:',e.message,'at position:',e.message.match(/position (\d+)/)?.[1]);return null;}
}

function Tooltip({children,tip}){

function HighlightText({text,term}){
  if(!term||!text)return <span>{text||''}</span>;
  const lower=text.toLowerCase();
  const idx=lower.indexOf(term.toLowerCase());
  if(idx===-1)return <span>{text}</span>;
  return <span>
    {text.slice(0,idx)}
    <mark style={{background:'#f59e0b33',color:'#fbbf24',borderRadius:2,padding:'0 1px'}}>{text.slice(idx,idx+term.length)}</mark>
    {text.slice(idx+term.length)}
  </span>;
}

function ErrCard({err,onJump,linkedAcct,onGoAcct,dev,entries,onGoNetwork,onGoApdu}){

  const[detOpen,setDetOpen]=useState(false);
  const[ctxOpen,setCtxOpen]=useState(false);
  const evidence=useMemo(()=>{
    if(!entries||entries.length===0)return null;
    const errIdx=entries.findIndex(e=>e.logIndex===err.li);
    if(errIdx<1)return null;
    const errTime=new Date(err.ts).getTime();
    const windowMs=5000;
    const preceding=[];
    for(let i=errIdx-1;i>=0;i--){
      const t=new Date(entries[i].timestamp).getTime();
      if(errTime-t>windowMs)break;
      preceding.push({...entries[i],delta:((errTime-t)/1000)});
    }
    if(preceding.length===0)return null;
    const netFails=preceding.filter(e=>e.type==='network'&&(
      (e.data?.status>=400)||(e.level==='error')||(e.message||'').toLowerCase().includes('fail')
    ));
    const apduRejects=preceding.filter(e=>{
      const msg=((e.message||'')+(JSON.stringify(e.data||''))).toLowerCase();
      return (e.type||'').toLowerCase().includes('apdu')&&(/6985|6982|6a82|6984|5515/.test(msg));
    });
    const syncEntries=preceding.filter(e=>(e.message||'').toLowerCase().includes('sync'));
    const otherErrors=preceding.filter(e=>e.level==='error'&&e.logIndex!==err.li);
    if(netFails.length===0&&apduRejects.length===0&&syncEntries.length===0&&otherErrors.length===0)return null;
    const maxDelta=Math.max(...preceding.map(e=>e.delta));
    const windowLabel=maxDelta<1?`${Math.round(maxDelta*1000)}ms`:`${maxDelta.toFixed(1)}s`;
    return{netFails,apduRejects,syncEntries,otherErrors,windowLabel};
  },[entries,err.li,err.ts]);
  return <div className="err-hover" style={{background:sv.bg,border:`1px solid ${sv.bd}`,borderLeft:`3px solid ${sv.c}`,borderRadius:8,padding:16,marginBottom:12,transition:I.fast,borderTop:`1px solid rgba(255,255,255,0.04)`,boxShadow:`inset 6px 0 16px -4px ${sv.c}35`}}>

      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:18}}>{ct.i}</span>
        <div>
          <div style={{fontSize:15,fontWeight:600,color:sv.c}}>{d.t}</div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>
            {ct.l} · {onJump?<span onClick={()=>onJump(err.li)} style={{cursor:'pointer',color:T.primary,textDecoration:'underline'}}>#{err.li}</span>:<span>#{err.li}</span>} · {fmtTime(err.ts)}
          </div>
        </div>
      </div>
      <span role="button" tabIndex={0} onClick={()=>setDetOpen(o=>!o)} onKeyDown={ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();setDetOpen(o=>!o);}}} style={{fontFamily:MF,padding:'4px 10px',borderRadius:6,fontSize:10,fontWeight:600,background:'rgba(255,255,255,0.06)',color:T.muted,border:`1px solid ${T.border}`,display:'inline-flex',alignItems:'center',gap:4,cursor:'pointer',letterSpacing:'0.03em'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>Details {detOpen?<Ico.ChevD/>:<Ico.ChevR/>}</span>
    </div>
    <div style={{fontSize:13,color:T.text,paddingLeft:34}}>{llText(d.a,dev)}</div>
    {(()=>{const u=errUrl(d);return u?<div style={{paddingLeft:34,marginTop:6}}><a href={u} target="_blank" rel="noopener" style={{fontSize:11,color:T.orange,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:3}} onMouseEnter={e=>{e.currentTarget.style.textDecoration='underline';}} onMouseLeave={e=>{e.currentTarget.style.textDecoration='none';}}>📄 Help article ↗</a></div>:null;})()}

      <span style={{fontFamily:MF,padding:'2px 8px',borderRadius:4,fontSize:9,fontWeight:700,background:sv.bg,color:sv.c,border:`1px solid ${sv.bd}`,letterSpacing:'0.06em'}}>{sv.l.toUpperCase()}</span>
      {d.repeatCount>0&&<span style={{fontFamily:MF,padding:'2px 8px',borderRadius:4,fontSize:9,fontWeight:700,background:'rgba(255,189,66,0.15)',color:T.warning,border:'1px solid rgba(255,189,66,0.3)',letterSpacing:'0.04em'}}>&#x27F3; {d.repeatCount+1}× repeated</span>}
    </div>
    {onJump&&<div style={{paddingLeft:34,marginTop:8}}>
      <span onClick={()=>onJump(err.li)} style={{fontFamily:MF,display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:6,fontSize:10,fontWeight:600,cursor:'pointer',background:'rgba(255,255,255,0.04)',border:`1px solid ${T.border}`,color:T.muted,transition:I.fast,letterSpacing:'0.03em'}}

      const crumbs=entries.slice(start,errIdx);
      if(crumbs.length===0)return null;
      const errTime=new Date(err.ts).getTime();
      return <div style={{paddingLeft:34,marginTop:12}}>

        </div>
        {ctxOpen&&<div style={{borderLeft:`2px solid ${T.border}`,paddingLeft:10}}>
          {crumbs.map((c,i)=>{
            const delta=((errTime-new Date(c.timestamp).getTime())/1000);
            const deltaLabel=delta<1?`−${(delta*1000).toFixed(0)}ms`:`−${delta.toFixed(1)}s`;
            const typeColor=TC[c.type?.toLowerCase()]||'#717070';

              <span style={{fontFamily:MF,color:T.muted,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{trunc(c.message,60)}</span>
            </div>;
          })}
          <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 0',fontSize:11,marginTop:2}}>

            <span style={{display:'inline-block',padding:'1px 6px',borderRadius:4,fontSize:9,fontWeight:700,background:sv.c+'22',color:sv.c,fontFamily:MF,flexShrink:0}}>{err.raw?.type||'error'}</span>
            <span className="mono" style={{color:sv.c,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,fontWeight:600}}>{trunc(err.msg||err.dg.t,60)}</span>

    {evidence&&<div style={{paddingLeft:34,marginTop:12}}>

        </span>}
        {evidence.apduRejects.length>0&&<span onClick={()=>{if(onGoApdu)onGoApdu();}} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(187,176,255,0.08)',border:'1px solid rgba(187,176,255,0.20)',color:T.primary,transition:I.fast,width:'fit-content'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(187,176,255,0.15)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(187,176,255,0.08)'}>
          <span style={{fontSize:13}}>📡</span>
          {evidence.apduRejects.length} APDU rejection{evidence.apduRejects.length!==1?'s':''} at −{evidence.apduRejects[0].delta.toFixed(1)}s
          <span style={{color:T.muted,marginLeft:4}}>→</span>
        </span>}
        {evidence.syncEntries.length>0&&<span onClick={()=>{if(onJump)onJump(evidence.syncEntries[0].logIndex);}} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,cursor:'pointer',background:'rgba(122,194,108,0.08)',border:'1px solid rgba(122,194,108,0.20)',color:T.success,transition:I.fast,width:'fit-content'}} onMouseEnter={e=>e.currentTarget.style.background='rgba(122,194,108,0.15)'} onMouseLeave={e=>e.currentTarget.style.background='rgba(122,194,108,0.08)'}>
          <span style={{fontSize:13}}>🔄</span>
          Sync active at time of error
          <span style={{color:T.muted,marginLeft:4}}>→ Timeline</span>
        </span>}
        {evidence.otherErrors.length>0&&evidence.netFails.length===0&&evidence.apduRejects.length===0&&<span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:'rgba(228,0,70,0.08)',border:'1px solid rgba(228,0,70,0.20)',color:T.error,width:'fit-content'}}>
          {evidence.otherErrors.length} other error{evidence.otherErrors.length!==1?'s':''} in {evidence.windowLabel} window
        </span>}
      </div>
    </div>}
    {d.causes&&d.causes.length>0&&<div style={{paddingLeft:34,marginTop:10}}>
      <span style={{fontFamily:MF,color:T.muted,marginRight:6,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Common causes:</span>
      {d.causes.map(cause=><span key={cause} style={{display:'inline-block',padding:'2px 8px',borderRadius:4,fontSize:10,fontFamily:MF,letterSpacing:'0.02em',background:'rgba(255,255,255,0.06)',color:T.muted,marginRight:4,marginBottom:4}}>{llText(cause,dev)}</span>)}
    </div>}
    {detOpen&&<div className="error-detail" style={{paddingLeft:34,marginTop:12,borderTop:`1px solid ${sv.bd}`,paddingTop:10}}>
      <div style={{fontFamily:MF,color:sv.c,marginBottom:6,fontSize:10,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Technical Details</div>
      <pre className="mono" style={{color:T.text,whiteSpace:'pre-wrap',wordBreak:'break-all',margin:0}}>{d.r}</pre>
    </div>}
  </div>;
}

/* Xpub Scanner — full address derivation + balance lookup */
const UTXO_NETS={
  BTC:{bech32:'bc',pubKeyHash:0x00,scriptHash:0x05,wif:0x80,label:'Bitcoin',color:'#f7931a',delay:200,
    fetchBal:(addr,cb)=>{
      fetch(`https://mempool.space/api/address/${encodeURIComponent(addr)}`)
        .then(r=>r.json())
        .then(d=>{
          const b=(d.chain_stats.funded_txo_sum-d.chain_stats.spent_txo_sum)/1e8;
          cb(null,{bal:b,txs:d.chain_stats.tx_count+d.mempool_stats.tx_count});
        })
        .catch(()=>{
          // Fallback to Blockchair
          fetch(`https://api.blockchair.com/bitcoin/dashboards/address/${encodeURIComponent(addr)}`)
            .then(r=>r.json())
            .then(d=>{
              const stats=d.data?.[addr]?.address;
              if(!stats)return cb(new Error('no data'));
              const b=(stats.balance)/1e8;
              cb(null,{bal:b,txs:stats.transaction_count||0});
            })
            .catch(e=>cb(e));
        });
    },
    addrUrl:a=>`https://mempool.space/address/${a}`},
  LTC:{bech32:'ltc',pubKeyHash:0x30,scriptHash:0x32,wif:0xb0,label:'Litecoin',color:'#345d9d',delay:650,
    fetchBal:(addr,cb)=>{fetch(`https://api.blockcypher.com/v1/ltc/main/addrs/${encodeURIComponent(addr)}/balance`).then(r=>{
      if(r.status===429){cb._retries=(cb._retries||0)+1;if(cb._retries>5){cb(new Error('Rate limited (429)'));return null;}if(cb._warn)cb._warn(`Rate limited — retrying ${cb._retries}/5…`);setTimeout(()=>{if(cb._ctx?.stop)return;UTXO_NETS.LTC.fetchBal(addr,cb);},1500*cb._retries);return null;}return r.json();
    }).then(d=>{if(d){if(cb._warn)cb._warn('');cb(null,{bal:d.final_balance/1e8,txs:d.n_tx});}}).catch(e=>cb(e));},
    addrUrl:a=>`https://blockchair.com/litecoin/address/${a}`},
  DOGE:{bech32:'doge',pubKeyHash:0x1e,scriptHash:0x16,wif:0x9e,label:'Dogecoin',color:'#ba9f33',delay:650,
    fetchBal:(addr,cb)=>{fetch(`https://api.blockcypher.com/v1/doge/main/addrs/${encodeURIComponent(addr)}/balance`).then(r=>{
      if(r.status===429){cb._retries=(cb._retries||0)+1;if(cb._retries>5){cb(new Error('Rate limited (429)'));return null;}if(cb._warn)cb._warn(`Rate limited — retrying ${cb._retries}/5…`);setTimeout(()=>{if(cb._ctx?.stop)return;UTXO_NETS.DOGE.fetchBal(addr,cb);},1500*cb._retries);return null;}return r.json();
    }).then(d=>{if(d){if(cb._warn)cb._warn('');cb(null,{bal:d.final_balance/1e8,txs:d.n_tx});}}).catch(e=>cb(e));},
    addrUrl:a=>`https://blockchair.com/dogecoin/address/${a}`},
  BCH:{bech32:'bitcoincash',pubKeyHash:0x00,scriptHash:0x05,wif:0x80,label:'Bitcoin Cash',color:'#8dc351',delay:100,
    fetchBal:(addr,cb)=>{fetch(`https://api.blockchair.com/bitcoin-cash/dashboards/address/${encodeURIComponent(addr)}`).then(r=>r.json()).then(d=>{const s=d.data?.[addr]?.address;if(!s)return cb(new Error('no data'));cb(null,{bal:s.balance/1e8,txs:s.transaction_count||0});}).catch(e=>cb(e));},
    addrUrl:a=>`https://blockchair.com/bitcoin-cash/address/${a}`},
};

function XpubView({xpub,coin,dm}){
  const net=UTXO_NETS[coin];
  const[running,setRunning]=useState(false);
  const[results,setResults]=useState([]);
  const[stats,setStats]=useState(null);
  const[progress,setProgress]=useState({chain:0,idx:0,gap:0});
  const[scanErr,setScanErr]=useState('');
  const[scanWarn,setScanWarn]=useState('');
  const[libReady,setLibReady]=useState(false);
  const libRef=useRef({});
  // Each scan gets its own ctx object; old callbacks check ctx.stop before touching state
  const ctxRef=useRef(null);

  useEffect(()=>{
    const check=()=>{
      if(window.bitcoinjsLib&&window.buffer&&window.bs58){
        window.Buffer=window.buffer.Buffer;
        libRef.current={bitcoin:window.bitcoinjsLib,bs58:window.bs58};
        setLibReady(true);
        return true;
      }
      return false;
    };
    if(check())return;
    const iv=setInterval(()=>{if(check())clearInterval(iv);},200);
    const to=setTimeout(()=>{clearInterval(iv);if(!libRef.current.bitcoin)setScanErr('Crypto libraries failed to load. Open this HTML file locally (not in an iframe).');},10000);
    return()=>{clearInterval(iv);clearTimeout(to);};
  },[]);

  const convertXpub=key=>{
    try{
      const{bs58,bitcoin}=libRef.current;
      let raw=bs58.decode(key);raw=raw.slice(0,raw.length-4);
      const data=raw.slice(4);
      const pre=window.Buffer.from('0488b21e','hex');
      const payload=window.Buffer.concat([pre,data]);
      const h=bitcoin.crypto.sha256(bitcoin.crypto.sha256(payload));
      return bs58.encode(window.Buffer.concat([payload,h.slice(0,4)]));
    }catch{return key;}
  };

  const getAddr=(pub)=>{
    const{bitcoin}=libRef.current;
    let addrType='p2pkh';
    const pfx=xpub.slice(0,4);
    if(pfx==='ypub')addrType='p2sh-p2wpkh';
    else if(pfx==='zpub')addrType='p2wpkh';
    if(dm==='native_segwit')addrType='p2wpkh';
    else if(dm==='segwit')addrType='p2sh-p2wpkh';
    else if(dm==='legacy'||dm==='')addrType='p2pkh';
    if(coin==='DOGE'||coin==='BCH')addrType='p2pkh';
    if(addrType==='p2wpkh')return bitcoin.payments.p2wpkh({pubkey:pub,network:net}).address;
    if(addrType==='p2sh-p2wpkh'){const inner=bitcoin.payments.p2wpkh({pubkey:pub,network:net});return bitcoin.payments.p2sh({redeem:inner,network:net}).address;}
    return bitcoin.payments.p2pkh({pubkey:pub,network:net}).address;
  };

  const doStop=()=>{if(ctxRef.current)ctxRef.current.stop=true;};

  const doScan=()=>{
    // Cancel any previous scan so its callbacks ignore state
    if(ctxRef.current)ctxRef.current.stop=true;
    const ctx={stop:false};
    ctxRef.current=ctx;

    setRunning(true);setScanErr('');setScanWarn('');setResults([]);setStats(null);setProgress({chain:0,idx:0,gap:0});
    const{bitcoin}=libRef.current;
    let node;
    try{node=bitcoin.bip32.fromBase58(convertXpub(xpub),bitcoin.networks.bitcoin);}
    catch(e){setScanErr('Invalid key: '+e.message);setRunning(false);return;}

    const all=[];let bal=0,txc=0,act=0;

    const scanChain=(chain,cb)=>{
      let gap=0,idx=0;
      const chainNode=node.derive(chain); // derive once per chain
      const next=()=>{
        if(ctx.stop){setRunning(false);setProgress({chain:0,idx:0,gap:0});return;}
        if(gap>=20){cb();return;}
        setProgress({chain,idx,gap});
        // Yield to event loop before CPU-bound derivation
        setTimeout(()=>{
          if(ctx.stop){setRunning(false);setProgress({chain:0,idx:0,gap:0});return;}
          let addr;
          try{addr=getAddr(chainNode.derive(idx).publicKey);}
          catch(e){setScanErr('Derivation error: '+e.message);setRunning(false);return;}
          const _cb=(err,data)=>{
            if(ctx.stop)return;
            if(err){
              setScanErr(`Network error at ${chain===0?'Receive':'Change'} #${idx}: ${err.message||String(err)}`);
              setRunning(false);return;
            }
            all.push({chain,index:idx,address:addr,bal:data.bal,txs:data.txs});
            if(data.txs>0){bal+=data.bal;txc+=data.txs;act++;gap=0;}else{gap++;}
            idx++;
            setResults([...all].sort((a,b)=>(a.chain-b.chain)||(a.index-b.index)));
            setStats({balance:bal,txCount:txc,activeAddrs:act});
            setTimeout(next,net.delay);
          };
          _cb._ctx=ctx;
          _cb._warn=msg=>setScanWarn(msg);
          net.fetchBal(addr,_cb);
        },0);
      };
      next();
    };

    scanChain(0,()=>{
      if(ctx.stop)return;
      scanChain(1,()=>{
        if(ctx.stop)return;
        setResults([...all].sort((a,b)=>(a.chain-b.chain)||(a.index-b.index)));
        setStats({balance:bal,txCount:txc,activeAddrs:act});
        setRunning(false);setProgress({chain:0,idx:0,gap:0});
      });
    });
  };

  const pfxLabel=(()=>{const p=xpub.slice(0,4);if(p==='ypub')return'ypub \u2192 Nested SegWit';if(p==='zpub')return'zpub \u2192 Native SegWit';return'xpub \u2192 Legacy';})();
  const at=dm==='native_segwit'?'Native SegWit':dm==='segwit'?'Nested SegWit':'Legacy';

  return <div style={{marginTop:16,borderTop:`1px solid ${T.border}`,paddingTop:16}}>
    <div className="card-header" style={{color:net.color,marginBottom:12,display:'flex',alignItems:'center',gap:6}}>
      <Ico.Scan/> {net.label} Address Scanner
      <span style={{fontWeight:400,color:T.muted,fontSize:11}}>({coin==='DOGE'||coin==='BCH'?'Legacy':at})</span>
    </div>

    {/* Key type badge */}
    <div style={{marginBottom:10}}><span style={bdg(T.muted)}>{pfxLabel}</span></div>

    {/* Scan / Stop buttons */}
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
      {!running
        ?<button onClick={doScan} disabled={!libReady} style={{padding:'10px 20px',borderRadius:8,border:'none',background:net.color,color:'#fff',fontWeight:700,fontSize:13,cursor:!libReady?'not-allowed':'pointer',opacity:!libReady?0.6:1,display:'flex',alignItems:'center',gap:6}}>
          <Ico.Scan/>{!libReady?'Loading libraries...':'Derive & Scan Addresses'}
        </button>
        :<button aria-label="Stop address scan" onClick={doStop} style={{padding:'10px 20px',borderRadius:8,border:'1px solid rgba(228,0,70,0.4)',background:'rgba(245,115,117,0.1)',color:T.error,fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
          <Ico.X/> Stop scan
        </button>
      }
      {coin==='BTC'&&<a href={`https://www.blockchain.com/btc/xpub/${xpub}`} target="_blank" rel="noopener noreferrer" style={{padding:'10px 16px',borderRadius:8,background:'rgba(255,255,255,0.04)',border:`1px solid ${T.border}`,color:T.muted,textDecoration:'none',fontWeight:600,fontSize:12,display:'inline-flex',alignItems:'center',gap:6}}><Ico.Link/> Blockchain.com</a>}
    </div>

    {/* Progress bar */}
    {running&&<div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:T.muted,marginBottom:4}}>
        <span>{progress.chain===0?'Receive':'Change'} #{progress.idx} · gap {progress.gap}/20</span>
        <span style={{opacity:0.5}}>scanning…</span>
      </div>
      <div style={{height:4,background:'rgba(255,255,255,0.06)',borderRadius:2,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${(progress.gap/20)*100}%`,background:net.color,borderRadius:2,transition:I.fast}}/>
      </div>
    </div>}

    {scanWarn&&<div style={{color:T.warning,fontSize:12,marginBottom:8,padding:10,background:'rgba(255,189,66,0.08)',borderRadius:6,border:'1px solid rgba(255,189,66,0.25)'}}>{scanWarn}</div>}
    {scanErr&&<div style={{color:T.error,fontSize:12,marginBottom:8,padding:10,background:'rgba(239,68,68,0.08)',borderRadius:6,border:'1px solid rgba(239,68,68,0.2)'}}>{scanErr}</div>}

    {/* Stats */}
    {stats&&<div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:12}}>
      {[{l:'Balance',v:`${stats.balance.toFixed(8)} ${coin}`,c:net.color},{l:'Transactions',v:stats.txCount,c:T.text},{l:'Active Addresses',v:stats.activeAddrs,c:T.text}].map(x=>
        <div key={x.l} style={{background:T.bg,border:`1px solid ${T.border}`,padding:12,borderRadius:8,textAlign:'center'}}>
          <div className="mono" style={{fontSize:18,fontWeight:700,color:x.c}}>{x.v}</div>
          <div style={{fontSize:11,color:T.muted,lineHeight:1.4,marginTop:2}}>{x.l}</div>
        </div>
      )}
    </div>}

    {/* Address list */}
    {results.length>0&&<div style={{maxHeight:400,overflowY:'auto',border:`1px solid ${T.border}`,borderRadius:8}}>
      {results.map(r=>
        <div key={`${r.chain}-${r.index}`} className="mono" style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',borderBottom:`1px solid ${T.border}`}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={bdg(r.chain===0?'#8B84CC':T.primary)}>{r.chain===0?'RX':'CH'}:{r.index}</span>
            <a href={net.addrUrl(r.address)} target="_blank" rel="noopener noreferrer" style={{color:T.primary,textDecoration:'none'}}>{r.address}</a>
            <CopyBtn text={r.address}/>
          </div>
          {r.txs>0?<div style={{textAlign:'right'}}>
            <div style={{color:T.success,fontWeight:700}}>{r.bal.toFixed(8)}</div>
            <div style={{fontSize:10,color:T.muted}}>{r.txs} txs</div>
          </div>:<span style={{color:T.muted,opacity:0.4}}>Unused</span>}
        </div>
      )}
    </div>}
  </div>;
}

/* Account Card */
function AcctCard({acct,errCount,deviceApps,liveBalance,versionCheck,onErrClick,onTimelineClick}){
  const[open,setOpen]=useState(false);
  const[tokV,setTokV]=useState(0);
  useEffect(()=>{
    if(!open||!acct.toks.length)return;
    const chains=[...new Set(acct.toks.map(tk=>(tk.tokenId||'').split('/')[0]).filter(ch=>EVM_CHAIN_IDS[ch]))];
    if(!chains.some(ch=>!TOKEN_CHAINS_FETCHED.has(ch)))return;
    fetchTokenChains(chains).then(hadNew=>{if(hadNew)setTokV(v=>v+1);});
  },[open]);
  const ch=acct.ch,hasFunds=acct.ops>0;
  const noSyncAcct=acct.dur==null&&acct.bal==null&&acct.ops===0;
  let eUrl=null;try{eUrl=ch.url?.(acct.addr);}catch{}
  const hasExp=eUrl&&eUrl!=='#';
  const canX=acct.isXpub&&ch.xc;
  const appBadge=(()=>{
    const appName=CURRENCY_TO_APP[acct.cid];
    if(!appName||!deviceApps)return null;
    let status=null,latestVer=null;
    const vcApp=versionCheck?.status==='ok'&&versionCheck.apps?.find(a=>a.name.toLowerCase()===appName.toLowerCase());
    if(vcApp){
      if(vcApp.installed===null)status='missing';
      else if(vcApp.outdated){status='outdated';latestVer=vcApp.latest;}
      else status='current';
    } else if(deviceApps.source==='manager-result'){
      const inst=deviceApps.installed?.find(i=>i.name.toLowerCase()===appName.toLowerCase());
      if(!inst)status='missing';
      else if(!inst.updated)status='outdated';
      else status='current';
    }
    if(!status)return null;
    const hasErrors=errCount>0;
    if(status==='missing'){
      return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,background:'rgba(228,0,70,0.12)',color:T.error,border:'1px solid rgba(228,0,70,0.25)'}} title={`${appName} app is not installed on the device. This account cannot send transactions until the app is reinstalled via My Ledger.`}>
        ✕ Can't transact · {appName} not installed
      </span>;
    }
    if(status==='outdated'){
      const msg=hasErrors?`⚠ ${appName} outdated · may explain errors`:`⚠ ${appName} outdated · update recommended`;
      return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:600,background:hasErrors?'rgba(228,0,70,0.12)':'rgba(255,189,66,0.12)',color:hasErrors?T.error:T.warning,border:`1px solid ${hasErrors?'rgba(228,0,70,0.25)':'rgba(255,189,66,0.25)'}`}} title={`${appName} app is installed but outdated${latestVer?' (latest: v'+latestVer+')':''}.  Updating via My Ledger is recommended.${hasErrors?' The outdated app may be contributing to the errors on this account.':''}`}>
        {msg}
      </span>;
    }
    return null;
  })();
  return <div className="acct-hover" style={{background:T.panel,borderRadius:8,marginBottom:12,opacity:hasFunds||open?1:0.65,border:`1px solid ${open?ch.color+'60':noSyncAcct?T.warning+'40':T.border}`,borderLeft:noSyncAcct&&!open?`3px solid ${T.warning}35`:`3px solid ${open?ch.color+'60':ch.color+'40'}`,borderTop:'1px solid rgba(255,255,255,0.04)',boxShadow:`inset 8px 0 24px -2px ${ch.color}40`}}>
    <div role="button" tabIndex={0} onClick={()=>setOpen(!open)} onKeyDown={ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();setOpen(o=>!o);}}} style={{display:'flex',alignItems:'center',padding:'16px 20px',cursor:'pointer',gap:14}}>
      <div className="mono" style={{width:42,height:42,borderRadius:8,background:ch.color+'20',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,color:ch.color,flexShrink:0}}>{(()=>{const u=chainIconUrl(acct.cid);return u?<img src={u} alt={ch.ticker} width={26} height={26} style={{borderRadius:4}} onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='';}} />:null;})()}<span style={{display:chainIconUrl(acct.cid)?'none':''}}>{ch.ticker.slice(0,4)}</span></div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <span style={{fontWeight:600,fontSize:15}}>{ch.name}</span>
          {acct.toks.length>0&&<span style={bdg(T.primary)}>{acct.toks.length} token{acct.toks.length>1?'s':''}</span>}
          {hasFunds?<span style={bdg(T.success)}>{acct.ops} ops</span>:<span style={bdg(T.muted)}>{acct.dur!=null||acct.bal!=null?'empty':'no data'}</span>}
          {errCount>0&&<span onClick={ev=>{ev.stopPropagation();if(onErrClick)onErrClick();}} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,background:'rgba(228,0,70,0.15)',color:T.error,cursor:'pointer'}} title="View issues for this account">⚠ {errCount} issue{errCount!==1?'s':''}</span>}
          {appBadge}
          {acct.isXpub&&<span style={bdg(ch.color)}>xpub</span>}
          {acct.bal!=null&&<span className="mono" style={{fontSize:11,color:T.muted}}>{Number(acct.bal).toLocaleString(undefined,{maximumFractionDigits:8})}</span>}
          {liveBalance?.status==='loading'&&<span className="mono" style={{fontSize:11,color:T.muted,opacity:0.6}}>live ···</span>}
          {liveBalance?.status==='ok'&&liveBalance.bal!=null&&<span className="mono" style={{fontSize:11,color:T.success,fontWeight:600}}>{liveBalance.bal.toLocaleString(undefined,{maximumFractionDigits:6})} {ch.ticker}{liveBalance.fiat!=null?' · $'+liveBalance.fiat.toLocaleString(undefined,{maximumFractionDigits:2}):''}</span>}
        </div>
        <div className="mono" style={{color:T.muted,marginTop:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{acct.addr}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {hasExp&&!acct.isXpub&&<a href={eUrl} target="_blank" rel="noopener noreferrer" onClick={ev=>ev.stopPropagation()} aria-label={`View ${ch.name} on explorer`} style={{color:T.muted,display:'inline-flex',alignItems:'center',padding:4,borderRadius:4,opacity:0.6}} title="View on explorer"><Ico.Link/></a>}

        {onTimelineClick&&!open&&<button onClick={ev=>{ev.stopPropagation();onTimelineClick();}} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}} title={`Filter timeline to ${ch.name} events`}><Ico.Logs/> Timeline</button>}
        {canX&&!open&&<button onClick={ev=>{ev.stopPropagation();setOpen(true);}} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'4px 10px',borderRadius:6,border:`1px solid ${ch.color}40`,background:ch.color+'12',color:ch.color,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}} title={`Derive and scan ${ch.name} addresses from xpub`}><Ico.Scan/> Scan</button>}
        {acct.dm&&<span className="mono label" style={{color:T.muted,background:'rgba(255,255,255,0.04)',padding:'3px 8px',borderRadius:4,textTransform:'none',letterSpacing:'normal'}}>{acct.dm}</span>}
        <span style={{color:T.muted,transform:open?'rotate(90deg)':'none',transition:I.fast,display:'inline-block'}}><Ico.ChevR/></span>
      </div>
    </div>
    {open&&<div style={{padding:'0 20px 20px',borderTop:`1px solid ${T.border}`}}>
      <div style={{paddingTop:16}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:ch.convert?8:16,flexWrap:'wrap'}}>
          <span className="mono" style={{wordBreak:'break-all',flex:1,minWidth:200}}>{acct.addr}</span>
          <CopyBtn text={acct.addr}/>
          {hasExp&&!acct.isXpub&&<a href={eUrl} target="_blank" rel="noopener noreferrer" style={{padding:'6px 12px',borderRadius:6,fontSize:11,fontWeight:600,background:ch.color+'15',color:ch.color,border:`1px solid ${ch.color}30`,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}><Ico.Link/> View on explorer</a>}
        </div>
        {ch.note&&!hasExp&&<div style={{background:'rgba(20,184,230,0.06)',border:'1px solid rgba(20,184,230,0.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:12,color:T.muted,lineHeight:1.6}}>{ch.note}<span className="mono" style={{color:'#14B8E6',wordBreak:'break-all',display:'block',marginTop:4}}>{acct.addr}</span></div>}
        {ch.convert&&(()=>{
          const derived=ch.convert(acct.addr);
          if(!derived)return <div style={{background:'rgba(245,158,11,0.06)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:8,padding:12,marginBottom:16,lineHeight:1.6,color:T.muted}}>Could not derive explorer address from stored credential. Ask the customer for their receive address.</div>;
          return <div style={{background:'rgba(139,132,204,0.06)',border:'1px solid rgba(139,132,204,0.15)',borderRadius:8,padding:'10px 14px',marginBottom:16}}>

              <span className="mono" style={{wordBreak:'break-all',flex:1}}>{derived}</span>

            </div>
            <div style={{fontSize:11,color:T.muted,marginTop:6,lineHeight:1.6}}>Derived from log data — verify with customer</div>
          </div>;
        })()}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:16}}>
          {[{l:'Derivation',v:acct.dm||'default'},{l:'Address Path',v:acct.fp||'—'},{l:'Operations',v:String(acct.ops)},{l:'Sync',v:acct.dur?acct.dur.toFixed(2)+'s':'—'}].map(x=><div key={x.l} style={{background:T.bg,border:`1px solid ${T.border}`,padding:10,borderRadius:8}}><div className="label" style={{color:T.muted,marginBottom:4}}>{x.l}</div><div className="mono">{x.v}</div></div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:liveBalance&&liveBalance.status!=='unsupported'?8:16}}>
          {[{l:'Balance (log)',v:acct.bal!=null?Number(acct.bal).toLocaleString(undefined,{maximumFractionDigits:8})+' '+ch.ticker:'— (not in log — see explorer)'},{l:'Spendable Balance',v:acct.spendBal!=null?Number(acct.spendBal).toLocaleString(undefined,{maximumFractionDigits:8})+' '+ch.ticker:'— (not in log)'}].map(x=><div key={x.l} style={{background:T.bg,border:`1px solid ${T.border}`,padding:10,borderRadius:8}}><div className="label" style={{color:T.muted,marginBottom:4}}>{x.l}</div><div className="mono" style={{color:acct.bal!=null?T.success:T.muted}}>{x.v}</div></div>)}
        </div>
        {liveBalance&&liveBalance.status!=='unsupported'&&<div style={{background:T.bg,border:`1px solid ${T.border}`,padding:10,borderRadius:8,marginBottom:16}}>
          <div className="label" style={{color:T.muted,marginBottom:4}}>Live Balance</div>
          {liveBalance.status==='loading'&&<div className="mono" style={{color:T.muted,opacity:0.7}}>··· fetching</div>}
          {liveBalance.status==='ok'&&<div className="mono" style={{color:T.success}}>{liveBalance.bal!=null?liveBalance.bal.toLocaleString(undefined,{maximumFractionDigits:8})+' '+ch.ticker:'0 '+ch.ticker}{liveBalance.fiat!=null&&<span style={{color:T.muted,fontWeight:400,marginLeft:10}}>${liveBalance.fiat.toLocaleString(undefined,{maximumFractionDigits:2})} USD</span>}</div>}
          {liveBalance.status==='error'&&<div className="mono" style={{color:T.muted}}>— (API unavailable)</div>}
        </div>}
        <div style={{marginBottom:12}}><div className="label" style={{color:T.muted,marginBottom:4}}>Account ID</div><div style={{display:'flex',alignItems:'center',gap:4,wordBreak:'break-all'}}><span className="mono" style={{color:T.muted}}>{acct.id}</span><CopyBtn text={acct.id}/></div></div>
        {acct.toks.length>0&&<div style={{marginBottom:12}}><div className="label" style={{color:T.muted,marginBottom:6}}>Tokens</div><div data-tv={tokV} style={{display:'flex',flexWrap:'wrap',gap:6}}>{acct.toks.map(tk=>{
          const lb=tk.tokenTicker||tk.tokenId||'token';
          const turl=(()=>{
            const tid=tk.tokenId||'';
            const pts=tid.split('/');if(pts.length<3)return null;
            const tch=pts[0],tslug=pts.slice(2).join('/');
            // Already a contract address (EVM 0x... or Tron T...)
            const isEvmAddr=/^0x[0-9a-f]{40}$/i.test(tslug);
            const isTronAddr=/^T[A-Za-z0-9]{33}$/.test(tslug);
            // Resolve: direct address > TOKEN_CONTRACTS cache
            const resolved=isEvmAddr?tslug:(TOKEN_CONTRACTS[tid]||null);
            // Build URL from resolved contract address
            if(resolved&&TOKEN_URLS[tch])return TOKEN_URLS[tch](resolved,acct.addr);
            // Tron: use slug directly if it looks like an address, else tronscan search
            if(tch==='tron')return isTronAddr?TOKEN_URLS.tron(tslug):`https://tronscan.org/#/token20/${tslug}`;
            // Stacks & Cardano: pass slug directly to their explorers
            if(tch==='stacks')return TOKEN_URLS.stacks(tslug);
            if(tch==='cardano')return TOKEN_URLS.cardano(tslug);
            // Search fallback: opens block explorer search so agent can find the token
            if(TOKEN_SEARCH[tch])return TOKEN_SEARCH[tch](tslug.replace(/__/g,' ').replace(/_/g,' '));
            return null;
          })();
          const inner=<>{lb}<span style={{opacity:0.6,marginLeft:4}}>{tk.operationsLength||0} ops</span></>;
          const s={display:'inline-block',padding:'4px 10px',borderRadius:4,fontSize:12,fontWeight:700,background:T.primary+'22',color:T.primary,fontFamily:MF};
          return turl
            ?<a key={lb} href={turl} target="_blank" rel="noopener noreferrer" style={{...s,textDecoration:'none'}}>{inner}</a>
            :<span key={lb} style={s}>{inner}</span>;
        })}</div></div>}
        {canX&&<XpubView xpub={acct.addr} dm={acct.dm} coin={ch.xc}/>}
        {acct.isXpub&&!canX&&hasExp&&<div style={{marginTop:12}}><a href={eUrl} target="_blank" rel="noopener noreferrer" style={{padding:'6px 12px',borderRadius:6,fontSize:11,fontWeight:600,background:ch.color+'15',color:ch.color,border:`1px solid ${ch.color}30`,textDecoration:'none',display:'inline-flex',alignItems:'center',gap:4}}><Ico.Link/> Search on explorer</a></div>}
      </div>
    </div>}
  </div>;
}

function CVSidebar({accts,namedAccts,selected,onSelect,errs,as,appJson}){
  const sorted=[...namedAccts].sort((a,b)=>{
    const aFunded=a.bal>0||a.ops>0||(a.enriched&&a.ajBalance&&a.ajBalance!=='0');
    const bFunded=b.bal>0||b.ops>0||(b.enriched&&b.ajBalance&&b.ajBalance!=='0');
    return aFunded===bFunded?0:aFunded?-1:1;
  });
  return <div className="cv-sidebar">
    <div className="cv-sidebar-header">
      <div style={{fontFamily:MF,fontSize:10,fontWeight:600,color:T.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:3}}>Accounts</div>
      <div style={{fontSize:11,color:T.muted}}>{accts.length} total · {appJson ? appJson.accounts.filter(a=>a.balance!=='0').length : (as&&as.accountsWithFunds&&as.accountsWithFunds.length)||accts.filter(a=>a.ops>0).length} with funds</div>
    </div>
    <div className={`cv-acct-row${selected===null?' cv-active':''}`} style={{borderLeft:selected===null?`3px solid ${T.primary}`:'3px solid transparent',paddingLeft:selected===null?11:14}} onClick={()=>onSelect(null)}>
      <span style={{fontSize:14,flexShrink:0}}>◈</span>

        <div style={{fontSize:12,fontWeight:600,color:T.text}}>Portfolio</div>
        <div style={{fontSize:10,color:T.muted}}>All accounts</div>
      </div>
    </div>
    <div className="cv-sidebar-scroll">
      {sorted.map((a,i)=>{
        const ch=a.ch;
        const originalIdx=namedAccts.indexOf(a);
        const hasErr=errs.some(e=>(e.det||e.msg||'').includes(a.addr||'____NOMATCH'));
        const enriched=a.enriched&&a.ajBalance!=null;
        const bal=enriched?fmtBal(a.ajBalance,a.cid,ch.ticker):null;
        const ops=enriched?a.ajOps:a.ops;
        const funded=enriched?(a.ajBalance!=='0'):a.ops>0;
        const isActive=selected===originalIdx;
        return <div key={i} className={`cv-acct-row${isActive?' cv-active':''}`}
          style={{borderLeft:isActive?`3px solid ${T.primary}`:'3px solid transparent',paddingLeft:isActive?11:14}}
          onClick={()=>onSelect(originalIdx)}>
          <span className="cv-chain-dot" style={{background:ch.color||T.muted}}/>
          <div style={{flex:1,minWidth:0,overflow:'hidden'}}>
            <div style={{fontSize:12,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.displayName}{a.ajStarred?' ★':''}</div>
            <div style={{fontSize:10,color:T.muted,display:'flex',gap:4,flexWrap:'wrap'}}>
              <span>{ch.ticker}</span>
              {bal&&<span style={{color:T.success,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}}>· {bal}</span>}
              {!bal&&funded&&<span style={{color:T.success}}>· {ops} ops</span>}

      return(
        <div className="cv-detail-card" style={{marginTop:20}}>
          <div className="cv-section-title">Recent dApp Activity</div>
          {shown.map((entry,i)=>{
            const histKey=Object.keys(hist).find(k=>k.includes(entry.id));
            const acctId=histKey?hist[histKey]:null;
            const addr=acctId?acctId.split(':')[3]:null;
            const linked=addr?namedAccts.find(a=>a.addr&&a.addr.toLowerCase()===addr.toLowerCase()):null;
            return(
              <div key={i} className="cv-info-row">
                <span style={{fontWeight:600,fontSize:12}}>{fmtDAppName(entry.id)}</span>
                <span style={{display:'flex',alignItems:'center',gap:10}}>
                  {linked&&<span style={{fontSize:11,color:T.primary}}>{linked.displayName}</span>}
                  <span style={{fontSize:11,color:T.muted}}>{fmtDate(entry.usedAt)}</span>
                </span>
              </div>
            );
          })}
          {overflow>0&&<div style={{fontSize:11,color:T.muted,marginTop:6}}>and {overflow} more</div>}
        </div>
      );
    })()}
  </div>;
}

function CVCopyText({text,full,mono}){
  const[copied,setCopied]=useState(false);
  const copyVal=full||text;
  if(!text)return <span style={{color:T.muted}}>—</span>;
  return <span onClick={()=>{copyText(copyVal);setCopied(true);setTimeout(()=>setCopied(false),1500);}}
    style={{cursor:'pointer',fontFamily:mono?MF:'inherit',wordBreak:'break-all',position:'relative',padding:'2px 4px',margin:'-2px -4px',borderRadius:4}}
    title={copyVal}>
    {text}
    {copied&&<span style={{position:'absolute',top:-18,left:0,fontSize:9,color:T.success,fontWeight:700,fontFamily:"'Darker Grotesque',sans-serif"}}>Copied!</span>}
  </span>;
}
