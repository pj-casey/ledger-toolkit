function CustomerView({logData,appJson,onAppJson}){
  const[selectedAcct,setSelectedAcct]=useState(null);
  const[ajDragOver,setAjDragOver]=useState(false);
  const[summCopied,setSummCopied]=useState(false);
  const[bannerExpanded,setBannerExpanded]=useState(true);
  const[ajError,setAjError]=React.useState('');
  const[ajKey,setAjKey]=React.useState(0);
  useEffect(()=>{
    if(appJson&&!appJson.encrypted){
      setBannerExpanded(true);
      const t=setTimeout(()=>setBannerExpanded(false),3000);
      return()=>clearTimeout(t);
    }
  },[appJson]);
  const appJsonRef=useRef();
  const analytics=logData.analytics||{};
  const as=analytics.appStarts||{};
  const port=analytics.portfolio||{};
  const namedAccts=useMemo(()=>{
    const counts={};
    logData.accts.forEach(a=>{counts[a.ch.name]=(counts[a.ch.name]||0)+1;});
    const running={};
    return logData.accts.map(a=>{
      const base=a.ch.name;
      running[base]=(running[base]||0)+1;
      return{...a,displayName:counts[base]>1?`${base} ${running[base]}`:base};
    });
  },[logData.accts]);
  const appJsonMismatch=React.useMemo(()=>{
    if(!appJson||appJson.encrypted||!appJson.accounts||!appJson.accounts.length)return false;
    if(!logData.accts||!logData.accts.length)return false;
    const logIds=new Set(logData.accts.map(a=>a.id));
    const matchCount=appJson.accounts.filter(a=>logIds.has(a.id)).length;
    return matchCount===0;
  },[appJson,logData]);
  const enrichedAccts=useMemo(()=>{
    // Case 1: Log has accounts — enrich with app.json if available
    if(namedAccts.length>0){
      if(!appJson)return namedAccts;
      return namedAccts.map(a=>{
        const match=appJson.byId[a.id];
        if(!match)return a;
        return{...a,displayName:match.name||a.displayName,enriched:true,
          ajBalance:match.balance,ajSpendable:match.spendableBalance,
          ajOps:match.operationsCount,ajOperations:match.operations,
          ajSubAccounts:match.subAccounts,ajBlockHeight:match.blockHeight,
          ajStarred:match.starred};
      });
    }
    // Case 2: No log accounts but app.json available — build from app.json
    if(appJson&&appJson.accounts.length>0){
      const counts={};
      appJson.accounts.forEach(a=>{const ch=getChain(a.currencyId);counts[ch.name]=(counts[ch.name]||0)+1;});
      const running={};
      return appJson.accounts.map(a=>{
        const cid=a.currencyId;
        const ch=getChain(cid);
        running[ch.name]=(running[ch.name]||0)+1;
        const displayName=a.name||(counts[ch.name]>1?`${ch.name} ${running[ch.name]}`:ch.name);
        const isXpub=['xpub','ypub','zpub','Ltub','Mtub','dgub'].some(pre=>(a.freshAddress||'').startsWith(pre));
        return{id:a.id,cid:cid,ch:ch,addr:a.freshAddress||'',dm:a.derivationMode||'',fp:'',
          ops:a.operationsCount||0,dur:null,
          toks:(a.subAccounts||[]).map(s=>({tokenId:s.tokenId,tokenTicker:(s.tokenId||'').split('/').pop().replace(/__/g,' ').replace(/_/g,' '),operationsLength:s.operationsCount||0})),
          isXpub:isXpub,bal:null,spendBal:null,displayName:displayName,enriched:true,
          ajBalance:a.balance,ajSpendable:a.spendableBalance,ajOps:a.operationsCount,
          ajOperations:a.operations,ajSubAccounts:a.subAccounts,ajBlockHeight:a.blockHeight,ajStarred:a.starred};
      });
    }
    // Case 3: No log accounts and no app.json
    return namedAccts;
  },[namedAccts,appJson]);
  const copyCustomerSummary=useCallback(()=>{
    const dev=logData.dev;
    const as=logData.analytics?.appStarts||{};
    const port=logData.analytics?.portfolio||{};
    const lines=[
      '=== Customer Wallet Summary ===',
      '',
      'DEVICE',
      `  Model:     ${dev.modelName||DN[as.modelId]||as.modelId||'Unknown'}`,
      `  Firmware:  ${(()=>{const fw=dev.fw||as.deviceVersion||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===(dev.fw||as.deviceVersion)?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,
      `  ${llLabel(dev)}: ${dev.appVer||as.appVersion||'Unknown'}`,
      `  OS:        ${[dev.os||as.osType,dev.osVer||as.osVersion].filter(Boolean).join(' ')||(logData.isMobile?(dev.platform==='ios'?'iOS':dev.platform==='android'?'Android':'Unknown'):'Unknown')}`,
      `  Platform:  ${dev.platform||as.platform||'Unknown'}`,
      '',
      `ACCOUNTS (${enrichedAccts.length})`,
    ];
    const funded=enrichedAccts.filter(a=>a.enriched?a.ajBalance!=='0':a.ops>0);
    const empty=enrichedAccts.filter(a=>a.enriched?a.ajBalance==='0':a.ops<=0);
    for(const a of funded){
      const bal=a.enriched?fmtBal(a.ajBalance,a.cid,a.ch.ticker):`${a.ops} ops`;
      const addr=a.addr?(a.addr.length>30?a.addr.slice(0,16)+'...'+a.addr.slice(-8):a.addr):'';
      lines.push(`  ${a.displayName}: ${bal} — ${addr}`);
      if(a.enriched&&a.ajSubAccounts){
        for(const s of a.ajSubAccounts){
          if(s.balance&&s.balance!=='0'){
            const tName=(s.tokenId||'').split('/').pop().replace(/__/g,' ').replace(/_/g,' ');
            lines.push(`    └ ${tName}: ${s.balance}`);
          }
        }
      }
    }
    if(empty.length>0)lines.push(`  (${empty.length} empty account${empty.length!==1?'s':''}: ${empty.map(a=>a.displayName).join(', ')})`);
    lines.push('');
    lines.push('ACTIVITY');
    const act=logData.activity||{};
    if(act.managerOpened)lines.push('  Manager opened during session');
    if(act.swapBrowsed)lines.push(`  Swap browsed${act.swapExecuted?'':' (not completed)'}`);
    if(act.deviceScan)lines.push('  Device scan active');
    if(!act.managerOpened&&!act.swapBrowsed&&!act.deviceScan)lines.push('  (none detected)');
    if(logData.errs.length>0){
      lines.push('');
      lines.push(`ISSUES (${logData.errs.length})`);
      const seen=new Set();
      for(const e of logData.errs){
        const t=e.dg?.t||e.msg||'Unknown';
        if(seen.has(t))continue;
        seen.add(t);
        lines.push(`  [${(e.dg?.s||'?').toUpperCase()}] ${t}`);
      }
    }
    lines.push('');
    lines.push(`Source: ${appJson?'app.json + logs':'logs only'}`);
    lines.push('===========================');
    copyText(lines.join('\n'));
    setSummCopied(true);
    setTimeout(()=>setSummCopied(false),2000);
  },[logData,appJson,enrichedAccts]);

  const handleAppJsonDrop=useCallback(e=>{
    e.preventDefault();e.stopPropagation();setAjDragOver(false);
    const file=e.dataTransfer?.files?.[0];
    if(!file)return;
    setAjError('');
    const reader=new FileReader();
    reader.onload=ev=>{
      setAjError('');
      try{
        const parsed=parseAppJson(ev.target.result);
        if(!parsed||(parsed.accounts.length===0&&!parsed.encrypted)){
          try{const cleaned=Array.from(ev.target.result).filter(ch=>{const c=ch.charCodeAt(0);return c>=0x20||c===0x0a||c===0x09;}).join('');const raw=JSON.parse(cleaned);const keys=Object.keys(raw).join(', ');const dataKeys=raw.data?Object.keys(raw.data).join(', '):'no .data key';console.error('parseAppJson diagnostic — top keys:',keys,'data keys:',dataKeys);setAjError('This app.json doesn\'t contain account data. It may be from a different version of Ledger Wallet or an incomplete export. Ask the customer to re-export.');}catch(err){console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');}
        }else{
          setAjError('');
          onAppJson(parsed);
          setAjKey(k=>k+1);
        }
      }catch(err){
        console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');
      }
    };
    reader.onerror=()=>setAjError('The file couldn\'t be opened. Try downloading it again from the customer\'s ticket.');
    reader.readAsText(file);
  },[onAppJson]);
  const handleAppJsonPick=useCallback(ev=>{
    const file=ev.target.files?.[0];
    if(!file)return;
    ev.target.value='';
    setAjError('');
    const reader=new FileReader();
    reader.onload=e=>{
      setAjError('');
      try{
        const parsed=parseAppJson(e.target.result);
        if(!parsed||(parsed.accounts.length===0&&!parsed.encrypted)){
          try{const cleaned=Array.from(e.target.result).filter(ch=>{const c=ch.charCodeAt(0);return c>=0x20||c===0x0a||c===0x09;}).join('');const raw=JSON.parse(cleaned);const keys=Object.keys(raw).join(', ');const dataKeys=raw.data?Object.keys(raw.data).join(', '):'no .data key';console.error('parseAppJson diagnostic — top keys:',keys,'data keys:',dataKeys);setAjError('This app.json doesn\'t contain account data. It may be from a different version of Ledger Wallet or an incomplete export. Ask the customer to re-export.');}catch(err){console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');}
        }else{
          setAjError('');
          onAppJson(parsed);
          setAjKey(k=>k+1);
        }
      }catch(err){
        console.error('parseAppJson diagnostic:', err.message);setAjError('This file couldn\'t be read. It may be corrupted or not a valid app.json file. Ask the customer to re-export from Ledger Wallet → Settings → Help → View user data.');
      }
    };
    reader.onerror=()=>setAjError('The file couldn\'t be opened. Try downloading it again from the customer\'s ticket.');
    reader.readAsText(file);
  },[onAppJson]);
  const selData=selectedAcct!==null?enrichedAccts[selectedAcct]:null;
  return <div className="cv-layout">
    <CVSidebar accts={enrichedAccts} namedAccts={enrichedAccts} selected={selectedAcct} onSelect={setSelectedAcct} errs={logData.errs} as={logData.analytics&&logData.analytics.appStarts} appJson={appJson}/>
    <div className="cv-main">
      <input key={ajKey} type="file" accept=".json" style={{display:'none'}} ref={appJsonRef} onChange={handleAppJsonPick}/>
      {appJson
        ?appJson.encrypted
          ?<div className="cv-sim-banner">
              <span>⚠ This customer has Ledger Sync enabled, which encrypts their account data. Balances and transactions can't be read from this file — only device info and token preferences. For full data, the customer would need to disable Ledger Sync and re-export.</span>
              <button onClick={()=>onAppJson(null)} style={{marginLeft:'auto',background:'none',border:'none',color:T.warning,cursor:'pointer',fontSize:11,fontWeight:600,padding:'0 4px',opacity:0.7}}>✕ Remove</button>
            </div>
          :bannerExpanded
            ?<div className="cv-enriched-banner">
                <span>{logData.accts.length===0
                  ?`✓ Showing ${appJson.accounts.length} accounts from app.json (log file contained no account data)`

function JTNode({keyName,value,path,depth,expanded,onToggle,searchTerm,onCopyPath,matchPaths,currentMatchIndex}){
  const type=value===null?'null':Array.isArray(value)?'array':typeof value;
  const isExpandable=type==='object'||type==='array';
  const isExpanded=isExpandable&&expanded.has(path);
  const entries=isExpandable?(type==='array'?value.map((v,i)=>[String(i),v]):Object.entries(value)):[];
  const matchesSearch=searchTerm&&(
    (keyName&&String(keyName).toLowerCase().includes(searchTerm))||
    (!isExpandable&&String(value).toLowerCase().includes(searchTerm))
  );
  const matchIndex=matchPaths?matchPaths.indexOf(path):-1;
  const isCurrentMatch=matchIndex>=0&&matchIndex===currentMatchIndex;
  const renderValue=()=>{
    if(value===null)return<span style={{color:T.muted,fontStyle:'italic'}}>null</span>;
    if(type==='boolean')return<span style={{color:T.error}}>{String(value)}</span>;
    if(type==='number')return<span style={{color:T.warning}}>{String(value)}</span>;
    if(type==='string'){const display=value.length>120?value.slice(0,120)+'…':value;return<span style={{color:T.success}}>"{display}"</span>;}
    return null;
  };
  const badge=isExpandable&&!isExpanded?<span style={{color:T.muted,fontSize:11,marginLeft:4}}>{type==='array'?`[${value.length} items]`:`{${Object.keys(value).length} keys}`}</span>:null;
  const openBracket=isExpandable&&isExpanded?<span style={{color:T.muted}}>{type==='array'?'[':'{'}</span>:null;
  const closeBracket=isExpandable&&isExpanded?<div style={{paddingLeft:depth>0?20:0}}><span style={{color:T.muted}}>{type==='array'?']':'}'}</span></div>:null;
  const[hovered,setHovered]=useState(false);
  return<div>
    <div className="jt-row" id={matchIndex>=0?'jt-match-'+matchIndex:undefined}
      style={{paddingLeft:depth*20,background:isCurrentMatch?'rgba(187,176,255,0.25)':matchesSearch?'rgba(187,176,255,0.08)':'transparent',borderLeft:isCurrentMatch?'2px solid #BBB0FF':'2px solid transparent',transition:I.fast}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      {isExpandable
        ?<span className="jt-arrow" onClick={()=>onToggle(path)} style={{cursor:'pointer',userSelect:'none',color:T.muted,display:'inline-block',width:16,textAlign:'center',transition:I.fast,transform:isExpanded?'rotate(90deg)':'none'}}>▶</span>
        :<span style={{display:'inline-block',width:16}}/>
      }
      {keyName!==null&&(()=>{const isIndex=/^\d+$/.test(keyName);return<><span style={{color:isIndex?T.muted:T.primary}}>{isIndex?keyName:`"${keyName}"`}</span><span style={{color:T.muted}}>: </span></>;})()}
      {isExpandable?(isExpanded?openBracket:badge):renderValue()}
      {hovered&&path&&<span className="jt-copy-path" onClick={e=>{e.stopPropagation();onCopyPath(path);}} title={`Copy path: ${path}`}>📋</span>}
    </div>
    {isExpanded&&(()=>{
      const capped=entries.length>500;
      const display=capped?entries.slice(0,500):entries;
      return<>
        {display.map(([k,v],i)=>(
          <JTNode key={k+i} keyName={k} value={v}
            path={type==='array'?`${path}[${k}]`:`${path}.${k}`}
            depth={depth+1} expanded={expanded} onToggle={onToggle}
            searchTerm={searchTerm} onCopyPath={onCopyPath}
            matchPaths={matchPaths} currentMatchIndex={currentMatchIndex}/>
        ))}
        {capped&&<div style={{paddingLeft:(depth+1)*20+16,color:T.muted,fontSize:11,fontStyle:'italic',padding:'4px 12px 4px '+(((depth+1)*20)+16)+'px'}}>… and {entries.length-500} more items</div>}
      </>;
    })()}
    {closeBracket}
  </div>;
}

function JTTree({data}){
  const[expanded,setExpanded]=useState(()=>new Set());
  const[search,setSearch]=useState('');
  const[copiedPath,setCopiedPath]=useState('');
  const[matchPaths,setMatchPaths]=useState([]);
  const[currentMatch,setCurrentMatch]=useState(0);
  const scrollContainerRef=useRef(null);
  const searchLower=search.toLowerCase();
  const toggle=useCallback(path=>{
    setExpanded(prev=>{const next=new Set(prev);if(next.has(path))next.delete(path);else next.add(path);return next;});
  },[]);
  const expandToLevel=useCallback((maxDepth)=>{
    const paths=new Set();
    const walk=(val,path,depth)=>{
      if(depth>=maxDepth)return;
      if(val===null||typeof val!=='object')return;
      paths.add(path);
      if(Array.isArray(val)){val.forEach((v,i)=>walk(v,`${path}[${i}]`,depth+1));}
      else{Object.entries(val).forEach(([k,v])=>walk(v,`${path}.${k}`,depth+1));}
    };
    walk(data,'$',0);
    setExpanded(paths);
  },[data]);
  const collapseAll=useCallback(()=>setExpanded(new Set()),[]);
  const expandAll=useCallback(()=>expandToLevel(20),[expandToLevel]);
  const handleCopyPath=useCallback(path=>{
    const clean=path.replace(/^\$\.?/,'').replace(/^\$/,'');
    copyText(clean||'(root)');
    setCopiedPath(path);
    setTimeout(()=>setCopiedPath(''),1500);
  },[]);
  const goNextMatch=useCallback(()=>{
    if(matchPaths.length===0)return;
    setCurrentMatch(i=>(i+1)%matchPaths.length);
  },[matchPaths]);
  const goPrevMatch=useCallback(()=>{
    if(matchPaths.length===0)return;
    setCurrentMatch(i=>(i-1+matchPaths.length)%matchPaths.length);
  },[matchPaths]);
  useEffect(()=>{
    if(!searchLower){setMatchPaths([]);setCurrentMatch(0);return;}
    const paths=[];
    const walk=(val,key,path)=>{
      if(paths.length>=200)return;
      const keyMatch=key&&String(key).toLowerCase().includes(searchLower);
      const valMatch=(val===null||typeof val!=='object')&&String(val).toLowerCase().includes(searchLower);
      if(keyMatch||valMatch)paths.push(path);
      if(val!==null&&typeof val==='object'){
        if(Array.isArray(val)){val.forEach((v,i)=>walk(v,String(i),`${path}[${i}]`));}
        else{Object.entries(val).forEach(([k,v])=>walk(v,k,`${path}.${k}`));}
      }
    };
    walk(data,null,'$');
    setMatchPaths(paths);
    setCurrentMatch(0);
    if(paths.length>0){
      const toExpand=new Set();
      for(const p of paths){
        let current='';
        const parts=p.match(/[^.\[\]]+|\[\d+\]/g)||[];
        for(let i=0;i<parts.length-1;i++){
          const part=parts[i];
          if(part.startsWith('[')){current=current+part;}
          else{current=current?current+'.'+part:'$';}
          toExpand.add(current);
        }
        toExpand.add('$');
      }
      setExpanded(toExpand);
    }
  },[searchLower,data]);
  useEffect(()=>{
    if(matchPaths.length===0)return;
    const timer=setTimeout(()=>{
      const el=document.getElementById('jt-match-'+currentMatch);
      if(el&&scrollContainerRef.current){el.scrollIntoView({behavior:'smooth',block:'center'});}
    },50);
    return()=>clearTimeout(timer);
  },[currentMatch,matchPaths]);
  return<div>
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{position:'relative',flex:'1 1 200px',maxWidth:320}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search keys and values..." className="mono"
          style={{width:'100%',padding:'8px 12px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,boxSizing:'border-box',paddingRight:matchPaths.length>0?100:search?80:12}}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();if(e.shiftKey)goPrevMatch();else goNextMatch();}}}/>
        {search&&matchPaths.length>0&&(
          <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:10,color:T.success}}>{currentMatch+1}/{matchPaths.length}{matchPaths.length>=200?'+':''}</span>
            <button onClick={e=>{e.preventDefault();goPrevMatch();}} style={{background:'transparent',border:'none',color:T.muted,cursor:'pointer',padding:'0 2px',fontSize:12,lineHeight:1}}>▲</button>
            <button onClick={e=>{e.preventDefault();goNextMatch();}} style={{background:'transparent',border:'none',color:T.muted,cursor:'pointer',padding:'0 2px',fontSize:12,lineHeight:1}}>▼</button>
          </span>
        )}
        {search&&matchPaths.length===0&&(
          <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:T.muted}}>0 matches</span>
        )}
      </div>
      <div style={{display:'flex',gap:4}}>
        <button onClick={collapseAll} style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>Collapse</button>
        <button onClick={()=>expandToLevel(1)} style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>Level 1</button>
        <button onClick={()=>expandToLevel(2)} style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>Level 2</button>
        <button onClick={()=>expandToLevel(3)} style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>Level 3</button>
        <button onClick={expandAll} style={{padding:'6px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>All</button>
      </div>
      {copiedPath&&<span style={{fontSize:10,color:T.success,fontWeight:600}}>Path copied!</span>}
    </div>
    <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:8,overflow:'hidden'}}>
      <div ref={scrollContainerRef} style={{maxHeight:'75vh',overflowY:'auto',overflowX:'auto',padding:'12px 0'}}>
        <div className="mono" style={{fontSize:12,lineHeight:1.7}}>
          <JTNode keyName={null} value={data} path="$" depth={0} expanded={expanded} onToggle={toggle} searchTerm={searchLower} onCopyPath={handleCopyPath} matchPaths={matchPaths} currentMatchIndex={currentMatch}/>
        </div>
      </div>
    </div>
  </div>;
}

function buildDeviceAppsLines(logData, isFull) {
  const req = logData?.requiredApps;
  if (!req || !req.length) return [];
  const da = logData.deviceApps;
  const lines = [];
  if (da?.source === 'manager-result') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const inst = da.installed.find(i => i.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      if (!inst) {
        lines.push(`  ${pad}  —         ✕ not installed`);
      } else if (inst.updated) {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ✓ up to date`);
      } else {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ⚠ outdated (${inst.availableVersion} available)`);
      }
    }
    if (isFull) {
      const rn = new Set(req.map(r => r.appName.toLowerCase()));
      const others = da.installed.filter(i => !rn.has(i.name.toLowerCase()));
      if (others.length > 0) lines.push(`  Other on device: ${others.map(a => `${a.name} ${a.version}`).join(', ')}`);
    }
    if(da.installed.length>0)lines.push(`  ${da.installed.length} apps installed`);
  } else if (da?.source === 'apdu-only') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const found = da.openedApps.find(a => a.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      lines.push(found
        ? `  ${pad}  ${(found.version||'').padEnd(10)}  (detected)`
        : `  ${pad}  —         not detected`);
    }
    lines.push('  Note: Only apps open during session were detected. Full data requires My Ledger.');
  } else if (da?.source === 'catalog-only') {
    const cat=da.appCatalog||{};
    const si=da.sessionInstalls||[];
    lines.push(`DEVICE APPS (${req.length} required — catalog data)`);
    for (const r of req) {
      const catEntry=cat[r.appName.toLowerCase()];
      const sessInst=si.find(s=>s.name.toLowerCase()===r.appName.toLowerCase());
      const pad=r.appName.padEnd(16);
      if(sessInst){
        lines.push(`  ${pad}  ${(sessInst.version||'').padEnd(10)}  ✓ installed this session`);
      } else if(catEntry){
        lines.push(`  ${pad}  ${('latest '+catEntry.version).padEnd(10)}  (available)`);
      } else {
        lines.push(`  ${pad}  —         required`);
      }
    }
    const extraInstalls=si.filter(s=>!req.find(r=>r.appName.toLowerCase()===s.name.toLowerCase()));
    if(extraInstalls.length>0)lines.push(`  Also installed: ${extraInstalls.map(s=>`${s.name} v${s.version}`).join(', ')}`);
  } else {
    lines.push(`DEVICE APPS (${req.length} required — none detected, device not connected)`);
    lines.push(`  ${req.map(r => r.appName).join(', ')}`);
  }
  lines.push('');
  return lines;
}

function fmtAcctLine(a,short,liveBalances,isMobile){
  const addr=short?(a.addr.length>20?a.addr.slice(0,20)+'...':a.addr):(a.addr.length>30?a.addr.slice(0,16)+'...'+a.addr.slice(-8):a.addr);
  const lb=liveBalances?liveBalances[a.id]:null;
  const balStr=lb&&lb.status==='ok'&&lb.bal!=null&&lb.bal>0
    ?`${lb.bal.toLocaleString(undefined,{maximumFractionDigits:6})} ${a.ch.ticker}${lb.fiat!=null?' ($'+lb.fiat.toLocaleString(undefined,{maximumFractionDigits:2})+')':''}`
    :null;
  const opsStr=!isMobile&&a.ops>0?`${a.ops} ops`:null;
  return '  '+[a.ch.name,balStr,opsStr,addr].filter(Boolean).join(' — ');
}

const dropItemStyle={display:'block',width:'100%',padding:'8px 12px 8px 15px',background:'none',border:'none',borderBottom:'1px solid #3C3C3C',borderLeft:'3px solid transparent',color:'#FFFFFF',cursor:'pointer',textAlign:'left',fontSize:12,transition:I.fast};
function buildIncidentLines(logData,ledgerStatus){
  if(!ledgerStatus?.incidents||!logData.entries.length)return[];
  const sessionStart=new Date(logData.entries[0]?.timestamp).getTime();
  const sessionEnd=new Date(logData.entries[logData.entries.length-1]?.timestamp).getTime();
  if(!sessionStart||!sessionEnd)return[];
  const overlapping=ledgerStatus.incidents.filter(inc=>{
    const s=new Date(inc.created_at).getTime();
    const e=inc.resolved_at?new Date(inc.resolved_at).getTime():Date.now();
    return s<=sessionEnd&&e>=sessionStart;
  });
  if(!overlapping.length)return[];
  return['⚠ INCIDENTS DURING SESSION:',...overlapping.map(inc=>`  ${inc.name} (${inc.impact}) — ${inc.resolved_at?'resolved '+new Date(inc.resolved_at).toLocaleString():inc.status}`),''];
}
function worstAspectRatio(row,rowValue,sideLength,totalValue,container){
  const area=(container.w*container.h)*(rowValue/totalValue);
  const rowThickness=area/sideLength;
  let worst=0;
  for(const item of row){const itemLength=sideLength*(item.value/rowValue);const ratio=Math.max(itemLength/rowThickness,rowThickness/itemLength);worst=Math.max(worst,ratio);}
  return worst;
}
function squarify(items,container){
  const totalValue=items.reduce((s,item)=>s+item.value,0);
  if(totalValue===0||items.length===0)return[];
  const rects=[];let remaining=[...items];let currentContainer={...container};
  while(remaining.length>0){
    const isWide=currentContainer.w>=currentContainer.h;
    const sideLength=isWide?currentContainer.h:currentContainer.w;
    const remainingValue=remaining.reduce((s,item)=>s+item.value,0);
    let row=[remaining[0]];let rowValue=remaining[0].value;
    for(let i=1;i<remaining.length;i++){
      const testRow=[...row,remaining[i]];const testValue=rowValue+remaining[i].value;
      if(worstAspectRatio(testRow,testValue,sideLength,remainingValue,currentContainer)<=worstAspectRatio(row,rowValue,sideLength,remainingValue,currentContainer)){row=testRow;rowValue=testValue;}
      else break;
    }
    const rowFraction=rowValue/remainingValue;
    const rowThickness=isWide?currentContainer.w*rowFraction:currentContainer.h*rowFraction;
    let offset=0;
    for(const item of row){
      const itemFraction=item.value/rowValue;const itemLength=sideLength*itemFraction;
      if(isWide){rects.push({...item,x:currentContainer.x,y:currentContainer.y+offset,w:rowThickness,h:itemLength});}
      else{rects.push({...item,x:currentContainer.x+offset,y:currentContainer.y,w:itemLength,h:rowThickness});}
      offset+=itemLength;
    }
    if(isWide){currentContainer.x+=rowThickness;currentContainer.w-=rowThickness;}
    else{currentContainer.y+=rowThickness;currentContainer.h-=rowThickness;}
    remaining=remaining.slice(row.length);
  }
  return rects;
}
function buildSummaryText(logData,liveBalances,ledgerStatus,versionCheck,firmwareCheck,appVersionCheck){
  const d=logData.dev;const accts=logData.accts;const errs=logData.errs;
  const noSyncTxt=accts.length>0&&!accts.some(a=>a.dur!=null||a.bal!=null);
  const ses=logData.entries.length>1?`${fmtDate(logData.entries[0].timestamp)} ${fmtTime(logData.entries[0].timestamp)} — ${fmtTime(logData.entries[logData.entries.length-1].timestamp)}`:'Unknown';
  const degraded=ledgerStatus?parseStatusData(ledgerStatus,logData):null;
  return [
    logData.isMobile?'=== Ledger Diagnostic Summary (Mobile) ===':'=== Ledger Diagnostic Summary ===',
    ...(noSyncTxt?['⚠ NO SYNC DATA — operation counts and log balances are unavailable.','  Live blockchain balances shown where available.','']:[]),
    ...(degraded?[`⚡ LEDGER STATUS: Services degraded — ${degraded.map(d=>d.name).join(', ')} — status.ledger.com`,'']:[]),
    ...buildIncidentLines(logData,ledgerStatus),
    `Session:     ${ses}`,'','DEVICE',
    `  Model:       ${d.modelName||d.modelId||'Unknown'}`,

function buildCustomerText(logData,liveBalances){
  const dev=logData.dev;const accts=logData.accts;const errs=logData.errs;
  const funded=accts.filter(a=>a.ops>0);const empty=accts.filter(a=>a.ops<=0);
  const noSyncTxt=accts.length>0&&!accts.some(a=>a.dur!=null||a.bal!=null);
  const lines=['=== Customer Wallet Summary ===',
    ...(noSyncTxt?['⚠ NO SYNC DATA — operation counts and log balances are unavailable.','  Live blockchain balances shown where available.','']:[]),
    '','DEVICE',
    `  Model:     ${dev.modelName||dev.modelId||'Unknown'}`,
    `  Firmware:  ${(()=>{const fw=dev.fw||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===dev.fw?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,
    `  ${llLabel(dev)}: ${dev.appVer||'Unknown'}`,
    `  OS:        ${[dev.os,dev.osVer].filter(Boolean).join(' ')||(logData.isMobile?(dev.platform==='ios'?'iOS':dev.platform==='android'?'Android':'Unknown'):'Unknown')}`,
    `  Platform:  ${dev.platform||'Unknown'}`,'',
    ...buildDeviceAppsLines(logData,false),`ACCOUNTS (${accts.length})`,
  ];
  for(const a of funded){lines.push(fmtAcctLine(a,false,liveBalances,logData.isMobile));}
  const noDataCount=empty.filter(a=>a.dur==null&&a.bal==null).length;
  const confirmedEmpty=empty.length-noDataCount;
  if(confirmedEmpty>0)lines.push(`  (${confirmedEmpty} empty account${confirmedEmpty!==1?'s':''})`);
  if(noDataCount>0)lines.push(`  (${noDataCount} account${noDataCount!==1?'s':''} — no balance data)`);
  const portfolioTotal=Object.values(liveBalances||{}).reduce((s,lb)=>s+(lb.fiat||0),0);
  if(portfolioTotal>0){lines.push('');lines.push(`PORTFOLIO: $${portfolioTotal.toLocaleString(undefined,{maximumFractionDigits:2})} USD`);}
  if(errs.length>0){lines.push('');lines.push(`ISSUES (${errs.length})`);const seen=new Set();for(const e of errs){const t=e.dg?.t||e.msg||'Unknown';if(seen.has(t))continue;seen.add(t);lines.push(`  [${(e.dg?.s||'?').toUpperCase()}] ${t}`);}}
  lines.push('');lines.push('===========================');
  return lines.join('\n');
}

function buildErrorText(logData){
  const errs=logData.errs;
  if(errs.length===0)return '=== Error Summary ===\n\nNo errors detected.\n===================';
  const lines=['=== Error Summary ===',''];
  for(const e of errs){
    const dg=diagnose(e.raw);
    lines.push(`[${(dg.s||'?').toUpperCase()}] ${dg.t}`);
    lines.push(`  Action: ${llText(dg.a,logData.dev)}`);
    lines.push(`  Category: ${dg.c} · Entry #${e.li} · ${fmtTime(e.ts)}`);
    if(dg.causes&&dg.causes.length>0)lines.push(`  Causes: ${dg.causes.join(', ')}`);
    const u=errUrl(dg);if(u)lines.push(`  Help: ${u}`);
    lines.push('');
  }
  lines.push('===================');
  return lines.join('\n');
}

  // Live firmware checking — fetch latest firmware version from Manager API
  useEffect(()=>{
    if(!logData||!logData.dev)return;

    (async()=>{
      try{
        setFirmwareCheck({status:'loading',current:dev.fw,latest:null,outdated:false});
        const lcv=(()=>{for(const e of logData.entries){const msg=e.message||'';const m=msg.match(/[?&]livecommonversion=([^&\s]+)/i);if(m)return m[1];}return'1.0.0';})();
        // Step 1: Try to get device_version_id from log entries first
        let deviceVersionId=null;
        for(const e of logData.entries){
          if(e.type!=='network-success')continue;
          const msg=e.message||'';
          if(msg.indexOf('get_device_version')<0)continue;
          const id=e.data?.data?.id||e.data?.id;
          if(id&&typeof id==='number'){deviceVersionId=id;break;}
          if(id&&typeof id==='string'&&/^\d+$/.test(id)){deviceVersionId=parseInt(id,10);break;}
        }
        // Step 1 fallback: fetch device_version_id from API (try v1 then v2 path)
        if(!deviceVersionId){
          let dvData=null;
          const dvOpts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({target_id:dev.targetId,provider:1}),signal:controller.signal};
          const dvUrls=['https://manager.api.live.ledger.com/api/get_device_version','https://manager.api.live.ledger.com/api/v2/get_device_version'];
          for(const url of dvUrls){
            try{
              const dvRes=await fetch(url,dvOpts);
              if(dvRes.ok){dvData=await dvRes.json();break;}
            }catch(e){if(e.name==='AbortError')throw e;}
          }
          if(!dvData||!dvData.id)throw new Error('get_device_version: no valid response from any endpoint');
          deviceVersionId=dvData.id;
        }
        // Step 2: Get firmware version database ID
        let seFirmwareId=null;
        for(const e of logData.entries){
          if(e.type!=='network-success')continue;
          const msg=e.message||'';
          if(msg.indexOf('get_firmware_version')<0&&msg.indexOf('firmware_version')<0)continue;
          const id=e.data?.data?.id||e.data?.id;
          if(id&&typeof id==='number'){seFirmwareId=id;break;}
          if(id&&typeof id==='string'&&/^\d+$/.test(id)){seFirmwareId=parseInt(id,10);break;}
        }
        if(!seFirmwareId){
          const fvOpts={method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({device_version:deviceVersionId,version_name:dev.fw,provider:1}),signal:controller.signal};
          const fvUrls=['https://manager.api.live.ledger.com/api/get_firmware_version','https://manager.api.live.ledger.com/api/v2/get_firmware_version'];
          let fvData=null;
          for(const url of fvUrls){
            try{
              const fvRes=await fetch(url,fvOpts);
              if(fvRes.ok){fvData=await fvRes.json();break;}
            }catch(e){if(e.name==='AbortError')throw e;}
          }
          if(!fvData||!fvData.id)throw new Error('get_firmware_version: no valid response');
          seFirmwareId=fvData.id;
        }
        // Step 3: Check for latest firmware via get_osu_version
        const fwBody=JSON.stringify({device_version:deviceVersionId,current_se_firmware_final_version:seFirmwareId,version_name:dev.fw,provider:1});
        const fwOpts={method:'POST',headers:{'Content-Type':'application/json'},body:fwBody,signal:controller.signal};
        const fwUrls=[
          `https://manager.api.live.ledger.com/api/get_osu_version?livecommonversion=${encodeURIComponent(lcv)}`,
          `https://manager.api.live.ledger.com/api/get_latest_firmware?livecommonversion=${encodeURIComponent(lcv)}`,
          'https://manager.api.live.ledger.com/api/get_latest_firmware'
        ];
        let fwRes=null;
        for(const url of fwUrls){
          try{
            fwRes=await fetch(url,fwOpts);
            if(fwRes.ok){break;}
            if(fwRes.status===404){setFirmwareCheck({status:'ok',current:dev.fw,latest:null,outdated:false});return;}
          }catch(e){if(e.name==='AbortError')throw e;}
        }
        if(!fwRes||!fwRes.ok){console.warn('Firmware update check: all endpoints failed');setFirmwareCheck({status:'error',current:dev.fw,latest:null,outdated:false});return;}
        const fwData=await fwRes.json();
        if(!fwData||(typeof fwData==='object'&&Object.keys(fwData).length===0)){
          setFirmwareCheck({status:'ok',current:dev.fw,latest:null,outdated:false});
          return;
        }
        const latestVer=fwData.name
          ||fwData.version
          ||fwData.se_firmware_osu_version?.firmware?.name
          ||fwData.se_firmware_osu_version?.firmware?.version
          ||fwData.firmware?.name
          ||fwData.firmware?.version
          ||null;
        setFirmwareCheck({status:'ok',current:dev.fw,latest:latestVer,outdated:latestVer!=null&&latestVer!==dev.fw});
      }catch(err){
        if(err.name==='AbortError')return;
        console.warn('Firmware check failed:',err.message);
        setFirmwareCheck({status:'error',current:dev.fw,latest:null,outdated:false});
      }
    })();
    return()=>controller.abort();
  },[logData]);

          headers:{'Accept':'application/vnd.github.v3+json'},
          signal:controller.signal
        });

        const releases=await res.json();

          setAppVersionCheck({status:'ok',current:dev.appVer,latest:null,outdated:false});
          return;

          const pa=a.split('.').map(Number);

            const na=pa[i]||0;const nb=pb[i]||0;
            if(na<nb)return -1;if(na>nb)return 1;
          }
          return 0;
        };
        setAppVersionCheck({status:'ok',current:dev.appVer,latest:latestVer,outdated:compareSemver(dev.appVer,latestVer)<0});
      }catch(err){
        if(err.name==='AbortError')return;
        console.warn('Desktop version check failed:',err.message);

                <button onClick={()=>{

                                onMouseEnter={e=>e.currentTarget.style.background=flow.sevColor+'20'}

                                  onMouseEnter={e=>e.currentTarget.style.background=(flow.account.ch.color||T.primary)+'20'}

              {/* Row 3: Enhanced error timeline strip */}
              {(()=>{

                } else {
                  interpretation=`Errors spread across ${errSpanSec}s of a ${durSec}s session — likely independent issues.`;
                }
                const N=60;
                const buckets=Array.from({length:N},()=>({types:{},total:0}));
                for(const e of ents){
                  const idx=Math.min(Math.floor(((new Date(e.timestamp).getTime()-t0)/span)*N),N-1);
                  const b=buckets[idx];
                  const tp=e.type||'unknown';
                  b.types[tp]=(b.types[tp]||0)+1;

                }

                return <div style={{marginBottom:6,marginTop:4}}>
                  <div style={{background:`linear-gradient(180deg, rgba(69,57,92,0.08) 0%, ${T.bg} 40%)`,borderRadius:6,overflow:'hidden',border:'1px solid rgba(255,255,255,0.06)',borderTop:'1px solid rgba(255,255,255,0.08)',position:'relative',height:80,cursor:'crosshair',userSelect:'none',animation:'stripDraw 0.8s ease-out forwards',boxShadow:'inset 0 -3px 8px rgba(0,0,0,0.25)'}}
                    onMouseMove={ev=>{

                      const pct=(ev.clientX-rect.left)/rect.width;
                      const idx=Math.min(Math.floor(pct*N),N-1);
                      const bucketStart=t0+(idx/N)*span;
                      const bucketEnd=t0+((idx+1)/N)*span;
                      const bucketErrs=enrichedErrs.filter(e=>{const et=new Date(e.ts).getTime();return et>=bucketStart&&et<bucketEnd;});
                      setErrStripHover({idx,x:ev.clientX-rect.left,cw:rect.width,errs:bucketErrs,time:bucketStart});

                    onMouseLeave={()=>setErrStripHover(null)}
                    onClick={ev=>{

                      const pct=(ev.clientX-rect.left)/rect.width;
                      const idx=Math.min(Math.floor(pct*N),N-1);
                      const bucketStart=t0+(idx/N)*span;
                      const bucketEnd=t0+((idx+1)/N)*span;
                      const bucketErrs=enrichedErrs.filter(e=>{const et=new Date(e.ts).getTime();return et>=bucketStart&&et<bucketEnd;});
                      if(bucketErrs.length>0){
                        setSelectedErr(bucketErrs[0].li);
                      }else{
                        const clickTime=t0+pct*span;
                        let closest=enrichedErrs[0],closestD=Infinity;
                        for(const e of enrichedErrs){const d=Math.abs(new Date(e.ts).getTime()-clickTime);if(d<closestD){closestD=d;closest=e;}}

                    <div style={{position:'absolute',inset:0,display:'flex',alignItems:'flex-end',padding:'0 1px'}}>

                        const topTypes=Object.entries(b.types).sort((a,b_)=>b_[1]-a[1]);
                        const segs=[];
                        const errTypes=topTypes.filter(([tp])=>tp==='error'||tp.includes('error'));
                        const nonErrTypes=topTypes.filter(([tp])=>tp!=='error'&&!tp.includes('error'));
                        for(const[tp,ct]of nonErrTypes)segs.push({tp,pct:(ct/b.total)*100,isErr:false});

                {logData.apdu.slice(0,500).map((a,i)=>{
                  const status=decodeApduStatus(a.hex,a.dir);
                  const claLabel=a.dir==='in'&&a.hex?`CLA:${a.hex.replace(/\s/g,'').slice(0,2).toUpperCase()}`:null;
                  return<div key={i} className="mono" style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:`1px solid ${T.border}`,transition:I.fast}} onMouseEnter={ev=>ev.currentTarget.style.background=I.hover} onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}>
                    <span style={bdg(a.dir==='in'?'#8B84CC':T.success)}>{a.dir==='in'?'→ IN':'← OUT'}</span>
                    <span style={{color:T.muted,fontSize:10,flexShrink:0}}>{fmtTime(a.ts)}</span>
                    <span style={{width:100,flexShrink:0,fontWeight:600,fontSize:11,color:status?status.color:T.muted}}>{status?status.label:claLabel||'—'}</span>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:T.text}}>{a.hex||'—'}</span>
                    {a.hex&&<CopyBtn text={a.hex}/>}
                  </div>;
                })}
                {logData.apdu.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {logData.apdu.length}</div>}
              </div>
            </div>
          </div>;
        })()}

        {/* Raw JSON */}
        {section==='raw'&&(()=>{
          let treeData=null;
          if(logData.rawText){
            try{treeData=JSON.parse(logData.rawText);}catch{}
            if(!treeData)treeData=logData.entries;
          }
          if(!treeData)return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}><div style={{flexShrink:0,padding:'20px 24px 12px'}}></div><div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px',textAlign:'center',color:T.muted}}><div style={{textAlign:'center',paddingTop:48}}><div style={{fontSize:32,marginBottom:12}}>{'{}'}</div><div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No raw data available</div><div style={{fontSize:12,color:'#949494',maxWidth:360,margin:'0 auto',lineHeight:1.5}}>The uploaded file could not be parsed as JSON. Try re-exporting from Ledger Wallet → Settings → Help → Export logs.</div></div></div></div>;
          return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:T.muted}}>
                {Array.isArray(treeData)?`${treeData.length.toLocaleString()} entries`:'Object'}
              </div>
              <button onClick={()=>{copyText(logData.rawText);}} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}} onMouseEnter={e=>{e.currentTarget.style.borderColor=T.primary;e.currentTarget.style.color=T.primary;}} onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.color=T.muted;}}>
                <Ico.Copy/> Copy raw text
              </button>
            </div>
            </div>{/* end fixed header */}
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
            <JTTree data={treeData}/>
            </div>{/* end scrollable */}
          </div>;
        })()}
      </div>
      </div>}
    </div>
  {logData&&viewMode==='customer'&&<CustomerView logData={logData} appJson={appJson} onAppJson={setAppJson}/>}
  {guideOpen&&<div onClick={()=>setGuideOpen(null)} style={{position:'fixed',inset:0,zIndex:9999,background:'rgba(0,0,0,0.7)',display:'flex',alignItems:'center',justifyContent:'center',animation:'fadeIn 0.15s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{width:'min(900px, 90vw)',height:'85vh',background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 24px 80px rgba(0,0,0,0.6)'}}>
      <div style={{display:'flex',alignItems:'center',padding:'12px 20px',borderBottom:`1px solid ${T.border}`,flexShrink:0,gap:12}}>
        <span style={{fontSize:14,fontWeight:700,color:T.text,flex:1}}>{guideOpen==='agent'?'Agent Guide':'Technical Reference'}</span>
        <input value={guideSearch} onChange={e=>setGuideSearch(e.target.value)} placeholder="Search..." style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${T.border}`,background:T.panel,color:T.text,fontSize:12,width:200,fontFamily:"'Darker Grotesque',sans-serif"}}/>
        <button onClick={()=>setGuideOpen(null)} style={{width:28,height:28,borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}} onMouseEnter={e=>{e.currentTarget.style.background='rgba(228,0,70,0.15)';e.currentTarget.style.color=T.error;}} onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=T.muted;}}>✕</button>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'0'}}>
        {(()=>{
          const raw=guideOpen==='agent'?GUIDE_AGENT:GUIDE_TECHNICAL;
          let html=raw;
          if(guideSearch.length>=2){const esc=guideSearch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');const re=new RegExp(`(${esc})`,'gi');html=html.replace(/(<[^>]*>)|([^<]+)/g,(m,tag,text)=>{if(tag)return tag;return text.replace(re,'<mark style="background:rgba(187,176,255,0.35);color:#fff;padding:1px 2px;border-radius:2px">$1</mark>');});}
          return <div className="guide-embed" dangerouslySetInnerHTML={{__html:html}}/>;
        })()}
      </div>
    </div>
  </div>}
  </div>

}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  render(){
    if(this.state.hasError)return<div style={{minHeight:'100vh',background:'#131214',color:'#FFFFFF',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'sans-serif',textAlign:'center'}}><div><div style={{fontSize:24,marginBottom:12}}>⚠️</div><div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Something went wrong</div><div style={{fontSize:13,color:'#949494',marginBottom:16}}>Reload the page to try again.</div><button onClick={()=>window.location.reload()} style={{padding:'8px 20px',borderRadius:6,border:'none',background:'#BBB0FF',color:'#000',fontWeight:600,fontSize:13,cursor:'pointer'}}>Reload</button></div></div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
