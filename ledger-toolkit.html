function JTNode({keyName,value,path,depth,expanded,onToggle,searchTerm,onCopyPath,matchPaths,currentMatchIndex}){
  const type=value===null?'null':Array.isArray(value)?'array':typeof value;
  const isExpandable=type==='object'||type==='array';
  const isExpanded=isExpandable&&expanded.has(path);
  const entries=isExpandable?(type==='array'?value.map((v,i)=>[String(i),v]):Object.entries(value)):[];
  const matchesSearch=searchTerm&&(
    (keyName&&String(keyName).toLowerCase().includes(searchTerm))||
    (!isExpandable&&String(value).toLowerCase().includes(searchTerm))
  );
  const matchIndex=matchPaths?matchPaths.indexOf(path):-1;
  const isCurrentMatch=matchIndex>=0&&matchIndex===currentMatchIndex;
  const renderValue=()=>{
    if(value===null)return<span style={{color:T.muted,fontStyle:'italic'}}>null</span>;
    if(type==='boolean')return<span style={{color:T.error}}>{String(value)}</span>;
    if(type==='number')return<span style={{color:T.warning}}>{String(value)}</span>;
    if(type==='string'){const display=value.length>120?value.slice(0,120)+'…':value;return<span style={{color:T.success}}>"{display}"</span>;}
    return null;
  };
  const badge=isExpandable&&!isExpanded?<span style={{color:T.muted,fontSize:11,marginLeft:4}}>{type==='array'?`[${value.length} items]`:`{${Object.keys(value).length} keys}`}</span>:null;
  const openBracket=isExpandable&&isExpanded?<span style={{color:T.muted}}>{type==='array'?'[':'{'}</span>:null;
  const closeBracket=isExpandable&&isExpanded?<div style={{paddingLeft:depth>0?20:0}}><span style={{color:T.muted}}>{type==='array'?']':'}'}</span></div>:null;
  const[hovered,setHovered]=useState(false);
  return<div>
    <div className="jt-row" id={matchIndex>=0?'jt-match-'+matchIndex:undefined}
      style={{paddingLeft:depth*20,background:isCurrentMatch?'rgba(187,176,255,0.25)':matchesSearch?'rgba(187,176,255,0.08)':'transparent',borderLeft:isCurrentMatch?'2px solid #BBB0FF':'2px solid transparent',transition:'background 150ms ease'}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>
      {isExpandable
        ?<span className="jt-arrow" onClick={()=>onToggle(path)} style={{cursor:'pointer',userSelect:'none',color:T.muted,display:'inline-block',width:16,textAlign:'center',transition:'transform 0.15s',transform:isExpanded?'rotate(90deg)':'none'}}>▶</span>
        :<span style={{display:'inline-block',width:16}}/>
      }
      {keyName!==null&&(()=>{const isIndex=/^\d+$/.test(keyName);return<><span style={{color:isIndex?T.muted:T.primary}}>{isIndex?keyName:`"${keyName}"`}</span><span style={{color:T.muted}}>: </span></>;})()}
      {isExpandable?(isExpanded?openBracket:badge):renderValue()}
      {hovered&&path&&<span className="jt-copy-path" onClick={e=>{e.stopPropagation();onCopyPath(path);}} title={`Copy path: ${path}`}>📋</span>}
    </div>
    {isExpanded&&(()=>{
      const capped=entries.length>500;
      const display=capped?entries.slice(0,500):entries;
      return<>
        {display.map(([k,v],i)=>(
          <JTNode key={k+i} keyName={k} value={v}
            path={type==='array'?`${path}[${k}]`:`${path}.${k}`}
            depth={depth+1} expanded={expanded} onToggle={onToggle}
            searchTerm={searchTerm} onCopyPath={onCopyPath}
            matchPaths={matchPaths} currentMatchIndex={currentMatchIndex}/>
        ))}
        {capped&&<div style={{paddingLeft:(depth+1)*20+16,color:T.muted,fontSize:11,fontStyle:'italic',padding:'4px 12px 4px '+(((depth+1)*20)+16)+'px'}}>… and {entries.length-500} more items</div>}
      </>;
    })()}
    {closeBracket}
  </div>;
}

function JTTree({data}){
  const[expanded,setExpanded]=useState(()=>new Set());
  const[search,setSearch]=useState('');
  const[copiedPath,setCopiedPath]=useState('');
  const[matchPaths,setMatchPaths]=useState([]);
  const[currentMatch,setCurrentMatch]=useState(0);
  const scrollContainerRef=useRef(null);
  const searchLower=search.toLowerCase();
  const toggle=useCallback(path=>{
    setExpanded(prev=>{const next=new Set(prev);if(next.has(path))next.delete(path);else next.add(path);return next;});
  },[]);
  const expandToLevel=useCallback((maxDepth)=>{
    const paths=new Set();
    const walk=(val,path,depth)=>{
      if(depth>=maxDepth)return;
      if(val===null||typeof val!=='object')return;
      paths.add(path);
      if(Array.isArray(val)){val.forEach((v,i)=>walk(v,`${path}[${i}]`,depth+1));}
      else{Object.entries(val).forEach(([k,v])=>walk(v,`${path}.${k}`,depth+1));}
    };
    walk(data,'$',0);
    setExpanded(paths);
  },[data]);
  const collapseAll=useCallback(()=>setExpanded(new Set()),[]);
  const expandAll=useCallback(()=>expandToLevel(20),[expandToLevel]);
  const handleCopyPath=useCallback(path=>{
    const clean=path.replace(/^\$\.?/,'').replace(/^\$/,'');
    copyText(clean||'$');
    setCopiedPath(path);
    setTimeout(()=>setCopiedPath(''),1500);
  },[]);
  const goNextMatch=useCallback(()=>{
    if(matchPaths.length===0)return;
    setCurrentMatch(i=>(i+1)%matchPaths.length);
  },[matchPaths]);
  const goPrevMatch=useCallback(()=>{
    if(matchPaths.length===0)return;
    setCurrentMatch(i=>(i-1+matchPaths.length)%matchPaths.length);
  },[matchPaths]);
  useEffect(()=>{
    if(!searchLower){setMatchPaths([]);setCurrentMatch(0);return;}
    const paths=[];
    const walk=(val,key,path)=>{
      if(paths.length>=200)return;
      const keyMatch=key&&String(key).toLowerCase().includes(searchLower);
      const valMatch=(val===null||typeof val!=='object')&&String(val).toLowerCase().includes(searchLower);
      if(keyMatch||valMatch)paths.push(path);
      if(val!==null&&typeof val==='object'){
        if(Array.isArray(val)){val.forEach((v,i)=>walk(v,String(i),`${path}[${i}]`));}
        else{Object.entries(val).forEach(([k,v])=>walk(v,k,`${path}.${k}`));}
      }
    };
    walk(data,null,'$');
    setMatchPaths(paths);
    setCurrentMatch(0);
    if(paths.length>0){
      const toExpand=new Set();
      for(const p of paths){
        let current='';
        const parts=p.match(/[^.\[\]]+|\[\d+\]/g)||[];
        for(let i=0;i<parts.length-1;i++){
          const part=parts[i];
          if(part.startsWith('[')){current=current+part;}
          else{current=current?current+'.'+part:'$';}
          toExpand.add(current);
        }
        toExpand.add('$');
      }
      setExpanded(toExpand);
    }
  },[searchLower,data]);
  useEffect(()=>{
    if(matchPaths.length===0)return;
    const timer=setTimeout(()=>{
      const el=document.getElementById('jt-match-'+currentMatch);
      if(el&&scrollContainerRef.current){el.scrollIntoView({behavior:'smooth',block:'center'});}
    },50);
    return()=>clearTimeout(timer);
  },[currentMatch,matchPaths]);
  return<div>
    <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <div style={{position:'relative',flex:'1 1 200px',maxWidth:320}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search keys and values..." className="mono"
          style={{width:'100%',padding:'8px 12px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:6,color:T.text,fontSize:12,boxSizing:'border-box',paddingRight:matchPaths.length>0?100:search?80:12}}
          onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();if(e.shiftKey)goPrevMatch();else goNextMatch();}}}/>
        {search&&matchPaths.length>0&&(
          <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:10,color:T.success}}>{currentMatch+1}/{matchPaths.length}{matchPaths.length>=200?'+':''}</span>
            <button onClick={e=>{e.preventDefault();goPrevMatch();}} style={{background:'transparent',border:'none',color:T.muted,cursor:'pointer',padding:'0 2px',fontSize:12,lineHeight:1}}>▲</button>
            <button onClick={e=>{e.preventDefault();goNextMatch();}} style={{background:'transparent',border:'none',color:T.muted,cursor:'pointer',padding:'0 2px',fontSize:12,lineHeight:1}}>▼</button>
          </span>
        )}
        {search&&matchPaths.length===0&&(
          <span style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:10,color:T.muted}}>0 matches</span>
        )}
      </div>
      <div style={{display:'flex',gap:4}}>
        <button onClick={collapseAll} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Collapse</button>
        <button onClick={()=>expandToLevel(1)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 1</button>
        <button onClick={()=>expandToLevel(2)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 2</button>
        <button onClick={()=>expandToLevel(3)} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>Level 3</button>
        <button onClick={expandAll} style={{padding:'6px 10px',borderRadius:5,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:10,fontWeight:600,cursor:'pointer'}}>All</button>
      </div>
      {copiedPath&&<span style={{fontSize:10,color:T.success,fontWeight:600}}>Path copied!</span>}
    </div>
    <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
      <div ref={scrollContainerRef} style={{maxHeight:'75vh',overflowY:'auto',overflowX:'auto',padding:'12px 0'}}>
        <div className="mono" style={{fontSize:12,lineHeight:1.7}}>
          <JTNode keyName={null} value={data} path="$" depth={0} expanded={expanded} onToggle={toggle} searchTerm={searchLower} onCopyPath={handleCopyPath} matchPaths={matchPaths} currentMatchIndex={currentMatch}/>
        </div>
      </div>
    </div>
  </div>;
}

function buildDeviceAppsLines(logData, isFull) {
  const req = logData?.requiredApps;
  if (!req || !req.length) return [];
  const da = logData.deviceApps;
  const lines = [];
  if (da?.source === 'manager-result') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const inst = da.installed.find(i => i.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      if (!inst) {
        lines.push(`  ${pad}  —         ✕ not installed`);
      } else if (inst.updated) {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ✓ up to date`);
      } else {
        lines.push(`  ${pad}  ${(inst.version||'').padEnd(10)}  ⚠ outdated (${inst.availableVersion} available)`);
      }
    }
    if (isFull) {
      const rn = new Set(req.map(r => r.appName.toLowerCase()));
      const others = da.installed.filter(i => !rn.has(i.name.toLowerCase()));
      if (others.length > 0) lines.push(`  Other on device: ${others.map(a => `${a.name} ${a.version}`).join(', ')}`);
    }
    if(da.installed.length>0)lines.push(`  ${da.installed.length} apps installed`);
  } else if (da?.source === 'apdu-only') {
    lines.push(`DEVICE APPS (${req.length} required)`);
    for (const r of req) {
      const found = da.openedApps.find(a => a.name.toLowerCase() === r.appName.toLowerCase());
      const pad = r.appName.padEnd(16);
      lines.push(found
        ? `  ${pad}  ${(found.version||'').padEnd(10)}  (detected)`
        : `  ${pad}  —         not detected`);
    }
    lines.push('  Note: Only apps open during session were detected. Full data requires My Ledger.');
  } else if (da?.source === 'catalog-only') {
    const cat=da.appCatalog||{};
    const si=da.sessionInstalls||[];
    lines.push(`DEVICE APPS (${req.length} required — catalog data)`);
    for (const r of req) {
      const catEntry=cat[r.appName.toLowerCase()];
      const sessInst=si.find(s=>s.name.toLowerCase()===r.appName.toLowerCase());
      const pad=r.appName.padEnd(16);
      if(sessInst){
        lines.push(`  ${pad}  ${(sessInst.version||'').padEnd(10)}  ✓ installed this session`);
      } else if(catEntry){
        lines.push(`  ${pad}  ${('latest '+catEntry.version).padEnd(10)}  (available)`);
      } else {
        lines.push(`  ${pad}  —         required`);
      }
    }
    const extraInstalls=si.filter(s=>!req.find(r=>r.appName.toLowerCase()===s.name.toLowerCase()));
    if(extraInstalls.length>0)lines.push(`  Also installed: ${extraInstalls.map(s=>`${s.name} v${s.version}`).join(', ')}`);
  } else {
    lines.push(`DEVICE APPS (${req.length} required — none detected, device not connected)`);
    lines.push(`  ${req.map(r => r.appName).join(', ')}`);
  }
  lines.push('');
  return lines;
}

function fmtAcctLine(a,short,liveBalances,isMobile){
  const addr=short?(a.addr.length>20?a.addr.slice(0,20)+'...':a.addr):(a.addr.length>30?a.addr.slice(0,16)+'...'+a.addr.slice(-8):a.addr);
  const lb=liveBalances?liveBalances[a.id]:null;
  const balStr=lb&&lb.status==='ok'&&lb.bal!=null&&lb.bal>0
    ?`${lb.bal.toLocaleString(undefined,{maximumFractionDigits:6})} ${a.ch.ticker}${lb.fiat!=null?' ($'+lb.fiat.toLocaleString(undefined,{maximumFractionDigits:2})+')':''}`
    :null;
  const opsStr=!isMobile&&a.ops>0?`${a.ops} ops`:null;
  return '  '+[a.ch.name,balStr,opsStr,addr].filter(Boolean).join(' — ');
}

function DiagSidebar({ logData, section, setSection, liveBalances }) {
  const errors = logData ? logData.errs : [];
  const accounts = logData ? logData.accts : [];

  const [copyOpen, setCopyOpen] = useState(false);
  const [accountsOpen, setAccountsOpen] = useState(true);
  const [advOpen, setAdvOpen] = useState(false);

  // Severity computation
  const diagnosed = errors.map(e => ({ ...e, dg: diagnose(e.raw) }));
  const critCount = diagnosed.filter(e => e.dg.s === 'high').length;
  const warnCount = diagnosed.filter(e => e.dg.s === 'medium').length;
  const sevColor = critCount > 0 ? T.error : warnCount > 0 ? T.warning : T.success;
  const topErr = diagnosed.find(e => e.dg.s === 'high') || diagnosed.find(e => e.dg.s === 'medium');
  const sevSentence = critCount > 0
    ? `${critCount} critical issue${critCount > 1 ? 's' : ''} — ${topErr?.dg?.t || 'review errors'}`
    : warnCount > 0
    ? `${warnCount} warning${warnCount > 1 ? 's' : ''} during session`
    : errors.length === 0 ? 'Clean session — no issues detected' : `No critical issues — ${errors.length} informational event${errors.length!==1?'s':''} logged (routine)`;
  const noSync = accounts.length > 0 && !accounts.some(a => a.dur != null || a.bal != null);
  const sevSentenceFinal = noSync ? sevSentence + ' · No sync data' : sevSentence;

  const dropItemStyle = {
    display: 'block', width: '100%', padding: '8px 12px',
    background: 'none', border: 'none', borderBottom: '1px solid #3C3C3C',
    color: '#FFFFFF', cursor: 'pointer', textAlign: 'left', fontSize: 12
  };

  // Copy text builders (mirrors Overview copy buttons)
  const buildSummaryText = () => {
    const d = logData.dev;
    const accts = logData.accts;
    const errs = logData.errs;
    const noSyncTxt = accts.length > 0 && !accts.some(a => a.dur != null || a.bal != null);
    const ses = logData.entries.length > 1
      ? `${fmtDate(logData.entries[0].timestamp)} ${fmtTime(logData.entries[0].timestamp)} — ${fmtTime(logData.entries[logData.entries.length - 1].timestamp)}`
      : 'Unknown';
    return [
      logData.isMobile?'=== Ledger Diagnostic Summary (Mobile) ===':'=== Ledger Diagnostic Summary ===',
      ...(noSyncTxt ? ['⚠ NO SYNC DATA — operation counts and log balances are unavailable.', '  Live blockchain balances shown where available.', ''] : []),
      `Session:     ${ses}`,
      '',
      'DEVICE',
      `  Model:       ${d.modelName || d.modelId || 'Unknown'}`,
      `  Firmware:    ${(()=>{const fw=d.fw||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===d.fw?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,
      `  ${llLabel(d,logData.isMobile)}: ${d.appVer || 'Unknown'}`,
      `  OS:         ${[d.os, d.osVer].filter(Boolean).join(' ') || (logData.isMobile?(d.platform==='ios'?'iOS':d.platform==='android'?'Android':'Unknown'):'Unknown')}`,
      `  Platform:   ${d.platform || 'Unknown'}`,
      `  User ID:    ${d.userId || 'Unknown'}`,
      '',
      ...buildDeviceAppsLines(logData, false),
      `ACCOUNTS (${accts.length})`,
      ...accts.slice(0, 10).map(a=>fmtAcctLine(a,true,liveBalances,logData.isMobile)),
      ...(accts.length > 10 ? [`  ... and ${accts.length - 10} more`] : []),
      (()=>{const t=Object.values(liveBalances||{}).reduce((s,lb)=>s+(lb.fiat||0),0);return t>0?`PORTFOLIO: $${t.toLocaleString(undefined,{maximumFractionDigits:2})} USD`:undefined;})(),
      '',
      `ERRORS (${errs.length})`,
      ...errs.slice(0, 8).map(e => `  [${(e.dg?.s || '?').toUpperCase()}] ${e.dg?.t || e.msg || '?'}: ${llText(e.dg?.a,d) || ''}`),
      ...(errs.length > 8 ? [`  ... and ${errs.length - 8} more`] : []),
      '',
      `APDU exchanges: ${logData.apdu?.length || 0}`,
      `Log quality: ${logData.quality?.score || 0}/100 (${logData.quality?.label || '?'})`,
      '',
      'SESSION ACTIVITY',
      ...(()=>{const act=logData.activity||{};const flags=[];if(act.managerOpened)flags.push('  Manager opened');if(act.swapBrowsed)flags.push(`  Swap browsed${act.swapExecuted?'':' (not completed)'}`);if(act.deviceScan)flags.push('  Device scan active');return flags.length?flags:['  (none detected)'];})(),
      '=================================',
    ].filter(l => l !== undefined).join('\n');
  };

  const buildFullText = () => {
    const d = logData.dev;
    const accts = logData.accts;
    const errs = logData.errs;
    const noSyncTxt = accts.length > 0 && !accts.some(a => a.dur != null || a.bal != null);
    const ses = logData.entries.length > 1
      ? `${fmtDate(logData.entries[0].timestamp)} ${fmtTime(logData.entries[0].timestamp)} — ${fmtTime(logData.entries[logData.entries.length - 1].timestamp)}`
      : 'Unknown';
    return [
      logData.isMobile?'=== Ledger Diagnostic Summary — Full (Mobile) ===':'=== Ledger Diagnostic Summary (Full) ===',
      ...(noSyncTxt ? ['⚠ NO SYNC DATA — operation counts and log balances are unavailable.', '  Live blockchain balances shown where available.', ''] : []),
      `Session:     ${ses}`,
      '',
      'DEVICE',
      `  Model:       ${d.modelName || d.modelId || 'Unknown'}`,
      `  Firmware:    ${(()=>{const fw=d.fw||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===d.fw?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,
      `  ${llLabel(d,logData.isMobile)}: ${d.appVer || 'Unknown'}`,
      `  OS:         ${[d.os, d.osVer].filter(Boolean).join(' ') || (logData.isMobile?(d.platform==='ios'?'iOS':d.platform==='android'?'Android':'Unknown'):'Unknown')}`,
      `  Platform:   ${d.platform || 'Unknown'}`,
      `  User ID:    ${d.userId || 'Unknown'}`,
      '',
      ...buildDeviceAppsLines(logData, true),
      `ACCOUNTS (${accts.length})`,
      ...accts.map(a=>fmtAcctLine(a,true,liveBalances,logData.isMobile)),
      (()=>{const t=Object.values(liveBalances||{}).reduce((s,lb)=>s+(lb.fiat||0),0);return t>0?`PORTFOLIO: $${t.toLocaleString(undefined,{maximumFractionDigits:2})} USD`:undefined;})(),
      '',
      `ERRORS (${errs.length})`,
      ...errs.map(e => `  [${(e.dg?.s || '?').toUpperCase()}] ${e.dg?.t || e.msg || '?'}: ${llText(e.dg?.a,d) || ''}`),
      '',
      `APDU exchanges: ${logData.apdu?.length || 0}`,
      `Log quality: ${logData.quality?.score || 0}/100 (${logData.quality?.label || '?'})`,
      '',
      'SESSION ACTIVITY',
      ...(()=>{const act=logData.activity||{};const flags=[];if(act.managerOpened)flags.push('  Manager opened');if(act.swapBrowsed)flags.push(`  Swap browsed${act.swapExecuted?'':' (not completed)'}`);if(act.deviceScan)flags.push('  Device scan active');return flags.length?flags:['  (none detected)'];})(),
      '=================================',
    ].filter(l => l !== undefined).join('\n');
  };

  const buildCustomerText = () => {
    const dev = logData.dev;
    const accts = logData.accts;
    const errs = logData.errs;
    const funded = accts.filter(a => a.ops > 0);
    const empty = accts.filter(a => a.ops <= 0);
    const noSyncTxt = accts.length > 0 && !accts.some(a => a.dur != null || a.bal != null);
    const lines = [
      '=== Customer Wallet Summary ===',
      ...(noSyncTxt ? ['⚠ NO SYNC DATA — operation counts and log balances are unavailable.', '  Live blockchain balances shown where available.', ''] : []),
      '',
      'DEVICE',
      `  Model:     ${dev.modelName || dev.modelId || 'Unknown'}`,
      `  Firmware:  ${(()=>{const fw=dev.fw||'Unknown';const lf=logData.deviceApps?.firmware;return lf?(lf.version===dev.fw?fw+' (up to date)':fw+` (outdated — ${lf.version} available)`):fw;})()}`,
      `  ${llLabel(dev)}: ${dev.appVer || 'Unknown'}`,
      `  OS:        ${[dev.os, dev.osVer].filter(Boolean).join(' ') || (logData.isMobile?(dev.platform==='ios'?'iOS':dev.platform==='android'?'Android':'Unknown'):'Unknown')}`,
      `  Platform:  ${dev.platform || 'Unknown'}`,
      '',
      ...buildDeviceAppsLines(logData, false),
      `ACCOUNTS (${accts.length})`,
    ];
    for (const a of funded) {
      lines.push(fmtAcctLine(a,false,liveBalances,logData.isMobile));
    }
    const noDataCount=empty.filter(a=>a.dur==null&&a.bal==null).length;
    const confirmedEmpty=empty.length-noDataCount;
    if(confirmedEmpty>0)lines.push(`  (${confirmedEmpty} empty account${confirmedEmpty!==1?'s':''})`);
    if(noDataCount>0)lines.push(`  (${noDataCount} account${noDataCount!==1?'s':''} — no balance data)`);
    const portfolioTotal=Object.values(liveBalances||{}).reduce((s,lb)=>s+(lb.fiat||0),0);
    if(portfolioTotal>0){lines.push('');lines.push(`PORTFOLIO: $${portfolioTotal.toLocaleString(undefined,{maximumFractionDigits:2})} USD`);}
    if (errs.length > 0) {
      lines.push('');
      lines.push(`ISSUES (${errs.length})`);
      const seen = new Set();
      for (const e of errs) {
        const t = e.dg?.t || e.msg || 'Unknown';
        if (seen.has(t)) continue;
        seen.add(t);
        lines.push(`  [${(e.dg?.s || '?').toUpperCase()}] ${t}`);
      }
    }
    lines.push('');
    lines.push('===========================');
    return lines.join('\n');
  };

  // Sub-components defined inline
  const SectionHeader = ({ icon, label, subtitle, count, active, onClick, expandable, expanded, dot }) => (
    <div
      onClick={onClick}
      style={{
        display: 'flex', alignItems: 'flex-start', gap: 8, padding: '12px 16px',
        cursor: 'pointer', borderLeft: active ? '3px solid #BBB0FF' : '3px solid transparent',
        borderTop: '1px solid #3C3C3C',
        background: active ? 'rgba(187,176,255,0.08)' : 'transparent',
      }}
      onMouseEnter={e => e.currentTarget.style.background = active ? 'rgba(187,176,255,0.08)' : 'rgba(255,255,255,0.04)'}
      onMouseLeave={e => e.currentTarget.style.background = active ? 'rgba(187,176,255,0.08)' : 'transparent'}
    >
      <span style={{ fontSize: 14, marginTop: 1 }}>{icon}</span>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center' }}>
          <span style={{ fontSize: 12, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em', color: '#FFFFFF' }}>{label}</span>
          {dot && <span style={{ width: 6, height: 6, borderRadius: '50%', background: dot, flexShrink: 0, marginLeft: 6, display: 'inline-block' }}/>}
          {count != null && <span style={{ fontSize: 11, color: '#949494', marginLeft: 'auto', paddingLeft: 8 }}>{count}</span>}
          {expandable && <span style={{ fontSize: 10, color: '#949494', marginLeft: 4 }}>{expanded ? '▾' : '▸'}</span>}
        </div>
        <div style={{ fontSize: 10, color: '#666666', marginTop: 2 }}>{subtitle}</div>
      </div>
    </div>
  );

  // Accounts split
  const fundedAccts = accounts.filter(a => a.ops > 0);
  const emptyAccts = accounts.filter(a => a.ops <= 0);
  const errorsForAcct = (acct) => errors.filter(e =>
    e.raw && (
      (e.raw.message || '').toLowerCase().includes(acct.cid) ||
      (e.raw.message || '').toLowerCase().includes(acct.ch.name.toLowerCase())
    )
  ).length;

  // Advanced counts
  const networkCount = logData ? logData.entries.filter(e => e.type === 'network').length : 0;
  const apduCount = logData ? logData.apdu.length : 0;

  const advItems = [
    { label: 'Network', icon: '🌐', count: networkCount, sec: 'network' },
    { label: 'APDU', icon: '📡', count: apduCount, sec: 'apdu' },
    { label: 'Raw JSON', icon: '{ }', count: null, sec: 'raw' },
  ];


  return (
    <div style={{ width: 240, minWidth: 240, borderRight: '1px solid #3C3C3C', background: '#1C1D1F', display: 'flex', flexDirection: 'column', overflowY: 'auto', flexShrink: 0 }}>

      {/* Diagnosis block */}
      <div
        onClick={() => setSection('overview')}
        style={{
          borderLeft: `4px solid ${sevColor}`,
          background: section === 'overview' ? 'rgba(187,176,255,0.08)' : 'rgba(187,176,255,0.04)',
          padding: '12px',
          cursor: 'pointer',
          position: 'relative',
        }}
      >
        <div style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: '#949494', marginBottom: 4 }}>Overview</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 8 }}>
          <span style={{ color: sevColor, fontSize: 10 }}>●</span>
          <span style={{ fontSize: 12, color: '#FFFFFF', lineHeight: 1.3 }}>{sevSentenceFinal}</span>
        </div>
        <div style={{ position: 'relative' }} onClick={e => e.stopPropagation()}>
          <button
            onClick={() => setCopyOpen(o => !o)}
            style={{ fontSize: 11, background: 'rgba(255,255,255,0.08)', border: '1px solid #3C3C3C', borderRadius: 4, color: '#FFFFFF', padding: '4px 8px', cursor: 'pointer' }}
          >Copy ▾</button>
          {copyOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, zIndex: 100, background: '#1C1D1F', border: '1px solid #3C3C3C', borderRadius: 6, minWidth: 180, boxShadow: '0 4px 16px rgba(0,0,0,0.4)', marginTop: 4 }}>
              <button onClick={() => { copyText(buildSummaryText()); setCopyOpen(false); }} style={dropItemStyle}>
                <div style={{ fontWeight: 600 }}>Quick Summary</div>
                <div style={{ color: '#949494', fontSize: 10 }}>for ticket notes</div>
              </button>
              <button onClick={() => { copyText(buildFullText()); setCopyOpen(false); }} style={dropItemStyle}>
                <div style={{ fontWeight: 600 }}>Full Export</div>
                <div style={{ color: '#949494', fontSize: 10 }}>for escalation</div>
              </button>
              {accounts.length > 0 && (
                <button onClick={() => { copyText(buildCustomerText()); setCopyOpen(false); }} style={{ ...dropItemStyle, borderBottom: 'none' }}>
                  <div style={{ fontWeight: 600 }}>Customer Summary</div>
                  <div style={{ color: '#949494', fontSize: 10 }}>account-focused</div>
                </button>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Section list */}
      <div style={{ flex: 1 }}>

        {/* Issues */}
        <SectionHeader
          icon={<Ico.Alert />} label="Issues" subtitle="Errors and warnings"
          count={errors.length} active={section === 'errors'}
          onClick={() => setSection('errors')}
        />

        {/* Accounts */}
        <SectionHeader
          icon={<Ico.Wallet />} label="Accounts" subtitle={noSync ? 'No sync — log balances unavailable' : 'Crypto accounts in this log'}
          count={accounts.length} active={section === 'accounts'} expandable expanded={accountsOpen}
          onClick={() => { setAccountsOpen(o => !o); setSection('accounts'); }}
        />
        {accountsOpen && (
          <div>
            {fundedAccts.slice(0, 4).map(acct => {
              const chainColor = acct.ch?.color || '#949494';
              const errCount = errorsForAcct(acct);
              return (
                <div key={acct.id} onClick={() => setSection('accounts')}
                  style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '5px 16px 5px 32px', cursor: 'pointer', fontSize: 12, color: '#CCCCCC' }}
                  onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
                  onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <span style={{ width: 8, height: 8, borderRadius: '50%', background: chainColor, flexShrink: 0, display: 'inline-block' }} />
                  <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{acct.ch.name}</span>
                  {errCount > 0 && <span style={{ fontSize: 10, color: '#F57375', background: 'rgba(245,115,117,0.15)', borderRadius: 3, padding: '1px 4px' }}>⚠{errCount}</span>}
                  {(()=>{const lb=liveBalances?.[acct.id];if(!lb||lb.status!=='ok'||!lb.fiat)return null;return <span className="mono" style={{fontSize:9,color:'#7AC26C',marginLeft:'auto',flexShrink:0}}>{lb.fiat<1000?'$'+lb.fiat.toFixed(2):'$'+Math.round(lb.fiat).toLocaleString()}</span>;})()}
                </div>
              );
            })}
            {fundedAccts.length > 4 && (
              <div onClick={() => setSection('accounts')}
                style={{ padding: '5px 16px 5px 32px', fontSize: 11, color: '#949494', cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                +{fundedAccts.length - 4} more funded
              </div>
            )}
            {emptyAccts.length > 0 && (()=>{
              const confirmed=emptyAccts.filter(a=>a.dur!=null||a.bal!=null);
              const noData=emptyAccts.filter(a=>a.dur==null&&a.bal==null);
              return <div onClick={() => setSection('accounts')}
                style={{ padding: '5px 16px 5px 32px', fontSize: 11, color: '#949494', fontStyle: 'italic', cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.04)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                {confirmed.length>0&&noData.length>0
                  ?`╶╶ ${confirmed.length} empty · ${noData.length} no data`
                  :confirmed.length>0
                    ?`╶╶ ${confirmed.length} empty…`
                    :`╶╶ ${noData.length} no balance data`}
              </div>;
            })()}
            {accounts.length === 0 && (
              <div style={{ padding: '5px 16px 5px 32px', fontSize: 11, color: '#949494', fontStyle: 'italic' }}>No accounts found</div>
            )}
          </div>
        )}

        {/* Timeline */}
        <SectionHeader
          icon={<Ico.Logs />} label="Timeline" subtitle="All events, chronological"
          count={logData?.entries?.length || 0} active={section === 'timeline'}
          onClick={() => setSection('timeline')}
        />

        {/* Advanced */}
        <SectionHeader
          icon={<span>⚙</span>} label="Advanced" subtitle="Network · APDU · Raw"
          active={['network', 'apdu', 'raw'].includes(section)} expandable expanded={advOpen}
          onClick={() => setAdvOpen(o => !o)}
        />
        {advOpen && (
          <div>
            {advItems.map(item => (
              <div key={item.sec} onClick={() => setSection(item.sec)}
                style={{
                  display: 'flex', alignItems: 'center', gap: 6, padding: '6px 16px 6px 28px', cursor: 'pointer', fontSize: 12,
                  color: section === item.sec ? '#BBB0FF' : '#CCCCCC',
                  background: section === item.sec ? 'rgba(187,176,255,0.08)' : 'transparent',
                  borderLeft: section === item.sec ? '3px solid #BBB0FF' : '3px solid transparent',
                }}
                onMouseEnter={e => { if (section !== item.sec) e.currentTarget.style.background = 'rgba(255,255,255,0.04)'; }}
                onMouseLeave={e => { e.currentTarget.style.background = section === item.sec ? 'rgba(187,176,255,0.08)' : 'transparent'; }}>
                <span style={{ fontSize: 12 }}>{item.icon}</span>
                <span style={{ flex: 1 }}>{item.label}</span>
                {item.count != null && <span style={{ fontSize: 11, color: '#949494' }}>{item.count}</span>}
              </div>
            ))}
          </div>
        )}

      </div>
    </div>
  );
}

function App(){
  const[logData,setLogData]=useState(null);
  const[fileName,setFileName]=useState('');
  const[loadErr,setLoadErr]=useState('');
  const[tab,setTab]=useState('Overview');
  const[section,setSection]=React.useState('overview');
  const[searchTerm,setSearchTerm]=useState('');
  const[typeFilter,setTypeFilter]=useState('all');
  const[expandedRow,setExpandedRow]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[acctFilter,setAcctFilter]=useState('');
  const[qualityOpen,setQualityOpen]=useState(false);
  const[otherAppsOpen,setOtherAppsOpen]=useState(false);
  const[devDetailOpen,setDevDetailOpen]=useState(false);
  const[deviceExpanded,setDeviceExpanded]=useState(true);
  const[selectedErr,setSelectedErr]=useState(null);
  const[errAcctFilter,setErrAcctFilter]=useState(null);
  const[hoveredAcct,setHoveredAcct]=useState(null);
  const[hoveredRef,setHoveredRef]=useState(null);
  const[acctMapOpen,setAcctMapOpen]=useState(false);
  const[sumCopied,setSumCopied]=useState(false);
  const[fullCopied,setFullCopied]=useState(false);
  const[apduExportCopied,setApduExportCopied]=useState(false);

  const[fileKey,setFileKey]=React.useState(0);

  const[globalSearch,setGlobalSearch]=useState('');
  const[showGlobalResults,setShowGlobalResults]=useState(false);
  const[liveBalances,setLiveBalances]=useState({});
  const fileRef=useRef();

  const handleFile=useCallback(file=>{
    if(!file)return;setAppJson(null);setViewMode('diagnostic');setSearchTerm('');setTypeFilter('all');setExpandedRow(null);setAcctFilter('');setSection('overview');setFileName(file.name);setParsing(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      setTimeout(()=>{
        try{
          const entries=synthesizeMobileMeta(parseLogs(ev.target.result), file.name);
          if(!entries||entries.length===0){setLoadErr('This file couldn\'t be parsed. It may be empty, corrupted, or in a format the tool doesn\'t recognize. Accepted formats: Ledger Wallet log exports (.json or .txt). The customer can export from Ledger Wallet → Settings → Help → Export logs.');setFileName('');setParsing(false);return;}
          const types={};entries.forEach(e=>{if(e.type)types[e.type]=1;});
          const dev=extractDevice(entries),accts=extractAccounts(entries),errs=extractErrors(entries);
          const deviceApps=extractDeviceApps(entries);const requiredApps=inferRequiredApps(accts);
          // Backfill device info from deviceApps when extractDevice missed it (mobile logs)
          if(deviceApps){if(!dev.modelId&&deviceApps.deviceModelId){dev.modelId=deviceApps.deviceModelId;dev.modelName=DN[deviceApps.deviceModelId]||deviceApps.deviceModelId;}if(!dev.fw&&deviceApps.deviceInfo?.seVersion)dev.fw=deviceApps.deviceInfo.seVersion;if(!dev.fw&&deviceApps.firmware?.version)dev.fw=deviceApps.firmware.version;}
          setLoadErr('');
          setLogData({entries,dev,accts,errs,sync:extractSync(entries),types:Object.keys(types).sort(),apdu:extractApdu(entries),quality:logQualityScore(entries,dev,accts,errs,deviceApps),activity:extractActivity(entries),analytics:extractAnalytics(entries),deviceApps,requiredApps,rawText:ev.target.result,isMobile:entries.some(e=>e._isMobile)});
          setFileKey(k=>k+1);
          setTab('Overview');setSection('overview');setSearchTerm('');setTypeFilter('all');
        }catch(e){console.error(e);setLoadErr('This file couldn\'t be parsed. It may be empty, corrupted, or in a format the tool doesn\'t recognize. Accepted formats: Ledger Wallet log exports (.json or .txt). The customer can export from Ledger Wallet → Settings → Help → Export logs.');setFileName('');}
        setParsing(false);
      },10);
    };reader.readAsText(file);
  },[]);

  useEffect(()=>{
    if(!logData?.accts?.length){setLiveBalances({});return;}
    const accts=logData.accts;
    const init={};
    accts.forEach(a=>{init[a.id]={bal:null,fiat:null,status:'loading',err:null,ts:null};});
    setLiveBalances(init);
    let cancelled=false;

            <div style={{fontSize:32,marginBottom:12}}>👛</div>
            <div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No accounts in this log</div>
            <div style={{fontSize:12,color:'#949494',maxWidth:360,margin:'0 auto',lineHeight:1.5,marginBottom:16}}>Account data wasn't captured in this export. Switch to Customer View and load the customer's app.json for accounts and balances.</div>

        {/* Errors */}
        {section==='errors'&&(()=>{
          const allErrs=logData.errs;
          // O(N) pass: diagnose each error individually, then count repeating titles separately
          const baseDg=allErrs.map(e=>({...e,dg:diagnose(e.raw)}));
          const titleCounts={};for(const e of baseDg){const t=e.dg.t;titleCounts[t]=(titleCounts[t]||0)+1;}
          const enrichedErrs=baseDg.map(e=>{const c=titleCounts[e.dg.t];return c>1?{...e,dg:{...e.dg,repeatCount:c-1}}:e;});
          const displayErrs=errAcctFilter?enrichedErrs.filter(e=>{const hay=((e.msg||'')+' '+JSON.stringify(e.raw||'')).toLowerCase();return hay.includes(errAcctFilter.toLowerCase());}):enrichedErrs;
          const errRefs={};

            for(const a of logData.accts){if(a.addr&&a.addr.length>8&&haystack.includes(a.addr.toLowerCase())){errAcctMap.set(e.li,a);break;}}
          }
          const highCount=enrichedErrs.filter(e=>e.dg.s==='high').length;
          const medCount=enrichedErrs.filter(e=>e.dg.s==='medium').length;
          const lowCount=enrichedErrs.filter(e=>e.dg.s==='low').length;
          const repeating=enrichedErrs.filter(e=>e.dg.repeatCount>0);

          const seenTitles=new Set();

          const sorted=displayErrs.slice().sort((a,b)=>{const rank={high:3,medium:2,low:1};return(rank[b.dg.s]||0)-(rank[a.dg.s]||0);});
          const effectiveSel=selectedErr!=null?selectedErr:(sorted[0]?.li??null);

                    lines.push(`  Category: ${e.dg.c} · Entry #${e.li} · ${fmtTime(e.ts)}`);

                    lines.push('');

                  <Ico.Copy/> Copy Errors

              {(()=>{
                const ents=logData.entries;

                const t1=new Date(ents[ents.length-1].timestamp).getTime();
                const span=t1-t0;
                if(span<=0)return null;
                const durSec=(span/1000).toFixed(1);
                const errTimes=enrichedErrs.map(e=>new Date(e.ts).getTime()).sort((a,b)=>a-b);
                const errSpan=errTimes[errTimes.length-1]-errTimes[0];
                const errSpanSec=(errSpan/1000).toFixed(1);
                let interpretation='';
                if(enrichedErrs.length===1){
                  const pct=((errTimes[0]-t0)/span*100).toFixed(0);

                } else if(errSpan<2000){
                  interpretation=`All ${enrichedErrs.length} errors within ${errSpanSec}s — likely a single cascade event.`;
                } else if(errSpan<span*0.3){
                  interpretation=`Errors clustered within ${errSpanSec}s of a ${durSec}s session — likely related.`;
                } else {
                  interpretation=`Errors spread across ${errSpanSec}s of a ${durSec}s session — likely independent issues.`;
                }
                const byTime=[...enrichedErrs].sort((a,b)=>new Date(a.ts).getTime()-new Date(b.ts).getTime());
                return <div style={{marginBottom:6}}>
                  <div style={{position:'relative',height:28,background:'rgba(255,255,255,0.03)',borderRadius:6,padding:'0 12px'}}>

                    {' · '}{logData.accts.length} account{logData.accts.length!==1?'s':''}
                    {logData.accts.length>0&&!logData.accts.some(a=>a.dur!=null||a.bal!=null)?' · no sync data':''}

            <div style={{flex:1,overflow:'hidden',display:'flex',minHeight:0}}>

                    <div style={{display:'flex',alignItems:'center',gap:8}}>

        {/* APDU */}
        {section==='apdu'&&(()=>{
          function decodeApduStatus(hex,dir){
            if(!hex||dir==='in')return null;
            const sw=hex.replace(/\s/g,'').slice(-4).toLowerCase();
            const swMap={'9000':{label:'OK',color:T.success},'6985':{label:'Rejected',color:T.error},'6982':{label:'Locked',color:T.warning},'6a82':{label:'App not open',color:T.warning},'6700':{label:'Bad length',color:T.warning},'6d00':{label:'Bad INS',color:T.warning},'6e00':{label:'Wrong app',color:T.warning},'6f00':{label:'Tech error',color:T.error},'5515':{label:'Locked',color:T.warning}};
            return swMap[sw]||{label:`0x${sw.toUpperCase()}`,color:T.muted};
          }
          if(logData.apdu.length===0)return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}></div>
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px',textAlign:'center',color:'#949494'}}>
              <div style={{paddingTop:48}}>
                <div style={{fontSize:32,marginBottom:12}}>📡</div>

                <button onClick={()=>setSection('overview')} style={{padding:'6px 14px',borderRadius:6,border:'1px solid '+T.border,background:'transparent',color:T.primary,fontSize:12,fontWeight:600,cursor:'pointer'}}>Back to Overview →</button>
              </div>
            </div>
          </div>;
          const rejections=logData.apdu.filter(a=>{if(!a.hex||a.dir==='in')return false;const sw=a.hex.replace(/\s/g,'').slice(-4).toLowerCase();return sw&&sw!=='9000';});
          return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:rejections.length>0?12:0}}>

                <button aria-label="Copy APDU exchanges to clipboard" onClick={()=>{copyText(logData.apdu.map(a=>[a.dir.toUpperCase(),fmtTime(a.ts),a.hex||''].join('\t')).join('\n'));setApduExportCopied(true);setTimeout(()=>setApduExportCopied(false),2000);}} style={{padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:600,background:T.success+'1A',color:T.success,border:`1px solid ${T.success}4D`,cursor:'pointer'}}>{apduExportCopied?'Copied!':'Export APDUs'}</button>
              </div>
              {rejections.length>0&&(()=>{const counts={};rejections.forEach(a=>{const sw=a.hex.replace(/\s/g,'').slice(-4).toLowerCase();counts[sw]=(counts[sw]||0)+1;});const [topCode,topCount]=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];const codeNames={'6985':'Conditions not satisfied','6982':'Security status not satisfied','6700':'Incorrect length','6e00':'INS not supported','5515':'Device locked','6a82':'File not found','6d00':'Invalid instruction','6f00':'Technical error'};const codeName=codeNames[topCode]||'Unknown condition';return<div style={{background:'rgba(255,189,66,0.10)',borderLeft:'3px solid #FFBD42',padding:'8px 12px',borderRadius:4,fontSize:13,color:'#FFBD42'}}>{rejections.length} device rejection{rejections.length>1?'s':''}. Most common: {topCode} — {codeName}.</div>;})()}
            </div>
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
              <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
                {logData.apdu.slice(0,500).map((a,i)=>{
                  const status=decodeApduStatus(a.hex,a.dir);
                  const claLabel=a.dir==='in'&&a.hex?`CLA:${a.hex.replace(/\s/g,'').slice(0,2).toUpperCase()}`:null;
                  return<div key={i} className="mono" style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:`1px solid ${T.border}`}}>
                    <span style={bdg(a.dir==='in'?'#8A9EF5':T.success)}>{a.dir==='in'?'→ IN':'← OUT'}</span>
                    <span style={{color:T.muted,fontSize:10,flexShrink:0}}>{fmtTime(a.ts)}</span>
                    <span style={{width:100,flexShrink:0,fontWeight:600,fontSize:11,color:status?status.color:T.muted}}>{status?status.label:claLabel||'—'}</span>
                    <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:T.text}}>{a.hex||'—'}</span>
                    {a.hex&&<CopyBtn text={a.hex}/>}
                  </div>;
                })}
                {logData.apdu.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {logData.apdu.length}</div>}
              </div>
            </div>
          </div>;
        })()}

        {/* Raw JSON */}
        {section==='raw'&&(()=>{
          let treeData=null;
          if(logData.rawText){
            try{treeData=JSON.parse(logData.rawText);}catch{}
            if(!treeData)treeData=logData.entries;
          }
          if(!treeData)return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}><div style={{flexShrink:0,padding:'20px 24px 12px'}}></div><div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px',textAlign:'center',color:T.muted}}><div style={{textAlign:'center',paddingTop:48}}><div style={{fontSize:32,marginBottom:12}}>{'{}'}</div><div style={{fontSize:14,color:'#CCCCCC',marginBottom:8}}>No raw data available</div><div style={{fontSize:12,color:'#949494',maxWidth:360,margin:'0 auto',lineHeight:1.5}}>The uploaded file could not be parsed as JSON. Try re-exporting from Ledger Wallet → Settings → Help → Export logs.</div></div></div></div>;
          return<div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
            <div style={{flexShrink:0,padding:'20px 24px 12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,color:T.muted}}>
                {Array.isArray(treeData)?`${treeData.length.toLocaleString()} entries`:'Object'}
              </div>
              <button onClick={()=>{copyText(logData.rawText);}} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                <Ico.Copy/> Copy raw text
              </button>
            </div>
            </div>{/* end fixed header */}
            <div style={{flex:1,overflowY:'auto',borderTop:`1px solid ${T.border}`,boxShadow:'inset 0 2px 6px rgba(0,0,0,0.15)',padding:'16px 24px 24px'}}>
            <JTTree data={treeData}/>
            </div>{/* end scrollable */}
          </div>;
        })()}
      </div>
      </div>}
    </div>
  {logData&&viewMode==='customer'&&<CustomerView logData={logData} appJson={appJson} onAppJson={setAppJson}/>}
  </div>

}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  render(){
    if(this.state.hasError)return<div style={{minHeight:'100vh',background:'#131214',color:'#FFFFFF',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'sans-serif',textAlign:'center'}}><div><div style={{fontSize:24,marginBottom:12}}>⚠️</div><div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Something went wrong</div><div style={{fontSize:13,color:'#949494',marginBottom:16}}>Reload the page to try again.</div><button onClick={()=>window.location.reload()} style={{padding:'8px 20px',borderRadius:6,border:'none',background:'#BBB0FF',color:'#000',fontWeight:600,fontSize:13,cursor:'pointer'}}>Reload</button></div></div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
