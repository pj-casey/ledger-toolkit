const TABS=['Overview','Timeline','Accounts','Errors','Network'];

function App(){
  const[logData,setLogData]=useState(null);
  const[fileName,setFileName]=useState('');
  const[loadErr,setLoadErr]=useState('');
  const[tab,setTab]=useState('Overview');
  const[searchTerm,setSearchTerm]=useState('');
  const[typeFilter,setTypeFilter]=useState('all');
  const[expandedRow,setExpandedRow]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[acctFilter,setAcctFilter]=useState('');
  const[hoveredTab,setHoveredTab]=useState(null);
  const[qualityOpen,setQualityOpen]=useState(false);
  const[sumCopied,setSumCopied]=useState(false);
  const[apduExportCopied,setApduExportCopied]=useState(false);
  const fileRef=useRef();

  const visibleTabs=useMemo(()=>{
    const base=['Overview','Timeline','Accounts','Errors','Network'];
    if(logData?.apdu?.length>0)base.push('APDU');
    return base;
  },[logData]);

  const handleFile=useCallback(file=>{
    if(!file)return;setFileName(file.name);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const entries=parseLogs(ev.target.result);
        if(!entries||entries.length===0){setLoadErr('No log entries found. Make sure this is a valid Ledger Live log export (.json or .txt).');setFileName('');return;}
        const types={};entries.forEach(e=>{if(e.type)types[e.type]=1;});
        const dev=extractDevice(entries),accts=extractAccounts(entries),errs=extractErrors(entries);
        setLoadErr('');
        setLogData({entries,dev,accts,errs,sync:extractSync(entries),types:Object.keys(types).sort(),apdu:extractApdu(entries),quality:logQualityScore(entries,dev,accts,errs),activity:extractActivity(entries)});
        setTab('Overview');setSearchTerm('');setTypeFilter('all');
      }catch(e){console.error(e);setLoadErr('Failed to parse file: '+(e.message||String(e))+'. Make sure this is a valid Ledger Live log export.');setFileName('');}
    };reader.readAsText(file);
  },[]);

  const clearLog=()=>{setLogData(null);setFileName('');setLoadErr('');setTab('Overview');};
  const openPicker=()=>fileRef.current?.click();
  const onFC=ev=>{handleFile(ev.target.files[0]);ev.target.value='';};
  const jumpTo=li=>{setTab('Timeline');setTypeFilter('all');setSearchTerm('');setTimeout(()=>setExpandedRow(li),50);};

  const filtered=useMemo(()=>{
    if(!logData)return[];let f=logData.entries;
    if(typeFilter!=='all')f=f.filter(e=>e.type===typeFilter);
    if(searchTerm){const s=searchTerm.toLowerCase();f=f.filter(e=>(e.message||'').toLowerCase().includes(s)||(e.type||'').toLowerCase().includes(s));}
    return f;
  },[logData,typeFilter,searchTerm]);

  const netEntries=useMemo(()=>logData?logData.entries.filter(e=>e.type==='network'):[],[logData]);
  const filtAccts=useMemo(()=>{
    if(!logData)return[];if(!acctFilter)return logData.accts;
    const s=acctFilter.toLowerCase();
    return logData.accts.filter(a=>a.ch.name.toLowerCase().includes(s)||a.ch.ticker.toLowerCase().includes(s)||a.addr.toLowerCase().includes(s)||a.cid.toLowerCase().includes(s));
  },[logData,acctFilter]);

  useEffect(()=>{
    const onKey=e=>{if(!logData)return;const idx=parseInt(e.key)-1;if((e.ctrlKey||e.metaKey)&&idx>=0&&idx<visibleTabs.length){e.preventDefault();setTab(visibleTabs[idx]);}};
    window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);
  },[logData,visibleTabs]);

  return <div style={{minHeight:'100vh',background:T.bg,color:T.text}}>
    {/* Top bar */}
    <div style={{height:52,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',background:T.bg,position:'sticky',top:0,zIndex:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <svg width="24" height="20" viewBox="0 0 41 34" fill="none" xmlns="http://www.w3.org/2000/svg" style={{color:T.text,flexShrink:0}}>
          <path d="M0 24.3478V34.002H15.2378V31.8609H2.22018V24.3478H0ZM38.2905 24.3478V31.8609H25.2729V34.0014H40.5106V24.3478H38.2905ZM15.2599 9.65616V24.3472H25.2729V22.4165H17.4801V9.65616H15.2599ZM0 0.00195312V9.65616H2.22018V2.14248H15.2378V0.00195312H0ZM25.2729 0.00195312V2.14248H38.2905V9.65616H40.5106V0.00195312H25.2729Z" fill="currentColor"/>
        </svg>
        <span style={{fontSize:13,fontWeight:500,letterSpacing:'0.06em',textTransform:'uppercase',color:T.muted}}>Diagnostic Toolkit</span>
      </div>
      {logData&&<div style={{display:'flex',alignItems:'center',gap:12,fontSize:12}}>
        <div style={{display:'flex',alignItems:'center',gap:6,color:T.muted}}>
          <Ico.File/>
          <span className="mono" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:220}} title={fileName}>{fileName}</span>
          <span style={{color:T.muted,marginLeft:4}}>{logData.entries.length} entries · {logData.accts.length} accounts · {logData.errs.length} issue{logData.errs.length!==1?'s':''}</span>
        </div>
        <button aria-label="Load a new log file" onClick={openPicker} style={{padding:'6px 12px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:12,fontWeight:600,cursor:'pointer'}}>New file</button>
        <button aria-label="Close current log" onClick={clearLog} style={{padding:'6px 12px',borderRadius:6,border:'1px solid rgba(245,115,117,0.3)',background:'rgba(245,115,117,0.08)',color:T.error,fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><Ico.X/> Close</button>
      </div>}
    </div>
    <input ref={fileRef} type="file" accept=".json,.txt,.log" style={{display:'none'}} onChange={onFC}/>

    {/* Main */}
    <div style={{padding:24,overflowY:'auto',maxHeight:'calc(100vh - 52px)'}}>
      {/* Error state for failed file loads */}
      {loadErr&&!logData&&<div style={{background:'rgba(245,115,117,0.08)',border:'1px solid rgba(245,115,117,0.3)',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,color:T.error,display:'flex',alignItems:'center',gap:10}}><Ico.Alert/>{loadErr}</div>}
      {/* Drop zone — HUD scanning zone */}
      {!logData&&<div role="button" tabIndex={0} aria-label="Drop a log file or click to browse" onKeyDown={ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();openPicker();}}} onDrop={ev=>{ev.preventDefault();setDragOver(false);handleFile(ev.dataTransfer.files[0]);}} onDragOver={ev=>{ev.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onClick={openPicker} style={{position:'relative',background:dragOver?T.primary+'08':T.panel,border:`1px solid ${dragOver?T.primary:T.border}`,borderRadius:4,padding:80,textAlign:'center',cursor:'pointer',overflow:'hidden',transition:'border-color 0.2s,background 0.2s'}}>
        {/* Corner bracket accents — large 16px */}
        <span style={{position:'absolute',top:12,left:12,width:16,height:16,borderTop:`1px solid ${dragOver?T.primary:T.border}`,borderLeft:`1px solid ${dragOver?T.primary:T.border}`,pointerEvents:'none'}}/>
        <span style={{position:'absolute',top:12,right:12,width:16,height:16,borderTop:`1px solid ${dragOver?T.primary:T.border}`,borderRight:`1px solid ${dragOver?T.primary:T.border}`,pointerEvents:'none'}}/>
        <span style={{position:'absolute',bottom:12,left:12,width:16,height:16,borderBottom:`1px solid ${dragOver?T.primary:T.border}`,borderLeft:`1px solid ${dragOver?T.primary:T.border}`,pointerEvents:'none'}}/>
        <span style={{position:'absolute',bottom:12,right:12,width:16,height:16,borderBottom:`1px solid ${dragOver?T.primary:T.border}`,borderRight:`1px solid ${dragOver?T.primary:T.border}`,pointerEvents:'none'}}/>
        {/* Ledger mark — large scale, very faint watermark */}
        <svg width="96" height="80" viewBox="0 0 41 34" fill="none" xmlns="http://www.w3.org/2000/svg" style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',opacity:0.04,pointerEvents:'none'}}>
          <path d="M0 24.3478V34.002H15.2378V31.8609H2.22018V24.3478H0ZM38.2905 24.3478V31.8609H25.2729V34.0014H40.5106V24.3478H38.2905ZM15.2599 9.65616V24.3472H25.2729V22.4165H17.4801V9.65616H15.2599ZM0 0.00195312V9.65616H2.22018V2.14248H15.2378V0.00195312H0ZM25.2729 0.00195312V2.14248H38.2905V9.65616H40.5106V0.00195312H25.2729Z" fill="#ffffff"/>
        </svg>
        <div className={dragOver?'drop-icon-pulse':''} style={{color:dragOver?T.primary:T.muted,marginBottom:16,position:'relative'}}><Ico.Upload/></div>
        <div style={{fontSize:18,fontWeight:600,marginBottom:8,position:'relative'}}>Drop a Ledger Wallet log file here</div>
        <div style={{color:T.muted,fontSize:14,marginBottom:20,position:'relative'}}>Accepts .json and .txt — export from Settings → Help → Export Logs in Ledger Live</div>
        <div style={{display:'flex',justifyContent:'center',gap:16,flexWrap:'wrap',fontSize:12,color:T.muted,position:'relative'}}>
          <span>Device info</span><span>Accounts</span><span>Error diagnosis</span><span>On-chain links</span><span>Network</span>
        </div>
      </div>}

      {/* Log Viewer */}
      {logData&&<div>
        <div role="tablist" className="ledger-tab-bar" style={{marginBottom:8}}>
          {visibleTabs.map((t,tidx)=>{const act=tab===t;const ex=t==='Errors'&&logData.errs.length>0?` (${logData.errs.length})`:t==='Accounts'?` (${logData.accts.length})`:'';return <button key={t} role="tab" aria-selected={act} onClick={()=>setTab(t)} onMouseEnter={()=>setHoveredTab(t)} onMouseLeave={()=>setHoveredTab(null)} className={`ledger-tab-btn${act?' active':''}`}>{t}{ex}{hoveredTab===t&&<span className="mono" style={{position:'absolute',top:-8,right:-4,background:'rgba(255,255,255,0.1)',color:'#9c9c9c',fontSize:9,padding:'1px 4px',borderRadius:3,pointerEvents:'none'}}>⌃{tidx+1}</span>}</button>;})}
        </div>
        <div className="mono" style={{fontSize:11,color:T.muted,marginBottom:16}}>⌃1–{visibleTabs.length} switch tabs</div>

        {/* Overview */}
        {tab==='Overview'&&<div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:12}}>
            <button onClick={()=>{
              const d=logData.dev;
              const accts=logData.accts;
              const errs=logData.errs;
              const ses=logData.entries.length>1?`${fmtDate(logData.entries[0].timestamp)} ${fmtTime(logData.entries[0].timestamp)} — ${fmtTime(logData.entries[logData.entries.length-1].timestamp)}`:'Unknown';
              const lines=[
                '=== Ledger Diagnostic Summary ===',
                `File:        ${fileName}`,
                `Session:     ${ses}`,
                '',
                'DEVICE',
                `  Model:      ${d.modelName||d.modelId||'Unknown'}`,
                `  Firmware:   ${d.fw||'Unknown'}`,
                `  App ver:    ${d.appVer||'Unknown'}`,
                `  OS:         ${[d.os,d.osVer].filter(Boolean).join(' ')||'Unknown'}`,
                `  Platform:   ${d.platform||'Unknown'}`,
                `  User ID:    ${d.userId||'Unknown'}`,
                '',
                `ACCOUNTS (${accts.length})`,
                ...accts.slice(0,10).map(a=>{const addr=a.addr.length>20?a.addr.slice(0,20)+'...':a.addr;return`  ${a.ch.name} — ${a.ops} ops — ${addr}`;}),
                ...(accts.length>10?[`  ... and ${accts.length-10} more`]:[]),
                '',
                `ERRORS (${errs.length})`,
                ...errs.slice(0,8).map(e=>`  [${(e.dg?.s||'?').toUpperCase()}] ${e.dg?.t||e.msg||'?'}: ${e.dg?.a||''}`),
                ...(errs.length>8?[`  ... and ${errs.length-8} more`]:[]),
                '',
                `APDU exchanges: ${logData.apdu?.length||0}`,
                `Log quality: ${logData.quality?.score||0}/100 (${logData.quality?.label||'?'})`,
                '',
                'SESSION ACTIVITY',
                ...(()=>{const act=logData.activity||{};const flags=[];if(act.managerOpened)flags.push('  Manager opened');if(act.swapBrowsed)flags.push(`  Swap browsed${act.swapExecuted?'':' (not completed)'}`);if(act.deviceScan)flags.push('  Device scan active');return flags.length?flags:['  (none detected)'];})(),
                '=================================',
              ].filter(l=>l!==undefined).join('\n');
              copyText(lines);
              setSumCopied(true);
              setTimeout(()=>setSumCopied(false),2000);
            }} aria-label="Copy diagnostic summary to clipboard" className="copy-btn" style={{padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:600,background:T.primary+'1E',color:T.primary,border:`1px solid ${T.primary}4D`,cursor:'pointer'}}>
              {sumCopied?'Copied!':'Copy Summary'}
            </button>
          </div>
          <div className="stats-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:12}}>
            {[{l:'Entries',v:logData.entries.length,c:T.primary},{l:'Accounts',v:logData.accts.length,c:T.success},{l:'Operations',v:logData.dev.totalOps||'—',c:T.primary},{l:'Issues',v:logData.errs.length,c:logData.errs.length>0?T.error:T.muted}].map(s=><div key={s.l} className="card-bracketed" style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:4,padding:16,textAlign:'center'}}><span className="card-bracket-b"/><div className="stat-value" style={{color:s.c}}>{s.v}</div><div style={{fontSize:12,color:T.muted,marginTop:4,lineHeight:1.4}}>{s.l}</div></div>)}
          </div>
          {(()=>{
            const act=logData.activity||{};
            const badges=[];
            if(act.managerOpened)badges.push({k:'mgr',l:'Manager opened',c:T.primary});
            if(act.swapBrowsed)badges.push({k:'swap',l:act.swapExecuted?'Swap browsed':'Swap browsed (not completed)',c:T.primary});
            if(act.deviceScan)badges.push({k:'dmk',l:'Device scan active',c:T.success});
            if(!badges.length)return <div style={{marginBottom:8}}/>;
            return <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
              {badges.map(b=><span key={b.k} style={bdg(b.c)}>{b.l}</span>)}
            </div>;
          })()}
          <div className="ov-grid-2col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
            <div className="card-bracketed" style={{...crd,borderRadius:4}}><span className="card-bracket-b"/><div className="card-header" style={{display:'flex',alignItems:'center',gap:8,marginBottom:16}}><Ico.Chip/> Device &amp; App</div>
              {!logData.dev.modelId&&!logData.dev.modelName&&<div style={{background:'rgba(255,189,66,0.06)',border:'1px solid rgba(255,189,66,0.2)',borderRadius:6,padding:'8px 12px',marginBottom:12,fontSize:12,color:T.muted}}>No device connected during this session — model and firmware not available.</div>}
              {[['Device',logData.dev.modelName||'—'],['Firmware',logData.dev.fw||'—'],['Language',logData.dev.lang||'—'],['Paired',(logData.dev.devices||[]).map(m=>DN[m]||m).join(', ')||'—'],['App',logData.dev.appVer||'—'],['Commit',logData.dev.commit||'—'],['Sync',logData.dev.ledgerSync?'Active':'—'],['MEV',logData.dev.mev||'—']].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`,lineHeight:1.6}}><span style={{color:T.muted,fontSize:13}}>{k}</span><span className="mono">{v}</span></div>)}
            </div>
            <div className="card-bracketed" style={{...crd,borderRadius:4}}><span className="card-bracket-b"/><div className="card-header" style={{marginBottom:16}}>Environment</div>
              {[['OS',`${logData.dev.os||'—'} ${logData.dev.osVer||''}`],['Platform',logData.dev.platform||'—'],['User ID',logData.dev.userId?trunc(logData.dev.userId,36):'—'],['Sync',logData.sync?logData.sync+'s':'—']].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`,lineHeight:1.6}}><span style={{color:T.muted,fontSize:13}}>{k}</span><span className="mono" style={{display:'flex',alignItems:'center',gap:4}}>{v}{k==='User ID'&&logData.dev.userId&&<CopyBtn text={logData.dev.userId}/>}</span></div>)}
            </div>
          </div>
          {logData.errs.length>0&&<div style={{background:'rgba(239,68,68,0.04)',border:'1px solid rgba(239,68,68,0.3)',borderRadius:12,padding:16,marginBottom:16}}>
            <div className="card-header" style={{display:'flex',alignItems:'center',gap:8,color:T.error,marginBottom:16}}><Ico.Alert/> {logData.errs.length} Issue{logData.errs.length!==1?'s':''}</div>
            {logData.errs.slice(0,3).map(e=><ErrCard key={e.li} err={e} onJump={jumpTo}/>)}
            {logData.errs.length>3&&<button onClick={()=>setTab('Errors')} style={{marginTop:4,background:'transparent',border:'none',color:T.primary,fontWeight:600,fontSize:13,cursor:'pointer'}}>View all →</button>}
          </div>}
          {/* Session banner */}
          {logData.entries.length>1&&(()=>{
            const chainCounts={};
            logData.accts.forEach(a=>{const key=a.ch.name;if(!chainCounts[key]){chainCounts[key]={count:0,color:a.ch.color};}chainCounts[key].count++;});
            const topChains=Object.entries(chainCounts).sort((x,y)=>y[1].count-x[1].count).slice(0,5);
            return <div style={{background:'rgba(59,130,246,0.06)',border:'1px solid rgba(59,130,246,0.15)',borderRadius:10,padding:'14px 18px',marginBottom:20,fontSize:12,color:T.muted}}>
              <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:'6px 12px'}}>
                <span style={{fontWeight:600,color:T.primary}}>Session:</span>
                <span>{fmtDate(logData.entries[0].timestamp)}&nbsp;&nbsp;{fmtTime(logData.entries[0].timestamp)} — {fmtTime(logData.entries[logData.entries.length-1].timestamp)}</span>
                <span>·</span>
                <span>{((new Date(logData.entries[logData.entries.length-1].timestamp)-new Date(logData.entries[0].timestamp))/1000).toFixed(1)}s</span>
                <span>·</span>
                <span>{logData.accts.filter(a=>a.ops>0).length}/{logData.accts.length} accounts active</span>
              </div>
              {topChains.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:10}}>
                {topChains.map(([name,info])=>(
                  <span key={name} style={{background:info.color+'22',color:info.color,padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:600}}>{name} ×{info.count}</span>
                ))}
              </div>}
            </div>;
          })()}
          {/* Log Quality Score */}
          {logData.quality&&(()=>{
            const q=logData.quality;
            return <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,padding:'12px 20px',marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span className="mono" style={{fontWeight:700,fontSize:13,color:q.color}}>{q.score}/100</span>
                <span style={{fontSize:13,color:T.muted}}>Log Quality: {q.label}</span>
                <button onClick={()=>setQualityOpen(o=>!o)} style={{marginLeft:'auto',padding:'4px 10px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>Details {qualityOpen?<Ico.ChevD/>:<Ico.ChevR/>}</button>
              </div>
              {qualityOpen&&<div style={{marginTop:14,borderTop:`1px solid ${T.border}`,paddingTop:12}}>
                {q.details.map((d,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:`1px solid ${T.border}`,fontSize:12}}>
                    <span style={{width:16,flexShrink:0,color:d.found?T.success:T.error,fontWeight:700}}>{d.found?'✓':'✗'}</span>
                    <span style={{flex:1,color:T.text,fontWeight:600}}>{d.field}</span>
                    <span className="mono" style={{color:T.muted}}>{d.note}</span>
                  </div>
                ))}
              </div>}
            </div>;
          })()}
        </div>}

        {/* Timeline */}
        {tab==='Timeline'&&<div>
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            <input value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder="Search logs..." className="mono" style={{flex:1,padding:'10px 14px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13}}/>
            <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{padding:'10px 14px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,minWidth:160}}>
              <option value="all">All ({logData.entries.length})</option>
              {logData.types.map(t=><option key={t} value={t}>{t} ({logData.entries.filter(e=>e.type===t).length})</option>)}
            </select>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:12,color:T.muted}}>{filtered.length} of {logData.entries.length}</div>
            <button aria-label="Export filtered log entries as JSON" onClick={()=>downloadJSON(filtered,'filtered-logs.json')} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><Ico.DL/> Export filtered</button>
          </div>
          <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden',maxHeight:'65vh',overflowY:'auto'}}>
            <div className="tl-grid" style={{display:'grid',gridTemplateColumns:'50px 90px 130px 1fr',background:'rgba(255,255,255,0.03)',position:'sticky',top:0,zIndex:1,borderBottom:`1px solid ${T.border}`}}>
              {['#','Time','Type','Message'].map(h=><div key={h} className="label" style={{padding:'10px 12px',color:T.muted,background:T.panel}}>{h}</div>)}
            </div>
            {filtered.slice(0,500).map(e=>{
              const isExp=expandedRow===e.logIndex;
              const hasD=e.data||e.queryArg||e.error||e.payload||e.env||e.accountsIds;
              const isErr=e.error||sGet(e,'payload.error','')||(e.message||'').toLowerCase().includes('rejected');
              return <div key={e.logIndex}>
                <div role={hasD?'button':undefined} tabIndex={hasD?0:-1} onClick={()=>{if(hasD)setExpandedRow(isExp?null:e.logIndex);}} onKeyDown={hasD?ev=>{if(ev.key==='Enter'||ev.key===' '){ev.preventDefault();setExpandedRow(isExp?null:e.logIndex);}}:undefined} className="tl-grid" style={{display:'grid',gridTemplateColumns:'50px 90px 130px 1fr',borderBottom:`1px solid ${T.border}`,cursor:hasD?'pointer':'default',background:isErr?'rgba(239,68,68,0.05)':'transparent'}}>
                  <div className="tl-col-idx mono" style={{padding:'8px 12px',color:T.muted}}>{e.logIndex}</div>
                  <div className="tl-col-time mono" style={{padding:'8px 12px',color:T.muted,whiteSpace:'nowrap'}}>{fmtTime(e.timestamp)}</div>
                  <div style={{padding:'8px 12px'}}><span style={bdg(gtc(e.type))}>{e.type||'—'}</span></div>
                  <div className="mono" style={{padding:'8px 12px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><HighlightText text={trunc(e.message,120)} term={searchTerm}/>{hasD&&<span style={{color:T.primary,marginLeft:6,fontSize:10}}>{isExp?'▼':'▶'}</span>}</div>
                </div>
                {isExp&&<div style={{padding:'12px 20px',background:'rgba(0,0,0,0.2)',borderBottom:`1px solid ${T.border}`}}><pre className="mono" style={{color:T.text,whiteSpace:'pre-wrap',wordBreak:'break-all',margin:0,maxHeight:300,overflowY:'auto'}}>{JSON.stringify({data:e.data,queryArg:e.queryArg,error:e.error,payload:e.payload,context:e.context},null,2)}</pre></div>}
              </div>;
            })}
            {filtered.length===0&&<div style={{padding:40,textAlign:'center',color:T.muted}}>
              <div style={{fontSize:28,marginBottom:12}}>🔍</div>
              <div style={{fontWeight:600,marginBottom:6}}>No log entries match your filters</div>
              <div style={{fontSize:12,marginBottom:16}}>Try clearing the search or switching to "All" types</div>
              <button onClick={()=>{setSearchTerm('');setTypeFilter('all');}} style={{padding:'8px 16px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.primary,fontSize:12,fontWeight:600,cursor:'pointer'}}>Clear filters</button>
            </div>}
            {filtered.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {filtered.length}</div>}
          </div>
        </div>}

        {/* Accounts */}
        {tab==='Accounts'&&<div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontSize:12,color:T.muted}}>{logData.accts.filter(a=>a.ops>0).length} funded · {logData.accts.filter(a=>a.ops===0).length} empty</div>
            <div style={{display:'flex',gap:6}}>
              {logData.dev.accountIds&&logData.dev.accountIds.length>0&&<button onClick={()=>copyText(logData.dev.accountIds.join('\n'))} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><Ico.Copy/> Copy all IDs ({logData.dev.accountIds.length})</button>}
              <button onClick={()=>downloadJSON(logData.accts.map(a=>({id:a.id,chain:a.ch.name,address:a.addr,derivation:a.dm,ops:a.ops})),'accounts.json')} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.muted,fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}><Ico.DL/> Export</button>
            </div>
          </div>
          {logData.accts.length>0&&!logData.accts.some(a=>a.dur!=null)&&!logData.sync&&<div style={{background:'rgba(255,189,66,0.06)',border:'1px solid rgba(255,189,66,0.25)',borderRadius:8,padding:'10px 16px',marginBottom:16,fontSize:12,color:T.muted,lineHeight:1.6}}>⚠ No sync activity captured in this log — operation counts may show as 0. Ask the customer to export logs after triggering a manual sync (right-click an account → Sync).</div>}
          <input value={acctFilter} onChange={e=>setAcctFilter(e.target.value)} placeholder="Filter by chain, ticker, or address..." className="mono" style={{width:'100%',padding:'10px 14px',background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,color:T.text,fontSize:13,marginBottom:16,boxSizing:'border-box'}}/>
          {filtAccts.map(a=><AcctCard key={a.id} acct={a}/>)}
          {filtAccts.length===0&&acctFilter&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,textAlign:'center',color:T.muted,padding:40}}>
            <div style={{fontSize:28,marginBottom:8}}>👛</div>
            <div style={{fontWeight:600,marginBottom:4}}>No accounts match "{acctFilter}"</div>
            <div style={{fontSize:12,marginBottom:12}}>Try searching by chain name, ticker, or partial address</div>
            <button onClick={()=>setAcctFilter('')} style={{padding:'6px 14px',borderRadius:6,border:`1px solid ${T.border}`,background:'transparent',color:T.primary,fontSize:12,fontWeight:600,cursor:'pointer'}}>Clear filter</button>
          </div>}
          {filtAccts.length===0&&!acctFilter&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,textAlign:'center',color:T.muted,padding:40}}>No accounts found in this log</div>}
        </div>}

        {/* Errors */}
        {tab==='Errors'&&(()=>{
          const allErrs=logData.errs;
          // O(N) pass: diagnose each error individually, then count repeating titles separately
          const baseDg=allErrs.map(e=>({...e,dg:diagnose(e.raw)}));
          const titleCounts={};for(const e of baseDg){const t=e.dg.t;titleCounts[t]=(titleCounts[t]||0)+1;}
          const enrichedErrs=baseDg.map(e=>{const c=titleCounts[e.dg.t];return c>1?{...e,dg:{...e.dg,repeatCount:c-1}}:e;});
          const highCount=enrichedErrs.filter(e=>e.dg.s==='high').length;
          const medCount=enrichedErrs.filter(e=>e.dg.s==='medium').length;
          const lowCount=enrichedErrs.filter(e=>e.dg.s==='low').length;
          const topHigh=enrichedErrs.find(e=>e.dg.s==='high');
          const topMed=enrichedErrs.find(e=>e.dg.s==='medium');
          const repeating=enrichedErrs.filter(e=>e.dg.repeatCount>0);
          // Deduplicate repeating by title
          const seenTitles=new Set();
          const repeatingUniq=repeating.filter(e=>{if(seenTitles.has(e.dg.t))return false;seenTitles.add(e.dg.t);return true;});

          let summaryText='No issues detected — log appears healthy.';
          if(enrichedErrs.length>0){
            if(highCount>0){
              summaryText=`Log contains ${highCount} critical issue${highCount>1?'s':''} — ${topHigh.dg.t}. Immediate attention may be needed.`;
            } else if(medCount>0){
              summaryText=`Log shows ${medCount} warning${medCount>1?'s':''} including ${topMed.dg.t}. Review recommended.`;
            } else {
              summaryText='Log shows minor informational events only. No action required.';
            }
          }

          return <div>
            {/* Severity summary bar */}
            {enrichedErrs.length>0&&<div style={{display:'flex',gap:16,marginBottom:16,padding:'12px 16px',background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,flexWrap:'wrap'}}>
              {[{label:'Critical',count:highCount,color:T.error},{label:'Warning',count:medCount,color:T.warning},{label:'Info',count:lowCount,color:'#8A9EF5'}].map(item=>(
                <div key={item.label} style={{display:'flex',alignItems:'center',gap:6,fontSize:13}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:item.color,display:'inline-block',flexShrink:0}}></span>
                  <span className="mono" style={{fontWeight:700,color:item.color}}>{item.count}</span>
                  <span style={{color:T.muted}}>{item.label}</span>
                </div>
              ))}
            </div>}

            {/* Diagnostic summary card */}
            <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:10,padding:'14px 16px',marginBottom:16,display:'flex',alignItems:'flex-start',gap:10}}>
              <span style={{fontSize:16,flexShrink:0}}>📋</span>
              <div style={{fontSize:13,color:T.text,lineHeight:1.6}}>{summaryText}</div>
            </div>

            {/* Repeating patterns */}
            {repeatingUniq.length>0&&<div style={{background:'rgba(255,189,66,0.06)',border:'1px solid rgba(255,189,66,0.25)',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
              <div className="card-header" style={{color:T.warning,marginBottom:10}}>&#x27F3; Repeating Patterns</div>
              {repeatingUniq.map(e=>(
                <div key={e.li} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(255,189,66,0.1)',fontSize:13}}>
                  <span style={{color:T.text}}>{e.dg.t}</span>
                  <span style={{padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,background:'rgba(255,189,66,0.15)',color:T.warning}}>{e.dg.repeatCount+1}× repeated</span>
                </div>
              ))}
            </div>}

            {/* No errors state */}
            {enrichedErrs.length===0&&<div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,textAlign:'center',color:T.success,padding:40}}>No issues detected</div>}

            {/* Category groups */}
            {['hardware','software','server','unknown'].map(cat=>{
              const g=enrichedErrs.filter(e=>e.dg.c===cat);if(!g.length)return null;
              const cm=CAT[cat]||CAT.unknown;
              return <div key={cat} style={{marginBottom:24}}>
                <div className="card-header" style={{color:T.muted,marginBottom:10,display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>{cm.i}</span> {cm.l} ({g.length})</div>
                {g.map(e=><ErrCard key={e.li} err={e} onJump={jumpTo}/>)}
              </div>;
            })}
          </div>;
        })()}

        {/* Network */}
        {tab==='Network'&&<div>
          <div style={{fontSize:12,color:T.muted,marginBottom:12}}>{netEntries.length} requests</div>
          <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden',maxHeight:'70vh',overflowY:'auto'}}>
            {netEntries.length===0&&<div style={{padding:40,textAlign:'center',color:T.muted}}>None</div>}
            {netEntries.slice(0,500).map(e=>{
              // Support both new format (data.method + message=url) and old format ("get https://..." in message)
              let method=sGet(e,'data.method','');
              let url=e.message||'';
              if(!method){
                const m=url.match(/^(get|post|put|patch|delete|head)\s+(https?:\/\/\S+)/i);
                if(m){method=m[1].toUpperCase();url=m[2];}
                else method='GET';
              }
              const body=sGet(e,'data.body','');
              let parsed=null;if(body){try{parsed=JSON.parse(body);}catch{}}
              const isUrl=url.startsWith('https://');
              return <div key={e.logIndex} style={{padding:'10px 14px',borderBottom:`1px solid ${T.border}`,fontSize:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={bdg('#8A9EF5')}>{method}</span>
                    {isUrl?<a href={url} target="_blank" rel="noopener noreferrer" className="mono" style={{color:T.primary,textDecoration:'none'}}>{url}</a>:<span className="mono">{url}</span>}
                  </div>
                  <span className="mono" style={{color:T.muted,fontSize:10}}>{fmtTime(e.timestamp)}</span>
                </div>
                {parsed&&<div className="mono" style={{fontSize:10,color:T.muted,marginTop:4}}>→ {parsed.method}({parsed.params?.[0]?trunc(typeof parsed.params[0]==='string'?parsed.params[0]:JSON.stringify(parsed.params[0]),60):''})</div>}
              </div>;
            })}
            {netEntries.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {netEntries.length}</div>}
          </div>
        </div>}

        {/* APDU */}
        {tab==='APDU'&&(()=>{
          function decodeApduStatus(hex,dir){
            if(!hex||dir==='in')return null;
            const sw=hex.replace(/\s/g,'').slice(-4).toLowerCase();
            const swMap={
              '9000':{label:'OK',color:T.success},
              '6985':{label:'Rejected',color:T.error},
              '6982':{label:'Locked',color:T.warning},
              '6a82':{label:'App not open',color:T.warning},
              '6700':{label:'Bad length',color:T.warning},
              '6d00':{label:'Bad INS',color:T.warning},
              '6e00':{label:'Wrong app',color:T.warning},
              '6f00':{label:'Tech error',color:T.error},
              '5515':{label:'Locked',color:T.warning},
            };
            return swMap[sw]||{label:`0x${sw.toUpperCase()}`,color:T.muted};
          }
          return <div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <span style={{fontSize:12,color:T.muted}}>{logData.apdu.length} APDU exchanges</span>
              <button aria-label="Copy APDU exchanges to clipboard" onClick={()=>{
                copyText(logData.apdu.map(a=>[a.dir.toUpperCase(),fmtTime(a.ts),a.hex||''].join('\t')).join('\n'));
                setApduExportCopied(true);
                setTimeout(()=>setApduExportCopied(false),2000);
              }} style={{padding:'6px 14px',borderRadius:6,fontSize:12,fontWeight:600,background:T.success+'1A',color:T.success,border:`1px solid ${T.success}4D`,cursor:'pointer'}}>
                {apduExportCopied?'Copied!':'Export APDUs'}
              </button>
            </div>
            <div style={{background:T.panel,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden',maxHeight:'70vh',overflowY:'auto'}}>
              {logData.apdu.slice(0,500).map((a,i)=>{
                const status=decodeApduStatus(a.hex,a.dir);
                const claLabel=a.dir==='in'&&a.hex?`CLA:${a.hex.replace(/\s/g,'').slice(0,2).toUpperCase()}`:null;
                return <div key={i} className="mono" style={{display:'flex',alignItems:'center',gap:10,padding:'8px 14px',borderBottom:`1px solid ${T.border}`}}>
                  <span style={bdg(a.dir==='in'?'#8A9EF5':T.success)}>{a.dir==='in'?'→ IN':'← OUT'}</span>
                  <span style={{color:T.muted,fontSize:10,flexShrink:0}}>{fmtTime(a.ts)}</span>
                  <span style={{width:100,flexShrink:0,fontWeight:600,fontSize:11,color:status?status.color:T.muted}}>
                    {status?status.label:claLabel||'—'}
                  </span>
                  <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:T.text}}>{a.hex||'—'}</span>
                  {a.hex&&<CopyBtn text={a.hex}/>}
                </div>;
              })}
              {logData.apdu.length>500&&<div style={{padding:12,textAlign:'center',color:T.muted,fontSize:12}}>Showing 500 of {logData.apdu.length}</div>}
            </div>
          </div>;
        })()}
      </div>}
    </div>
  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  render(){
    if(this.state.hasError)return<div style={{minHeight:'100vh',background:'#131214',color:'#FFFFFF',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'sans-serif',textAlign:'center'}}><div><div style={{fontSize:24,marginBottom:12}}>⚠️</div><div style={{fontSize:16,fontWeight:600,marginBottom:8}}>Something went wrong</div><div style={{fontSize:13,color:'#949494',marginBottom:16}}>Reload the page to try again.</div><button onClick={()=>window.location.reload()} style={{padding:'8px 20px',borderRadius:6,border:'none',background:'#BBB0FF',color:'#000',fontWeight:600,fontSize:13,cursor:'pointer'}}>Reload</button></div></div>;
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
